<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8f4f8"/>
      <stop offset="100%" stop-color="#d1ecf1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)" rx="12"/>
  <!-- Git branch icon -->
  <circle cx="260" cy="260" r="28" fill="#2d9f56" opacity="0.9"/>
  <circle cx="260" cy="400" r="28" fill="#2d9f56" opacity="0.9"/>
  <circle cx="400" cy="330" r="28" fill="#2d9f56" opacity="0.9"/>
  <line x1="260" y1="288" x2="260" y2="372" stroke="#2d9f56" stroke-width="6"/>
  <line x1="260" y1="330" x2="372" y2="330" stroke="#2d9f56" stroke-width="6"/>
  <!-- Arrow right -->
  <polygon points="460,330 430,310 430,350" fill="#2d9f56" opacity="0.7"/>
  <!-- CI/CD pipeline blocks -->
  <rect x="500" y="290" width="80" height="80" rx="12" fill="#1a6db5" opacity="0.85"/>
  <text x="540" y="340" text-anchor="middle" fill="white" font-family="sans-serif" font-size="20" font-weight="bold">Build</text>
  <rect x="610" y="290" width="80" height="80" rx="12" fill="#1a6db5" opacity="0.85"/>
  <text x="650" y="340" text-anchor="middle" fill="white" font-family="sans-serif" font-size="20" font-weight="bold">Test</text>
  <rect x="720" y="290" width="80" height="80" rx="12" fill="#1a6db5" opacity="0.85"/>
  <text x="760" y="340" text-anchor="middle" fill="white" font-family="sans-serif" font-size="20" font-weight="bold">Push</text>
  <!-- Arrows between blocks -->
  <line x1="580" y1="330" x2="610" y2="330" stroke="#1a6db5" stroke-width="4"/>
  <polygon points="610,330 600,322 600,338" fill="#1a6db5"/>
  <line x1="690" y1="330" x2="720" y2="330" stroke="#1a6db5" stroke-width="4"/>
  <polygon points="720,330 710,322 710,338" fill="#1a6db5"/>
  <!-- Rocket deploy -->
  <polygon points="870,310 870,350 910,330" fill="#e85d3a" opacity="0.9"/>
  <rect x="850" y="300" width="25" height="60" rx="6" fill="#e85d3a" opacity="0.9"/>
  <!-- Title -->
  <text x="600" y="160" text-anchor="middle" fill="#1a3a4a" font-family="sans-serif" font-size="56" font-weight="bold">Self-Hosted Git</text>
  <text x="600" y="220" text-anchor="middle" fill="#1a3a4a" font-family="sans-serif" font-size="56" font-weight="bold">+ CI/CD</text>
  <text x="600" y="560" text-anchor="middle" fill="#4a6a7a" font-family="sans-serif" font-size="28">Forgejo + Woodpecker</text>
</svg>
