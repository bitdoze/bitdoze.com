<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eff6ff"/>
      <stop offset="100%" style="stop-color:#dbeafe"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
    <linearGradient id="tree" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)" rx="0"/>
  <!-- Subtle grid dots -->
  <g opacity="0.06">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="#2563eb"/>
    </pattern>
    <rect width="1200" height="675" fill="url(#dots)"/>
  </g>
  <!-- Title -->
  <text x="600" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" fill="#1e3a5f" text-anchor="middle">Mirage</text>
  <text x="600" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="500" fill="#3b82f6" text-anchor="middle">Universal Filesystem for AI Agents</text>
  <!-- Filesystem tree visualization -->
  <!-- Root node -->
  <rect x="480" y="175" width="240" height="44" rx="22" fill="url(#tree)"/>
  <text x="600" y="202" font-family="system-ui, monospace" font-size="16" font-weight="700" fill="white" text-anchor="middle">/ (workspace)</text>
  <!-- Branch lines -->
  <line x1="520" y1="219" x2="280" y2="270" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="560" y1="219" x2="430" y2="270" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="600" y1="219" x2="600" y2="270" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="640" y1="219" x2="770" y2="270" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="680" y1="219" x2="920" y2="270" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- Mount nodes -->
  <!-- S3 -->
  <rect x="210" y="270" width="140" height="70" rx="12" fill="white" stroke="#f59e0b" stroke-width="2"/>
  <text x="280" y="298" font-family="system-ui, monospace" font-size="14" font-weight="700" fill="#92400e" text-anchor="middle">/s3</text>
  <text x="280" y="318" font-family="system-ui" font-size="11" fill="#6b7280" text-anchor="middle">logs, reports</text>
  <!-- Google Drive -->
  <rect x="360" y="270" width="140" height="70" rx="12" fill="white" stroke="#22c55e" stroke-width="2"/>
  <text x="430" y="298" font-family="system-ui, monospace" font-size="14" font-weight="700" fill="#166534" text-anchor="middle">/docs</text>
  <text x="430" y="318" font-family="system-ui" font-size="11" fill="#6b7280" text-anchor="middle">Drive, Docs</text>
  <!-- Slack -->
  <rect x="530" y="270" width="140" height="70" rx="12" fill="white" stroke="#a855f7" stroke-width="2"/>
  <text x="600" y="298" font-family="system-ui, monospace" font-size="14" font-weight="700" fill="#6b21a8" text-anchor="middle">/slack</text>
  <text x="600" y="318" font-family="system-ui" font-size="11" fill="#6b7280" text-anchor="middle">channels</text>
  <!-- GitHub -->
  <rect x="700" y="270" width="140" height="70" rx="12" fill="white" stroke="#ef4444" stroke-width="2"/>
  <text x="770" y="298" font-family="system-ui, monospace" font-size="14" font-weight="700" fill="#991b1b" text-anchor="middle">/github</text>
  <text x="770" y="318" font-family="system-ui" font-size="11" fill="#6b7280" text-anchor="middle">repos, issues</text>
  <!-- RAM -->
  <rect x="850" y="270" width="140" height="70" rx="12" fill="white" stroke="#6366f1" stroke-width="2"/>
  <text x="920" y="298" font-family="system-ui, monospace" font-size="14" font-weight="700" fill="#3730a3" text-anchor="middle">/data</text>
  <text x="920" y="318" font-family="system-ui" font-size="11" fill="#6b7280" text-anchor="middle">scratch, tmp</text>
  <!-- Command examples -->
  <rect x="280" y="390" width="640" height="120" rx="12" fill="#1e293b" opacity="0.92"/>
  <text x="300" y="420" font-family="monospace" font-size="14" fill="#94a3b8">$</text>
  <text x="320" y="420" font-family="monospace" font-size="14" fill="#e2e8f0">grep alert /s3/logs/*.json | wc -l</text>
  <text x="300" y="448" font-family="monospace" font-size="14" fill="#94a3b8">$</text>
  <text x="320" y="448" font-family="monospace" font-size="14" fill="#e2e8f0">cat /docs/meeting-notes.md</text>
  <text x="300" y="476" font-family="monospace" font-size="14" fill="#94a3b8">$</text>
  <text x="320" y="476" font-family="monospace" font-size="14" fill="#e2e8f0">cp /s3/report.csv /data/local.csv</text>
  <!-- Bottom tagline -->
  <rect x="370" y="555" width="460" height="44" rx="22" fill="url(#accent)"/>
  <text x="600" y="583" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="600" fill="white" text-anchor="middle">One Tree. Every Service. Plain Bash.</text>
</svg>
