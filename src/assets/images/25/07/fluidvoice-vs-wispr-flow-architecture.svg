<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <radialGradient id="blob1" cx="15%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="85%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.2"/>
    </pattern>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4F46E5"/>
    </marker>
    <marker id="arrowPink" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EC4899"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#blob1)"/>
  <rect width="1200" height="675" fill="url(#blob2)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <!-- Title -->
  <text x="600" y="48" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#0F172A" text-anchor="middle">Local vs Cloud Processing</text>
  <!-- Shared: Microphone icon at center top -->
  <g transform="translate(600, 130)">
    <rect x="-30" y="-82" width="60" height="100" rx="30" fill="none" stroke="#64748B" stroke-width="3"/>
    <rect x="-20" y="-68" width="40" height="70" rx="20" fill="#64748B" opacity="0.15"/>
    <path d="M -50 18 Q -50 68 0 68 Q 50 68 50 18" fill="none" stroke="#64748B" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="68" x2="0" y2="88" stroke="#64748B" stroke-width="3" stroke-linecap="round"/>
    <line x1="-20" y1="88" x2="20" y2="88" stroke="#64748B" stroke-width="3" stroke-linecap="round"/>
    <text x="0" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#64748B" text-anchor="middle">Your Voice</text>
  </g>
  <!-- LEFT SIDE: FluidVoice (Local) -->
  <text x="300" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#4F46E5" text-anchor="middle">FluidVoice</text>
  <text x="300" y="302" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#4F46E5" text-anchor="middle" opacity="0.7">Local Processing</text>
  <!-- Arrow from mic to FluidVoice box -->
  <line x1="480" y1="220" x2="380" y2="315" stroke="#4F46E5" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arrowGreen)" opacity="0.6"/>
  <!-- Mac box -->
  <rect x="140" y="320" width="320" height="220" rx="16" fill="white" stroke="#4F46E5" stroke-width="2" opacity="0.9"/>
  <rect x="140" y="320" width="320" height="40" rx="16" fill="#4F46E5" opacity="0.08"/>
  <!-- Mac screen icon -->
  <rect x="205" y="335" width="50" height="35" rx="4" fill="none" stroke="#4F46E5" stroke-width="1.5" opacity="0.5"/>
  <line x1="220" y1="370" x2="240" y2="370" stroke="#4F46E5" stroke-width="1.5" opacity="0.5"/>
  <line x1="215" y1="373" x2="245" y2="373" stroke="#4F46E5" stroke-width="1.5" opacity="0.5"/>
  <text x="270" y="358" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#4F46E5" opacity="0.8">Your Mac</text>
  <!-- Process steps inside Mac box -->
  <rect x="165" y="380" width="130" height="40" rx="8" fill="#4F46E5" opacity="0.1"/>
  <text x="230" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#4F46E5" text-anchor="middle">Speech-to-Text</text>
  <text x="230" y="418" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#4F46E5" text-anchor="middle" opacity="0.6">Whisper / Parakeet</text>
  <!-- Arrow down -->
  <line x1="230" y1="420" x2="230" y2="445" stroke="#4F46E5" stroke-width="1.5" marker-end="url(#arrowGreen)" opacity="0.5"/>
  <rect x="165" y="450" width="130" height="40" rx="8" fill="#4F46E5" opacity="0.1"/>
  <text x="230" y="475" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#4F46E5" text-anchor="middle">Fluid-1 AI</text>
  <text x="230" y="488" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#4F46E5" text-anchor="middle" opacity="0.6">Smart Formatting</text>
  <!-- Output -->
  <rect x="310" y="410" width="130" height="48" rx="8" fill="#4F46E5" opacity="0.08" stroke="#4F46E5" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="375" y="436" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#4F46E5" text-anchor="middle">Clean Text</text>
  <text x="375" y="452" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#4F46E5" text-anchor="middle" opacity="0.6">Into any app</text>
  <!-- Arrow from formatting to output -->
  <line x1="295" y1="470" x2="318" y2="440" stroke="#4F46E5" stroke-width="1.5" marker-end="url(#arrowGreen)" opacity="0.4"/>
  <!-- Labels -->
  <text x="300" y="565" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#4F46E5" text-anchor="middle">✓ Offline</text>
  <text x="300" y="585" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#4F46E5" text-anchor="middle">✓ Free</text>
  <text x="300" y="605" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#4F46E5" text-anchor="middle">✓ Private</text>
  <!-- RIGHT SIDE: Wispr Flow (Cloud) -->
  <text x="900" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#EC4899" text-anchor="middle">Wispr Flow</text>
  <text x="900" y="302" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" fill="#EC4899" text-anchor="middle" opacity="0.7">Cloud Processing</text>
  <!-- Arrow from mic to Wispr box -->
  <line x1="720" y1="220" x2="820" y2="315" stroke="#EC4899" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arrowPink)" opacity="0.6"/>
  <!-- Cloud box -->
  <rect x="740" y="320" width="320" height="220" rx="16" fill="white" stroke="#EC4899" stroke-width="2" opacity="0.9"/>
  <rect x="740" y="320" width="320" height="40" rx="16" fill="#EC4899" opacity="0.08"/>
  <!-- Cloud icon -->
  <path d="M 830 340 Q 830 325 850 325 Q 855 315 870 315 Q 885 315 890 325 Q 910 325 910 340 Q 910 352 895 352 L 845 352 Q 830 352 830 340 Z" fill="none" stroke="#EC4899" stroke-width="1.5" opacity="0.5"/>
  <text x="940" y="343" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#EC4899" opacity="0.8">Cloud Servers</text>
  <!-- Process steps -->
  <rect x="765" y="380" width="130" height="40" rx="8" fill="#EC4899" opacity="0.1"/>
  <text x="830" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#EC4899" text-anchor="middle">Audio Upload</text>
  <text x="830" y="418" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#EC4899" text-anchor="middle" opacity="0.6">To OpenAI/Meta</text>
  <line x1="830" y1="420" x2="830" y2="445" stroke="#EC4899" stroke-width="1.5" marker-end="url(#arrowPink)" opacity="0.5"/>
  <rect x="765" y="450" width="130" height="40" rx="8" fill="#EC4899" opacity="0.1"/>
  <text x="830" y="475" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#EC4899" text-anchor="middle">Cloud AI</text>
  <text x="830" y="488" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#EC4899" text-anchor="middle" opacity="0.6">Fine-tuned Llama</text>
  <!-- Output -->
  <rect x="910" y="410" width="130" height="48" rx="8" fill="#EC4899" opacity="0.08" stroke="#EC4899" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="975" y="436" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#EC4899" text-anchor="middle">Clean Text</text>
  <text x="975" y="452" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#EC4899" text-anchor="middle" opacity="0.6">Back to your Mac</text>
  <line x1="895" y1="470" x2="918" y2="440" stroke="#EC4899" stroke-width="1.5" marker-end="url(#arrowPink)" opacity="0.4"/>
  <!-- Labels -->
  <text x="900" y="565" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#EC4899" text-anchor="middle">✗ Requires Internet</text>
  <text x="900" y="585" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#EC4899" text-anchor="middle">✗ $15/month</text>
  <text x="900" y="605" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#EC4899" text-anchor="middle">✗ Cloud Storage</text>
  <!-- Divider -->
  <line x1="600" y1="260" x2="600" y2="630" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="600" y="650" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">VS</text>
</svg>