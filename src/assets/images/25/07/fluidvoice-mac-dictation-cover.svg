<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="4" dy="6" stdDeviation="8" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bgGradient)"/>

  <!-- Decorative wave pattern -->
  <path d="M0,600 Q400,550 800,600 T1600,600 L1600,900 L0,900 Z" fill="rgba(255,255,255,0.05)"/>
  <path d="M0,650 Q400,620 800,650 T1600,650 L1600,900 L0,900 Z" fill="rgba(255,255,255,0.03)"/>

  <!-- Main title -->
  <text x="800" y="200" text-anchor="middle" fill="white" font-size="80" font-weight="bold" font-family="Arial, sans-serif">
    FluidVoice
  </text>

  <!-- Subtitle -->
  <text x="800" y="270" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="36" font-weight="normal" font-family="Arial, sans-serif">
    Free Mac Dictation App
  </text>

  <!-- Microphone icon -->
  <g transform="translate(760, 320)" filter="url(#dropShadow)">
    <rect x="0" y="0" width="80" height="120" rx="40" fill="url(#accentGradient)"/>
    <path d="M20,100 Q20,140 40,160 Q60,140 60,100" fill="none" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <line x1="40" y1="160" x2="40" y2="190" stroke="white" stroke-width="6" stroke-linecap="round"/>
    <line x1="25" y1="190" x2="55" y2="190" stroke="white" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Mac icon -->
  <g transform="translate(1050, 380)" filter="url(#dropShadow)">
    <rect x="0" y="0" width="200" height="130" rx="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <rect x="10" y="10" width="180" height="100" rx="4" fill="rgba(255,255,255,0.1)"/>
    <rect x="60" y="130" width="80" height="10" rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="40" y="140" width="120" height="6" rx="2" fill="rgba(255,255,255,0.15)"/>
  </g>

  <!-- Sound waves -->
  <g transform="translate(350, 380)" opacity="0.6">
    <path d="M0,0 Q30,-40 60,0" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <path d="M-20,10 Q30,-60 80,10" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <path d="M-40,20 Q30,-80 100,20" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Key features -->
  <g transform="translate(200, 600)">
    <rect x="0" y="0" width="350" height="150" rx="15" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <text x="175" y="35" text-anchor="middle" fill="white" font-size="22" font-weight="bold" font-family="Arial, sans-serif">Features</text>
    <text x="20" y="70" fill="rgba(255,255,255,0.9)" font-size="18" font-family="Arial, sans-serif">🎙️ On-Device Processing</text>
    <text x="20" y="100" fill="rgba(255,255,255,0.9)" font-size="18" font-family="Arial, sans-serif">🌐 99 Languages Supported</text>
    <text x="20" y="130" fill="rgba(255,255,255,0.9)" font-size="18" font-family="Arial, sans-serif">🔒 Complete Privacy</text>
  </g>

  <g transform="translate(600, 600)">
    <rect x="0" y="0" width="350" height="150" rx="15" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <text x="175" y="35" text-anchor="middle" fill="white" font-size="22" font-weight="bold" font-family="Arial, sans-serif">Benefits</text>
    <text x="20" y="70" fill="rgba(255,255,255,0.9)" font-size="18" font-family="Arial, sans-serif">⚡ Fast Transcription</text>
    <text x="20" y="100" fill="rgba(255,255,255,0.9)" font-size="18" font-family="Arial, sans-serif">💰 Free Forever</text>
    <text x="20" y="130" fill="rgba(255,255,255,0.9)" font-size="18" font-family="Arial, sans-serif">🔧 Open Source (GPL-3.0)</text>
  </g>

  <g transform="translate(1000, 600)">
    <rect x="0" y="0" width="350" height="150" rx="15" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    <text x="175" y="35" text-anchor="middle" fill="white" font-size="22" font-weight="bold" font-family="Arial, sans-serif">Compatibility</text>
    <text x="20" y="70" fill="rgba(255,255,255,0.9)" font-size="18" font-family="Arial, sans-serif">🍎 Apple Silicon Optimized</text>
    <text x="20" y="100" fill="rgba(255,255,255,0.9)" font-size="18" font-family="Arial, sans-serif">💻 Intel Mac Support</text>
    <text x="20" y="130" fill="rgba(255,255,255,0.9)" font-size="18" font-family="Arial, sans-serif">📦 Homebrew Install</text>
  </g>

  <!-- Branding -->
  <text x="800" y="850" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="20" font-family="Arial, sans-serif">
    bitdoze.com
  </text>
</svg>