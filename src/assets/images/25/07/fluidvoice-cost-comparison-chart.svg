<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <radialGradient id="blob1" cx="20%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="80%" cy="70%" r="30%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.15"/>
    </pattern>
    <linearGradient id="barFV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="barVI" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="barSP" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="barWF" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#blob1)"/>
  <rect width="1200" height="675" fill="url(#blob2)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <!-- Title -->
  <text x="600" y="50" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="800" fill="#0F172A" text-anchor="middle">3-Year Cost Comparison</text>
  <text x="600" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748B" text-anchor="middle">Cumulative cost for Mac dictation apps</text>
  <!-- Chart area: x=140 to 1100, y=110 to 560 -->
  <!-- Y-axis labels and gridlines -->
  <!-- Scale: max $540. Chart height = 450px (y110 to y560). $1 = 0.833px -->
  <!-- $0 -->
  <line x1="140" y1="560" x2="1100" y2="560" stroke="#CBD5E1" stroke-width="1" opacity="0.4"/>
  <text x="130" y="565" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748B" text-anchor="end">$0</text>
  <!-- $100 -->
  <line x1="140" y1="477" x2="1100" y2="477" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,4" opacity="0.25"/>
  <text x="130" y="482" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748B" text-anchor="end">$100</text>
  <!-- $200 -->
  <line x1="140" y1="393" x2="1100" y2="393" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,4" opacity="0.25"/>
  <text x="130" y="398" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748B" text-anchor="end">$200</text>
  <!-- $300 -->
  <line x1="140" y1="310" x2="1100" y2="310" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,4" opacity="0.25"/>
  <text x="130" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748B" text-anchor="end">$300</text>
  <!-- $400 -->
  <line x1="140" y1="227" x2="1100" y2="227" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,4" opacity="0.25"/>
  <text x="130" y="232" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748B" text-anchor="end">$400</text>
  <!-- $500 -->
  <line x1="140" y1="143" x2="1100" y2="143" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,4" opacity="0.25"/>
  <text x="130" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748B" text-anchor="end">$500</text>
  <!-- $540 label -->
  <text x="130" y="114" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94A3B8" text-anchor="end">$540</text>
  <!-- Y-axis line -->
  <line x1="140" y1="110" x2="140" y2="560" stroke="#CBD5E1" stroke-width="1" opacity="0.4"/>
  <!-- X-axis line -->
  <line x1="140" y1="560" x2="1100" y2="560" stroke="#94A3B8" stroke-width="1.5"/>
  <!--
    Chart groups (4 apps × 3 years = 12 bars)
    Group width = (1100-140)/4 = 240px per app
    3 bars per group, bar width = 50px, gap between bars = 10px
    Group start offsets: 140, 380, 620, 860
    Bar positions within group: +30, +90, +150
  -->
  <!-- FluidVoice: $0, $0, $0 — barely visible, show as minimal bars -->
  <rect x="170" y="557" width="50" height="3" rx="2" fill="url(#barFV)" opacity="0.7"/>
  <text x="195" y="550" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#4F46E5" text-anchor="middle">$0</text>
  <rect x="230" y="557" width="50" height="3" rx="2" fill="url(#barFV)" opacity="0.8"/>
  <text x="255" y="550" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#4F46E5" text-anchor="middle">$0</text>
  <rect x="290" y="557" width="50" height="3" rx="2" fill="url(#barFV)" opacity="0.9"/>
  <text x="315" y="550" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#4F46E5" text-anchor="middle">$0</text>
  <!-- VoiceInk: $39, $39, $39 (one-time) -->
  <!-- $39 = 39*0.833 = 32.5px height -->
  <rect x="410" y="527" width="50" height="33" rx="4" fill="url(#barVI)" opacity="0.7"/>
  <text x="435" y="522" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#10B981" text-anchor="middle">$39</text>
  <rect x="470" y="527" width="50" height="33" rx="4" fill="url(#barVI)" opacity="0.8"/>
  <text x="495" y="522" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#10B981" text-anchor="middle">$39</text>
  <rect x="530" y="527" width="50" height="33" rx="4" fill="url(#barVI)" opacity="0.9"/>
  <text x="555" y="522" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#10B981" text-anchor="middle">$39</text>
  <!-- SuperWhisper: $85/yr → $85, $170, $255 -->
  <!-- $85 = 70.8px, $170 = 141.6px, $255 = 212.4px -->
  <rect x="650" y="489" width="50" height="71" rx="4" fill="url(#barSP)" opacity="0.7"/>
  <text x="675" y="484" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#F59E0B" text-anchor="middle">$85</text>
  <rect x="710" y="418" width="50" height="142" rx="4" fill="url(#barSP)" opacity="0.8"/>
  <text x="735" y="413" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#F59E0B" text-anchor="middle">$170</text>
  <rect x="770" y="348" width="50" height="212" rx="4" fill="url(#barSP)" opacity="0.9"/>
  <text x="795" y="343" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#F59E0B" text-anchor="middle">$255</text>
  <!-- Wispr Flow: $144/yr → $144, $288, $432 -->
  <!-- $144 = 120px, $288 = 240px, $432 = 360px -->
  <rect x="890" y="440" width="50" height="120" rx="4" fill="url(#barWF)" opacity="0.7"/>
  <text x="915" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#EC4899" text-anchor="middle">$144</text>
  <rect x="950" y="320" width="50" height="240" rx="4" fill="url(#barWF)" opacity="0.8"/>
  <text x="975" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#EC4899" text-anchor="middle">$288</text>
  <rect x="1010" y="199" width="50" height="361" rx="4" fill="url(#barWF)" opacity="0.9"/>
  <text x="1035" y="194" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#EC4899" text-anchor="middle">$432</text>
  <!-- Year labels under each group -->
  <text x="210" y="583" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Year 1</text>
  <text x="270" y="583" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Year 2</text>
  <text x="330" y="583" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Year 3</text>
  <text x="450" y="583" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Year 1</text>
  <text x="510" y="583" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Year 2</text>
  <text x="570" y="583" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Year 3</text>
  <text x="690" y="583" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Year 1</text>
  <text x="750" y="583" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Year 2</text>
  <text x="810" y="583" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Year 3</text>
  <text x="930" y="583" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Year 1</text>
  <text x="990" y="583" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Year 2</text>
  <text x="1050" y="583" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">Year 3</text>
  <!-- App name labels -->
  <text x="250" y="610" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#4F46E5" text-anchor="middle">FluidVoice</text>
  <text x="490" y="610" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#10B981" text-anchor="middle">VoiceInk</text>
  <text x="730" y="610" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#F59E0B" text-anchor="middle">SuperWhisper</text>
  <text x="970" y="610" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#EC4899" text-anchor="middle">Wispr Flow</text>
  <!-- Callout for FluidVoice -->
  <text x="250" y="637" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#4F46E5" text-anchor="middle" opacity="0.7">Free forever</text>
  <!-- Callout for Wispr Flow -->
  <text x="970" y="637" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#EC4899" text-anchor="middle" opacity="0.7">$432 saved over 3 yrs</text>
  <!-- Legend -->
  <rect x="140" y="650" width="12" height="12" rx="3" fill="url(#barFV)"/>
  <text x="158" y="661" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748B">FluidVoice</text>
  <rect x="260" y="650" width="12" height="12" rx="3" fill="url(#barVI)"/>
  <text x="278" y="661" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748B">VoiceInk</text>
  <rect x="370" y="650" width="12" height="12" rx="3" fill="url(#barSP)"/>
  <text x="388" y="661" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748B">SuperWhisper</text>
  <rect x="520" y="650" width="12" height="12" rx="3" fill="url(#barWF)"/>
  <text x="538" y="661" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748B">Wispr Flow</text>
</svg>