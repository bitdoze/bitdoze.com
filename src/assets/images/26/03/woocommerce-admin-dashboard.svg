<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f3e8ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Dashboard mockup -->
  <rect x="350" y="180" width="900" height="500" rx="16" fill="white" stroke="#c4b5fd" stroke-width="2"/>
  <rect x="350" y="180" width="900" height="50" rx="16" fill="#7c3aed"/>
  <rect x="350" y="214" width="900" height="16" fill="#7c3aed"/>
  <circle cx="382" cy="205" r="8" fill="#fbbf24"/>
  <circle cx="410" cy="205" r="8" fill="#34d399"/>
  <circle cx="438" cy="205" r="8" fill="#f87171"/>

  <!-- Table rows -->
  <rect x="380" y="250" width="840" height="36" rx="6" fill="#f5f3ff"/>
  <rect x="380" y="296" width="840" height="36" rx="6" fill="white" stroke="#e9e5f5" stroke-width="1"/>
  <rect x="380" y="342" width="840" height="36" rx="6" fill="#f5f3ff"/>
  <rect x="380" y="388" width="840" height="36" rx="6" fill="white" stroke="#e9e5f5" stroke-width="1"/>
  <rect x="380" y="434" width="840" height="36" rx="6" fill="#f5f3ff"/>

  <!-- WooCommerce purple accent bars -->
  <rect x="390" y="258" width="60" height="20" rx="4" fill="#7c3aed" opacity="0.3"/>
  <rect x="390" y="304" width="80" height="20" rx="4" fill="#7c3aed" opacity="0.2"/>
  <rect x="390" y="350" width="50" height="20" rx="4" fill="#7c3aed" opacity="0.3"/>
  <rect x="390" y="396" width="70" height="20" rx="4" fill="#7c3aed" opacity="0.2"/>
  <rect x="390" y="442" width="65" height="20" rx="4" fill="#7c3aed" opacity="0.3"/>

  <!-- Status dots -->
  <circle cx="1180" cy="268" r="6" fill="#34d399"/>
  <circle cx="1180" cy="314" r="6" fill="#34d399"/>
  <circle cx="1180" cy="360" r="6" fill="#fbbf24"/>
  <circle cx="1180" cy="406" r="6" fill="#34d399"/>
  <circle cx="1180" cy="452" r="6" fill="#f87171"/>

  <!-- Title -->
  <text x="800" y="780" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="bold" fill="#1e1b4b">WooCommerce Dashboard</text>
  <text x="800" y="840" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="#6d28d9">Modern Product Admin</text>
</svg>
