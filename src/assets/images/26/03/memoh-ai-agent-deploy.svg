<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e7ff"/>
      <stop offset="100%" style="stop-color:#c7d2fe"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)" rx="0"/>
  <!-- Bot icons -->
  <g opacity="0.12">
    <circle cx="200" cy="200" r="60" fill="#6366f1"/>
    <circle cx="1080" cy="520" r="45" fill="#8b5cf6"/>
    <circle cx="350" cy="550" r="35" fill="#6366f1"/>
    <circle cx="950" cy="180" r="50" fill="#8b5cf6"/>
  </g>
  <!-- Container outlines -->
  <g opacity="0.08" stroke="#4f46e5" stroke-width="2" fill="none">
    <rect x="120" y="400" width="100" height="70" rx="8"/>
    <rect x="260" y="400" width="100" height="70" rx="8"/>
    <rect x="400" y="400" width="100" height="70" rx="8"/>
    <rect x="780" y="400" width="100" height="70" rx="8"/>
    <rect x="920" y="400" width="100" height="70" rx="8"/>
    <rect x="1060" y="400" width="100" height="70" rx="8"/>
  </g>
  <!-- Title -->
  <text x="640" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="#312e81">Deploy Memoh</text>
  <text x="640" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="600" fill="#4f46e5">AI Agent Platform</text>
  <!-- Decorative line -->
  <rect x="520" y="410" width="240" height="4" rx="2" fill="url(#accent)"/>
</svg>
