<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8f4f8"/>
      <stop offset="100%" stop-color="#d1e8ff"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- WordPress icon (simplified) -->
  <circle cx="500" cy="420" r="120" fill="#21759b" opacity="0.9"/>
  <text x="500" y="445" text-anchor="middle" font-family="Georgia, serif" font-size="110" font-weight="bold" fill="white">W</text>

  <!-- Arrow -->
  <line x1="680" y1="420" x2="900" y2="420" stroke="#4a5568" stroke-width="6" stroke-linecap="round"/>
  <polygon points="910,420 880,400 880,440" fill="#4a5568"/>

  <!-- Astro icon (simplified rocket) -->
  <circle cx="1080" cy="420" r="120" fill="#ff5d01" opacity="0.9"/>
  <text x="1080" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="100" font-weight="bold" fill="white">🚀</text>

  <!-- Title text -->
  <text x="800" y="700" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="64" font-weight="bold" fill="#1a202c">WP to Astro</text>
  <text x="800" y="770" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="36" fill="#4a5568">Migration Guide</text>
</svg>
