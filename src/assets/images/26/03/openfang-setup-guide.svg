<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" fill="none" role="img" aria-label="OpenFang Setup Guide">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0f1a"/>
      <stop offset="50%" stop-color="#111318"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="titleLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="720"/><line x1="80" y1="0" x2="80" y2="720"/>
    <line x1="160" y1="0" x2="160" y2="720"/><line x1="240" y1="0" x2="240" y2="720"/>
    <line x1="320" y1="0" x2="320" y2="720"/><line x1="400" y1="0" x2="400" y2="720"/>
    <line x1="480" y1="0" x2="480" y2="720"/><line x1="560" y1="0" x2="560" y2="720"/>
    <line x1="640" y1="0" x2="640" y2="720"/><line x1="720" y1="0" x2="720" y2="720"/>
    <line x1="800" y1="0" x2="800" y2="720"/><line x1="880" y1="0" x2="880" y2="720"/>
    <line x1="960" y1="0" x2="960" y2="720"/><line x1="1040" y1="0" x2="1040" y2="720"/>
    <line x1="1120" y1="0" x2="1120" y2="720"/><line x1="1200" y1="0" x2="1200" y2="720"/>
    <line x1="0" y1="80" x2="1280" y2="80"/><line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/><line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/><line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/><line x1="0" y1="640" x2="1280" y2="640"/>
  </g>

  <!-- Glow spots -->
  <circle cx="400" cy="360" r="200" fill="#f97316" opacity="0.05"/>
  <circle cx="880" cy="360" r="200" fill="#fbbf24" opacity="0.05"/>
  <circle cx="640" cy="200" r="150" fill="#ef4444" opacity="0.03"/>

  <!-- Fang icon -->
  <g transform="translate(640, 255)">
    <circle r="75" fill="#1a1a24" stroke="#f97316" stroke-width="2.5" opacity="0.9"/>
    <!-- Fang teeth -->
    <path d="M-30 -10 L-22 25 L-14 -10" fill="#f97316" opacity="0.8"/>
    <path d="M14 -10 L22 25 L30 -10" fill="#f97316" opacity="0.8"/>
    <!-- Eyes -->
    <circle cx="-22" cy="-25" r="8" fill="#fbbf24"/>
    <circle cx="22" cy="-25" r="8" fill="#fbbf24"/>
    <circle cx="-22" cy="-25" r="4" fill="#0a0f1a"/>
    <circle cx="22" cy="-25" r="4" fill="#0a0f1a"/>
    <!-- Gear outline -->
    <circle r="75" fill="none" stroke="#f97316" stroke-width="1" stroke-dasharray="8 6" opacity="0.3"/>
  </g>

  <!-- Title -->
  <text x="640" y="395" text-anchor="middle" fill="white" font-size="52" font-family="system-ui, sans-serif" font-weight="bold">OpenFang Setup</text>
  <rect x="400" y="410" width="480" height="3" rx="2" fill="url(#titleLine)" opacity="0.5"/>

  <!-- Subtitle -->
  <text x="640" y="455" text-anchor="middle" fill="#94a3b8" font-size="20" font-family="system-ui, sans-serif">Agent Operating System</text>

  <!-- Bottom feature pills -->
  <g transform="translate(640, 540)">
    <rect x="-380" y="-16" width="120" height="32" rx="16" fill="#38bdf8" opacity="0.12" stroke="#38bdf8" stroke-width="1"/>
    <text x="-320" y="4" text-anchor="middle" fill="#38bdf8" font-size="13" font-family="system-ui, sans-serif" font-weight="600">MiniMax M2.5</text>

    <rect x="-130" y="-16" width="100" height="32" rx="16" fill="#2dd4bf" opacity="0.12" stroke="#2dd4bf" stroke-width="1"/>
    <text x="-80" y="4" text-anchor="middle" fill="#2dd4bf" font-size="13" font-family="system-ui, sans-serif" font-weight="600">GLM-5</text>

    <rect x="30" y="-16" width="120" height="32" rx="16" fill="#fb923c" opacity="0.12" stroke="#fb923c" stroke-width="1"/>
    <text x="90" y="4" text-anchor="middle" fill="#fb923c" font-size="13" font-family="system-ui, sans-serif" font-weight="600">40 Channels</text>

    <rect x="210" y="-16" width="160" height="32" rx="16" fill="#a78bfa" opacity="0.12" stroke="#a78bfa" stroke-width="1"/>
    <text x="290" y="4" text-anchor="middle" fill="#a78bfa" font-size="13" font-family="system-ui, sans-serif" font-weight="600">16 Security Layers</text>
  </g>

  <!-- Bottom tagline -->
  <text x="640" y="620" text-anchor="middle" fill="#475569" font-size="14" font-family="system-ui, sans-serif">137K Lines of Rust · Single Binary · MIT License</text>

  <!-- SELF-HOSTED badge -->
  <g transform="translate(640, 130)">
    <rect x="-60" y="-16" width="120" height="30" rx="15" fill="#f97316" opacity="0.15" stroke="#f97316" stroke-width="1"/>
    <text x="0" y="3" text-anchor="middle" fill="#f97316" font-size="12" font-family="system-ui, sans-serif" font-weight="bold">SELF-HOSTED</text>
  </g>
</svg>
