<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3e8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ede0fd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGradient)"/>

  <!-- Decorative circles -->
  <circle cx="180" cy="560" r="170" fill="#d8b4fe" opacity="0.3"/>
  <circle cx="1100" cy="160" r="150" fill="#d8b4fe" opacity="0.3"/>

  <!-- Wing icon (left) -->
  <g transform="translate(490, 110)">
    <path d="M100 80 Q60 40 20 60 Q40 30 80 20 Q60 10 30 20 Q50 0 90 10 Q80 5 100 15 Z" fill="#7c3aed" opacity="0.8"/>
  </g>

  <!-- Wing icon (right) -->
  <g transform="translate(640, 110)">
    <path d="M100 80 Q140 40 180 60 Q160 30 120 20 Q140 10 170 20 Q150 0 110 10 Q120 5 100 15 Z" fill="#7c3aed" opacity="0.8"/>
  </g>

  <!-- Helmet/circle center -->
  <circle cx="640" cy="170" r="40" fill="#7c3aed"/>
  <circle cx="640" cy="170" r="30" fill="#a855f7" opacity="0.6"/>

  <!-- Main title -->
  <text x="640" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="68" font-weight="700" fill="#2e1065" text-anchor="middle">Hermes Agent Setup</text>

  <!-- Subtitle -->
  <text x="640" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="400" fill="#6b21a8" text-anchor="middle">Self-Hosted AI Agent</text>

  <!-- Bottom accent bar -->
  <rect x="440" y="510" width="400" height="6" rx="3" fill="url(#accentGradient)"/>

  <!-- Small icons representing features -->
  <g transform="translate(400, 590)" fill="#9f7aea">
    <!-- Terminal icon -->
    <rect x="0" y="0" width="30" height="22" rx="3" fill="none" stroke="#9f7aea" stroke-width="2"/>
    <path d="M6 8 L12 13 L6 18" stroke="#9f7aea" stroke-width="2" fill="none"/>
    <line x1="16" y1="18" x2="24" y2="18" stroke="#9f7aea" stroke-width="2"/>
  </g>

  <g transform="translate(520, 590)" fill="#9f7aea">
    <!-- Chat icon -->
    <path d="M0 4 Q0 0 4 0 L26 0 Q30 0 30 4 L30 18 Q30 22 26 22 L10 22 L4 28 L4 22 Q0 22 0 18 Z"/>
  </g>

  <g transform="translate(640, 590)" fill="#9f7aea">
    <!-- Brain/AI icon -->
    <circle cx="15" cy="12" r="12"/>
    <path d="M8 8 Q15 4 22 8" stroke="#ede0fd" stroke-width="2" fill="none"/>
    <path d="M8 12 Q15 8 22 12" stroke="#ede0fd" stroke-width="2" fill="none"/>
    <path d="M8 16 Q15 12 22 16" stroke="#ede0fd" stroke-width="2" fill="none"/>
  </g>

  <g transform="translate(760, 590)" fill="#9f7aea">
    <!-- Memory icon -->
    <rect x="2" y="0" width="26" height="24" rx="3"/>
    <line x1="8" y1="6" x2="22" y2="6" stroke="#ede0fd" stroke-width="2"/>
    <line x1="8" y1="12" x2="22" y2="12" stroke="#ede0fd" stroke-width="2"/>
    <line x1="8" y1="18" x2="18" y2="18" stroke="#ede0fd" stroke-width="2"/>
  </g>
</svg>
