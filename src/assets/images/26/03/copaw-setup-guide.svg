<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d1ecf1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff9800;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff5722;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGradient)"/>

  <!-- Decorative circles -->
  <circle cx="200" cy="580" r="180" fill="#b3dce6" opacity="0.35"/>
  <circle cx="1080" cy="140" r="160" fill="#b3dce6" opacity="0.35"/>

  <!-- Paw icon -->
  <g transform="translate(540, 140)">
    <!-- Main pad -->
    <ellipse cx="100" cy="100" rx="55" ry="45" fill="#ff9800"/>
    <!-- Toe pads -->
    <ellipse cx="40" cy="55" rx="22" ry="20" fill="#ff9800"/>
    <ellipse cx="100" cy="35" rx="22" ry="20" fill="#ff9800"/>
    <ellipse cx="160" cy="55" rx="22" ry="20" fill="#ff9800"/>
    <!-- Highlights -->
    <ellipse cx="100" cy="95" rx="38" ry="30" fill="#ffb74d" opacity="0.6"/>
    <ellipse cx="40" cy="50" rx="14" ry="12" fill="#ffb74d" opacity="0.6"/>
    <ellipse cx="100" cy="30" rx="14" ry="12" fill="#ffb74d" opacity="0.6"/>
    <ellipse cx="160" cy="50" rx="14" ry="12" fill="#ffb74d" opacity="0.6"/>
  </g>

  <!-- Main title -->
  <text x="640" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#2c3e50" text-anchor="middle">CoPaw Setup Guide</text>

  <!-- Subtitle -->
  <text x="640" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="400" fill="#546e7a" text-anchor="middle">Personal AI Assistant</text>

  <!-- Bottom accent bar -->
  <rect x="440" y="520" width="400" height="6" rx="3" fill="url(#accentGradient)"/>

  <!-- Small icons representing features -->
  <g transform="translate(420, 600)" fill="#7eaab8">
    <!-- Chat icon -->
    <path d="M0 4 Q0 0 4 0 L26 0 Q30 0 30 4 L30 18 Q30 22 26 22 L10 22 L4 28 L4 22 Q0 22 0 18 Z"/>
  </g>

  <g transform="translate(530, 600)" fill="#7eaab8">
    <!-- Server icon -->
    <rect x="0" y="0" width="30" height="24" rx="3"/>
    <line x1="0" y1="8" x2="30" y2="8" stroke="#d1ecf1" stroke-width="2"/>
    <line x1="0" y1="16" x2="30" y2="16" stroke="#d1ecf1" stroke-width="2"/>
  </g>

  <g transform="translate(640, 600)" fill="#7eaab8">
    <!-- Brain/AI icon -->
    <circle cx="15" cy="12" r="12"/>
    <path d="M8 8 Q15 4 22 8" stroke="#d1ecf1" stroke-width="2" fill="none"/>
    <path d="M8 12 Q15 8 22 12" stroke="#d1ecf1" stroke-width="2" fill="none"/>
    <path d="M8 16 Q15 12 22 16" stroke="#d1ecf1" stroke-width="2" fill="none"/>
  </g>

  <g transform="translate(750, 600)" fill="#7eaab8">
    <!-- Gear icon -->
    <circle cx="15" cy="12" r="6" fill="#d1ecf1"/>
    <circle cx="15" cy="12" r="10" stroke="#7eaab8" stroke-width="4" fill="none"/>
    <rect x="13" y="-2" width="4" height="6" fill="#7eaab8"/>
    <rect x="13" y="20" width="4" height="6" fill="#7eaab8"/>
    <rect x="-2" y="10" width="6" height="4" fill="#7eaab8"/>
    <rect x="26" y="10" width="6" height="4" fill="#7eaab8"/>
  </g>
</svg>
