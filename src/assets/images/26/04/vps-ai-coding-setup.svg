<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1b4b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.05" stroke="#818cf8" stroke-width="1">
    <line x1="0" y1="100" x2="1600" y2="100"/>
    <line x1="0" y1="200" x2="1600" y2="200"/>
    <line x1="0" y1="300" x2="1600" y2="300"/>
    <line x1="0" y1="400" x2="1600" y2="400"/>
    <line x1="0" y1="500" x2="1600" y2="500"/>
    <line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="0" y1="700" x2="1600" y2="700"/>
    <line x1="0" y1="800" x2="1600" y2="800"/>
    <line x1="200" y1="0" x2="200" y2="900"/>
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="600" y1="0" x2="600" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1000" y1="0" x2="1000" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
    <line x1="1400" y1="0" x2="1400" y2="900"/>
  </g>

  <!-- Server card (left) -->
  <rect x="80" y="220" width="340" height="460" rx="20" fill="url(#cardGrad)" stroke="#334155" stroke-width="2"/>
  <!-- Server blinkies -->
  <rect x="120" y="270" width="260" height="80" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <circle cx="145" cy="310" r="12" fill="#22c55e" opacity="0.9"/>
  <circle cx="185" cy="310" r="12" fill="#f59e0b" opacity="0.7"/>
  <circle cx="225" cy="310" r="12" fill="#334155"/>
  <rect x="260" y="298" width="100" height="8" rx="4" fill="#334155"/>
  <rect x="260" y="314" width="70" height="8" rx="4" fill="#334155"/>

  <rect x="120" y="370" width="260" height="80" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <circle cx="145" cy="410" r="12" fill="#22c55e" opacity="0.9"/>
  <circle cx="185" cy="410" r="12" fill="#22c55e" opacity="0.7"/>
  <circle cx="225" cy="410" r="12" fill="#334155"/>
  <rect x="260" y="398" width="100" height="8" rx="4" fill="#334155"/>
  <rect x="260" y="414" width="80" height="8" rx="4" fill="#334155"/>

  <rect x="120" y="470" width="260" height="80" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <circle cx="145" cy="510" r="12" fill="#334155"/>
  <circle cx="185" cy="510" r="12" fill="#334155"/>
  <circle cx="225" cy="510" r="12" fill="#334155"/>
  <rect x="260" y="498" width="100" height="8" rx="4" fill="#334155"/>
  <rect x="260" y="514" width="60" height="8" rx="4" fill="#334155"/>

  <text x="250" y="620" font-family="Arial, sans-serif" font-size="22" fill="#64748b" text-anchor="middle">VPS SERVER</text>

  <!-- Terminal card (center) -->
  <rect x="630" y="160" width="480" height="580" rx="20" fill="url(#cardGrad)" stroke="#4f46e5" stroke-width="2"/>
  <!-- Terminal top bar -->
  <rect x="630" y="160" width="480" height="50" rx="20" fill="#1e293b"/>
  <rect x="630" y="185" width="480" height="25" fill="#1e293b"/>
  <circle cx="670" cy="185" r="10" fill="#ef4444" opacity="0.8"/>
  <circle cx="700" cy="185" r="10" fill="#f59e0b" opacity="0.8"/>
  <circle cx="730" cy="185" r="10" fill="#22c55e" opacity="0.8"/>

  <!-- Terminal content -->
  <text x="660" y="250" font-family="monospace" font-size="20" fill="#818cf8">$ ssh-keygen -t ed25519</text>
  <text x="660" y="285" font-family="monospace" font-size="20" fill="#94a3b8">Generating public/private key...</text>
  <text x="660" y="325" font-family="monospace" font-size="20" fill="#818cf8">$ adduser aidev</text>
  <text x="660" y="360" font-family="monospace" font-size="20" fill="#94a3b8">Adding user 'aidev'...</text>
  <text x="660" y="400" font-family="monospace" font-size="20" fill="#818cf8">$ curl -fsSL https://install.crowdsec.net | sh</text>
  <text x="660" y="435" font-family="monospace" font-size="20" fill="#22c55e">✓ CrowdSec installed</text>
  <text x="660" y="475" font-family="monospace" font-size="20" fill="#818cf8">$ curl -fsSL https://opencode.ai/install | bash</text>
  <text x="660" y="510" font-family="monospace" font-size="20" fill="#22c55e">✓ opencode installed</text>
  <text x="660" y="550" font-family="monospace" font-size="20" fill="#818cf8">$ opencode</text>
  <text x="660" y="585" font-family="monospace" font-size="20" fill="#c084fc">◆ opencode v0.1 ready</text>
  <!-- Cursor blink -->
  <rect x="660" y="620" width="12" height="24" fill="#818cf8" opacity="0.9"/>

  <!-- Mac laptop card (right) -->
  <rect x="1180" y="220" width="340" height="320" rx="20" fill="url(#cardGrad)" stroke="#334155" stroke-width="2"/>
  <rect x="1200" y="245" width="300" height="180" rx="8" fill="#0f172a"/>
  <text x="1215" y="285" font-family="monospace" font-size="18" fill="#22c55e">Host ai-server</text>
  <text x="1215" y="310" font-family="monospace" font-size="18" fill="#94a3b8">  HostName 1.2.3.4</text>
  <text x="1215" y="335" font-family="monospace" font-size="18" fill="#94a3b8">  User aidev</text>
  <text x="1215" y="360" font-family="monospace" font-size="18" fill="#94a3b8">  IdentityFile ~/.ssh/id_ed25519</text>
  <text x="1350" y="460" font-family="Arial, sans-serif" font-size="20" fill="#64748b" text-anchor="middle">~/.ssh/config</text>
  <!-- Laptop bottom -->
  <rect x="1160" y="540" width="380" height="20" rx="5" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <!-- Zed and VSCode badges -->
  <rect x="1185" y="580" width="145" height="50" rx="10" fill="#1e293b" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="1257" y="611" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#818cf8" text-anchor="middle">Zed IDE</text>
  <rect x="1370" y="580" width="145" height="50" rx="10" fill="#1e293b" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="1443" y="611" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#38bdf8" text-anchor="middle">VS Code</text>

  <!-- SSH connection arrows -->
  <line x1="420" y1="450" x2="625" y2="450" stroke="url(#accentGrad)" stroke-width="3" stroke-dasharray="10,5"/>
  <polygon points="618,440 635,450 618,460" fill="#818cf8"/>
  <line x1="1110" y1="450" x2="1175" y2="380" stroke="url(#accentGrad)" stroke-width="3" stroke-dasharray="10,5"/>
  <polygon points="1170,370 1180,388 1158,380" fill="#c084fc"/>

  <!-- SSH label -->
  <rect x="480" y="425" width="80" height="28" rx="6" fill="#312e81"/>
  <text x="520" y="444" font-family="monospace" font-size="16" fill="#a5b4fc" text-anchor="middle">SSH</text>

  <!-- Main title -->
  <text x="800" y="95" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">VPS AI Dev Server</text>

  <!-- Subtitle bar -->
  <rect x="500" y="112" width="600" height="4" rx="2" fill="url(#accentGrad)"/>
</svg>
