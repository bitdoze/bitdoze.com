<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dbeafe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bgGradient)"/>

  <!-- Decorative circles -->
  <circle cx="200" cy="580" r="160" fill="#93c5fd" opacity="0.25"/>
  <circle cx="1080" cy="140" r="140" fill="#c4b5fd" opacity="0.25"/>
  <circle cx="640" cy="360" r="260" fill="#bfdbfe" opacity="0.15"/>

  <!-- Connection line -->
  <line x1="380" y1="360" x2="900" y2="360" stroke="url(#accentGradient)" stroke-width="4" stroke-dasharray="12,8" opacity="0.5"/>

  <!-- Hermes icon (left) -->
  <g transform="translate(280, 280)">
    <circle cx="60" cy="60" r="55" fill="#2563eb" opacity="0.15"/>
    <circle cx="60" cy="60" r="40" fill="#2563eb" opacity="0.9"/>
    <text x="60" y="70" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="28" font-weight="bold">H</text>
  </g>

  <!-- Plus sign -->
  <g transform="translate(600, 330)">
    <text x="40" y="45" text-anchor="middle" fill="#6366f1" font-family="Arial, sans-serif" font-size="48" font-weight="bold">+</text>
  </g>

  <!-- MIMO icon (right) -->
  <g transform="translate(840, 280)">
    <circle cx="60" cy="60" r="55" fill="#7c3aed" opacity="0.15"/>
    <circle cx="60" cy="60" r="40" fill="#7c3aed" opacity="0.9"/>
    <text x="60" y="70" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="28" font-weight="bold">M</text>
  </g>

  <!-- Main title -->
  <text x="640" y="180" text-anchor="middle" fill="#1e3a5f" font-family="Arial, sans-serif" font-size="58" font-weight="bold">Hermes + MIMO V2 Pro</text>

  <!-- Subtitle -->
  <text x="640" y="540" text-anchor="middle" fill="#475569" font-family="Arial, sans-serif" font-size="30">Free AI Model Access</text>

  <!-- Small decorative dots -->
  <circle cx="440" cy="440" r="6" fill="#2563eb" opacity="0.3"/>
  <circle cx="840" cy="280" r="4" fill="#7c3aed" opacity="0.3"/>
  <circle cx="500" cy="260" r="5" fill="#6366f1" opacity="0.25"/>
  <circle cx="780" cy="450" r="5" fill="#6366f1" opacity="0.25"/>
</svg>
