<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFEDD5"/>
      <stop offset="100%" stop-color="#FDBA74"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="15" stdDeviation="25" flood-color="#7C2D12" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  <rect x="80" y="120" width="800" height="300" rx="32" fill="white" filter="url(#shadow)"/>
  <text x="480" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="76" fill="#7C2D12">Pi Agent</text>
  <text x="480" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="76" fill="#9A3412">Setup Guide</text>
</svg>
