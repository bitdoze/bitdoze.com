<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="100%" stop-color="#EDE9FE"/>
    </linearGradient>
    <radialGradient id="glow1" cx="300" cy="200" r="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="900" cy="450" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="600" cy="100" r="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="piGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="termGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E1B4B"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#C4B5FD" stroke-width="1" opacity="0.25"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  
  <!-- Ambient glows -->
  <rect width="1200" height="675" fill="url(#glow1)"/>
  <rect width="1200" height="675" fill="url(#glow2)"/>
  <rect width="1200" height="675" fill="url(#glow3)"/>
  
  <!-- Category badge -->
  <rect x="440" y="65" width="320" height="36" rx="18" fill="#7C3AED" opacity="0.1"/>
  <rect x="440" y="65" width="320" height="36" rx="18" stroke="#7C3AED" stroke-width="1.5" fill="none" opacity="0.3"/>
  <text x="600" y="89" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#7C3AED" text-anchor="middle" letter-spacing="2">TERMINAL AGENT</text>
  
  <!-- Central terminal window -->
  <g transform="translate(600, 250)">
    <!-- Terminal frame -->
    <rect x="-150" y="-100" width="300" height="200" rx="12" fill="url(#termGrad)" stroke="#4338CA" stroke-width="2"/>
    <!-- Title bar -->
    <rect x="-150" y="-100" width="300" height="30" rx="12" fill="#312E81"/>
    <rect x="-150" y="-76" width="300" height="6" fill="#312E81"/>
    <!-- Window dots -->
    <circle cx="-125" cy="-85" r="6" fill="#EF4444" opacity="0.8"/>
    <circle cx="-105" cy="-85" r="6" fill="#F59E0B" opacity="0.8"/>
    <circle cx="-85" cy="-85" r="6" fill="#10B981" opacity="0.8"/>
    <!-- Terminal content -->
    <text x="-120" y="-45" font-family="monospace" font-size="14" fill="#A78BFA">$ pi</text>
    <text x="-120" y="-25" font-family="monospace" font-size="12" fill="#818CF8">Pi Coding Agent v1.0</text>
    <text x="-120" y="-5" font-family="monospace" font-size="12" fill="#6EE7B7">✓ read</text>
    <text x="-40" y="-5" font-family="monospace" font-size="12" fill="#6EE7B7">✓ write</text>
    <text x="40" y="-5" font-family="monospace" font-size="12" fill="#6EE7B7">✓ edit</text>
    <text x="-120" y="15" font-family="monospace" font-size="12" fill="#6EE7B7">✓ bash</text>
    <text x="-40" y="15" font-family="monospace" font-size="12" fill="#FCD34D">+ extensions</text>
    <text x="-120" y="45" font-family="monospace" font-size="14" fill="#C4B5FD">&gt; _</text>
    <!-- Blinking cursor -->
    <rect x="-105" y="35" width="10" height="16" fill="#C4B5FD" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
  
  <!-- Pi logo/text -->
  <text x="600" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="url(#piGrad)" text-anchor="middle" letter-spacing="-2">Pi Agent</text>
  
  <!-- Subtitle -->
  <text x="600" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#64748B" text-anchor="middle" font-weight="400">Setup Guide &amp; Best Extensions</text>
  
  <!-- Feature chips -->
  <g transform="translate(600, 520)">
    <rect x="-300" y="-15" width="130" height="32" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="-235" y="7" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#7C3AED" text-anchor="middle" font-weight="500">20+ Providers</text>
    
    <rect x="-150" y="-15" width="120" height="32" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="-90" y="7" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4F46E5" text-anchor="middle" font-weight="500">Extensions</text>
    
    <rect x="-10" y="-15" width="110" height="32" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="45" y="7" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#6366F1" text-anchor="middle" font-weight="500">MCP Support</text>
    
    <rect x="120" y="-15" width="120" height="32" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="180" y="7" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8B5CF6" text-anchor="middle" font-weight="500">Sub-agents</text>
  </g>
  
  <!-- Bottom info -->
  <g transform="translate(600, 580)">
    <text x="-200" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle">Open Source</text>
    <circle cx="-120" cy="-4" r="3" fill="#CBD5E1"/>
    <text x="-40" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle">TypeScript</text>
    <circle cx="40" cy="-4" r="3" fill="#CBD5E1"/>
    <text x="120" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle">Free</text>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="100" cy="100" r="4" fill="#8B5CF6" opacity="0.15"/>
  <circle cx="1100" cy="575" r="4" fill="#6366F1" opacity="0.15"/>
  <circle cx="150" cy="550" r="3" fill="#EC4899" opacity="0.12"/>
  <circle cx="1050" cy="125" r="3" fill="#7C3AED" opacity="0.12"/>
  <circle cx="80" cy="350" r="5" fill="#4F46E5" opacity="0.1"/>
  <circle cx="1120" cy="350" r="5" fill="#A78BFA" opacity="0.1"/>
  
  <!-- Footer -->
  <text x="600" y="650" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">bitdoze.com</text>
</svg>
