<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a3d9f5"/>
      <stop offset="100%" stop-color="#4a90d9"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Three shell icons -->
  <g transform="translate(320, 380)">
    <rect x="-60" y="-60" width="120" height="120" rx="20" fill="rgba(255,255,255,0.15)"/>
    <text x="0" y="10" text-anchor="middle" fill="white" font-size="36" font-family="system-ui, sans-serif" font-weight="bold">></text>
    <text x="0" y="50" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="16" font-family="system-ui, sans-serif">Fish</text>
  </g>
  <g transform="translate(640, 380)">
    <rect x="-60" y="-60" width="120" height="120" rx="20" fill="rgba(255,255,255,0.15)"/>
    <text x="0" y="10" text-anchor="middle" fill="white" font-size="36" font-family="system-ui, sans-serif" font-weight="bold">$</text>
    <text x="0" y="50" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="16" font-family="system-ui, sans-serif">Bash</text>
  </g>
  <g transform="translate(960, 380)">
    <rect x="-60" y="-60" width="120" height="120" rx="20" fill="rgba(255,255,255,0.15)"/>
    <text x="0" y="10" text-anchor="middle" fill="white" font-size="36" font-family="system-ui, sans-serif" font-weight="bold">%</text>
    <text x="0" y="50" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="16" font-family="system-ui, sans-serif">Zsh</text>
  </g>

  <!-- VS labels -->
  <text x="480" y="390" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="22" font-family="system-ui, sans-serif">vs</text>
  <text x="800" y="390" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="22" font-family="system-ui, sans-serif">vs</text>

  <!-- Title -->
  <!-- Terminal + Fish icons -->
  <g transform="translate(640, 130)">
    <g transform="translate(-38, 0)">
      <rect x="-24" y="-19" width="48" height="38" rx="6" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1.5"/>
      <text x="0" y="5" text-anchor="middle" fill="white" font-size="18" font-family="monospace">&gt;_</text>
    </g>
    <g transform="translate(38, 0)">
      <path d="M-20,0 C-14,-15 8,-15 18,-5 L28,-14 L28,14 L18,5 C8,15 -14,15 -20,0 Z" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1.5"/>
      <circle cx="10" cy="-4" r="2.5" fill="white"/>
    </g>
  </g>
  <text x="640" y="200" text-anchor="middle" fill="white" font-size="67" font-family="system-ui, sans-serif" font-weight="bold">Fish vs Bash vs Zsh</text>
  <text x="640" y="250" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="24" font-family="system-ui, sans-serif">Complete Shell Comparison</text>

  <text x="640" y="580" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="16" font-family="system-ui, sans-serif">bitdoze.com</text>
</svg>