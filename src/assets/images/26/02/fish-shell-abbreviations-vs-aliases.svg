<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5c06b"/>
      <stop offset="100%" stop-color="#d4943a"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Two code blocks -->
  <g transform="translate(380, 400)">
    <rect x="-110" y="-55" width="220" height="110" rx="14" fill="rgba(255,255,255,0.15)"/>
    <text x="0" y="-10" text-anchor="middle" fill="white" font-size="16" font-family="monospace">abbr gco git..</text>
    <text x="0" y="30" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="18" font-family="system-ui, sans-serif">Abbreviations</text>
  </g>
  <g transform="translate(900, 400)">
    <rect x="-110" y="-55" width="220" height="110" rx="14" fill="rgba(255,255,255,0.15)"/>
    <text x="0" y="-10" text-anchor="middle" fill="white" font-size="16" font-family="monospace">alias gco git..</text>
    <text x="0" y="30" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="18" font-family="system-ui, sans-serif">Aliases</text>
  </g>

  <text x="640" y="400" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="28" font-family="system-ui, sans-serif">vs</text>

  <!-- Title -->
  <!-- Terminal + Fish icons -->
  <g transform="translate(640, 115)">
    <g transform="translate(-38, 0)">
      <rect x="-24" y="-19" width="48" height="38" rx="6" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1.5"/>
      <text x="0" y="5" text-anchor="middle" fill="white" font-size="18" font-family="monospace">&gt;_</text>
    </g>
    <g transform="translate(38, 0)">
      <path d="M-20,0 C-14,-15 8,-15 18,-5 L28,-14 L28,14 L18,5 C8,15 -14,15 -20,0 Z" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1.5"/>
      <circle cx="10" cy="-4" r="2.5" fill="white"/>
    </g>
  </g>
  <text x="640" y="185" text-anchor="middle" fill="white" font-size="59" font-family="system-ui, sans-serif" font-weight="bold">Abbreviations vs Aliases</text>
  <text x="640" y="240" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="24" font-family="system-ui, sans-serif">Fish Shell</text>

  <text x="640" y="580" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="16" font-family="system-ui, sans-serif">bitdoze.com</text>
</svg>
