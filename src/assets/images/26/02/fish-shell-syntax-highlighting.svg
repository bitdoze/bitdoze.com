      <stop offset="0%" stop-color="#f0c070"/>
      <stop offset="100%" stop-color="#c08030"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="330" y="330" width="620" height="110" rx="12" fill="rgba(0,0,0,0.2)"/>
