<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#161b22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2332;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)" rx="0"/>
  <!-- Ollama-inspired llama silhouette -->
  <g transform="translate(640, 240)">
    <circle cx="0" cy="0" r="90" fill="#ffffff" opacity="0.12"/>
    <circle cx="0" cy="0" r="65" fill="#ffffff" opacity="0.08"/>
    <!-- Server rack icon -->
    <rect x="-30" y="-40" width="60" height="80" rx="6" fill="none" stroke="#58a6ff" stroke-width="3"/>
    <line x1="-20" y1="-15" x2="20" y2="-15" stroke="#58a6ff" stroke-width="2"/>
    <line x1="-20" y1="10" x2="20" y2="10" stroke="#58a6ff" stroke-width="2"/>
    <circle cx="15" cy="-27" r="4" fill="#3fb950"/>
    <circle cx="15" cy="-2" r="4" fill="#3fb950"/>
    <circle cx="15" cy="23" r="4" fill="#f0883e"/>
  </g>
  <!-- Title -->
  <text x="640" y="420" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">OpenClaw + Ollama</text>
  <text x="640" y="490" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="normal" fill="#58a6ff" text-anchor="middle">Local Models Guide</text>
</svg>
