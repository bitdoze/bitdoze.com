<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c23152;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)" rx="0"/>
  <!-- Shield icon -->
  <g transform="translate(640, 260)">
    <path d="M0-120 L80-80 L80 20 Q80 100 0 130 Q-80 100 -80 20 L-80-80 Z" fill="url(#shield)" opacity="0.9"/>
    <path d="M-25-10 L-8 10 L30-30" stroke="#fff" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Title text -->
  <text x="640" y="450" font-family="Arial, Helvetica, sans-serif" font-size="62" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="2">OpenClaw Security</text>
  <text x="640" y="520" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="normal" fill="#e94560" text-anchor="middle" letter-spacing="1">Hardening Guide 2026</text>
</svg>
