<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ec8a0"/>
      <stop offset="100%" stop-color="#3a9d6a"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Two shell boxes -->
  <g transform="translate(420, 390)">
    <rect x="-80" y="-70" width="160" height="140" rx="20" fill="rgba(255,255,255,0.15)"/>
    <text x="0" y="5" text-anchor="middle" fill="white" font-size="40" font-family="system-ui, sans-serif" font-weight="bold">></text>
    <text x="0" y="50" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="20" font-family="system-ui, sans-serif">Fish</text>
  </g>
  <g transform="translate(860, 390)">
    <rect x="-80" y="-70" width="160" height="140" rx="20" fill="rgba(255,255,255,0.15)"/>
    <text x="0" y="5" text-anchor="middle" fill="white" font-size="40" font-family="system-ui, sans-serif" font-weight="bold">%</text>
    <text x="0" y="50" text-anchor="middle" fill="rgba(255,255,255,0.8)" font-size="20" font-family="system-ui, sans-serif">Zsh</text>
  </g>

  <text x="640" y="400" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="28" font-family="system-ui, sans-serif">vs</text>

  <!-- Title -->
  <!-- Terminal + Fish icons -->
  <g transform="translate(640, 110)">
    <g transform="translate(-38, 0)">
      <rect x="-24" y="-19" width="48" height="38" rx="6" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1.5"/>
      <text x="0" y="5" text-anchor="middle" fill="white" font-size="18" font-family="monospace">&gt;_</text>
