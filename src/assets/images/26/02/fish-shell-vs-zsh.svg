      <circle cx="10" cy="-4" r="2.5" fill="white"/>
    </g>
  </g>
  <text x="640" y="180" text-anchor="middle" fill="white" font-size="67" font-family="system-ui, sans-serif" font-weight="bold">Fish Shell vs Zsh</text>
  <text x="640" y="235" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="24" font-family="system-ui, sans-serif">Which one to pick?</text>

