      <stop offset="100%" stop-color="#b07040"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="360" y="340" width="560" height="100" rx="12" fill="rgba(0,0,0,0.2)"/>
