<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F3EFFA"/>
      <stop offset="55%" stop-color="#E6DEF5"/>
      <stop offset="100%" stop-color="#D4C7EE"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7B4DDB"/>
      <stop offset="100%" stop-color="#5A2FB8"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1340" cy="170" r="150" fill="#5A2FB8" opacity="0.07"/>
  <circle cx="210" cy="720" r="120" fill="#5A2FB8" opacity="0.06"/>
  <!-- Title -->
  <text x="800" y="248" font-family="system-ui, -apple-system, sans-serif" font-size="94" font-weight="800" fill="#1c1330" text-anchor="middle" letter-spacing="-2">Build an AI Agent</text>
  <text x="800" y="336" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="600" fill="#5A2FB8" text-anchor="middle">with Mastra</text>
  <!-- Central agent node -->
  <g transform="translate(640,430)">
    <rect x="0" y="0" width="320" height="160" rx="22" fill="url(#node)"/>
    <circle cx="52" cy="46" r="13" fill="#ffffff" opacity="0.9"/>
    <circle cx="92" cy="46" r="13" fill="#ffffff" opacity="0.65"/>
    <circle cx="132" cy="46" r="13" fill="#ffffff" opacity="0.45"/>
    <text x="160" y="118" font-family="ui-monospace, SFMono-Regular, monospace" font-size="42" font-weight="700" fill="#ffffff" text-anchor="middle">assistant</text>
  </g>
  <!-- Connector lines to satellites -->
  <g stroke="#1c1330" stroke-width="6" fill="none" opacity="0.55">
    <line x1="640" y1="510" x2="430" y2="640"/>
    <line x1="960" y1="510" x2="1170" y2="640"/>
  </g>
  <!-- Left satellite: tools -->
  <g transform="translate(300,640)">
    <rect x="0" y="0" width="260" height="120" rx="16" fill="#ffffff" stroke="#5A2FB8" stroke-width="5"/>
    <rect x="28" y="34" width="120" height="16" rx="8" fill="#C9B6F0"/>
    <rect x="28" y="66" width="180" height="16" rx="8" fill="#E6DEF5"/>
  </g>
  <!-- Right satellite: channels -->
  <g transform="translate(1040,640)">
    <rect x="0" y="0" width="260" height="120" rx="16" fill="#ffffff" stroke="#5A2FB8" stroke-width="5"/>
    <circle cx="50" cy="60" r="22" fill="#5865F2"/>
    <path d="M42 50 q8 -4 16 0 q8 4 16 0 v14 q-8 4 -16 0 q-8 -4 -16 0 Z" fill="#ffffff" opacity="0.9"/>
    <rect x="92" y="48" width="130" height="14" rx="7" fill="#C9B6F0"/>
    <rect x="92" y="72" width="100" height="14" rx="7" fill="#E6DEF5"/>
  </g>
  <!-- Footer -->
  <text x="800" y="822" font-family="ui-monospace, SFMono-Regular, monospace" font-size="28" font-weight="600" fill="#5a4a78" text-anchor="middle">tools &#183; memory &#183; browser &#183; discord</text>
</svg>
