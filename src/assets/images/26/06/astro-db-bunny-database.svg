<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF4EB"/>
      <stop offset="55%" stop-color="#FFE7D1"/>
      <stop offset="100%" stop-color="#FFD9B8"/>
    </linearGradient>
    <linearGradient id="db" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8A3D"/>
      <stop offset="100%" stop-color="#FF6A00"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1320" cy="180" r="150" fill="#FF6A00" opacity="0.07"/>
  <circle cx="220" cy="700" r="120" fill="#FF6A00" opacity="0.06"/>
  <!-- Title -->
  <text x="800" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="88" font-weight="800" fill="#1a1a2e" text-anchor="middle" letter-spacing="-2">Astro DB + Bunny</text>
  <text x="800" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="600" fill="#FF6A00" text-anchor="middle">Local-first dev, libSQL in production</text>
  <!-- Astro rocket mark -->
  <g transform="translate(500,440)">
    <circle cx="120" cy="95" r="92" fill="#ffffff" stroke="#FF6A00" stroke-width="5"/>
    <path d="M120 35 L150 150 L120 128 L90 150 Z" fill="url(#db)"/>
    <circle cx="120" cy="92" r="14" fill="#FFB27D"/>
  </g>
  <!-- Sync arrows -->
  <g stroke="#1a1a2e" stroke-width="6" fill="none">
    <line x1="730" y1="510" x2="850" y2="510"/>
    <path d="M835 495 L855 510 L835 525" fill="#1a1a2e" stroke="none"/>
    <line x1="850" y1="560" x2="730" y2="560"/>
    <path d="M745 545 L725 560 L745 575" fill="#1a1a2e" stroke="none"/>
  </g>
  <!-- Database cylinder -->
  <g transform="translate(880,455)">
    <path d="M0 30 V160 a120 34 0 0 0 240 0 V30" fill="url(#db)"/>
    <ellipse cx="120" cy="30" rx="120" ry="34" fill="#FFB27D"/>
    <ellipse cx="120" cy="30" rx="120" ry="34" fill="none" stroke="#FF6A00" stroke-width="4"/>
    <ellipse cx="120" cy="95" rx="120" ry="34" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.5"/>
    <text x="120" y="160" font-family="ui-monospace, SFMono-Regular, monospace" font-size="40" font-weight="700" fill="#ffffff" text-anchor="middle">Bunny DB</text>
  </g>
  <!-- Footer -->
  <text x="800" y="820" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="600" fill="#9a5a2e" text-anchor="middle">@astrojs/db &#183; libSQL &#183; Bunny.net</text>
</svg>
