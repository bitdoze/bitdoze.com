<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="50%" stop-color="#152138"/>
      <stop offset="100%" stop-color="#0d1a2e"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c2ff"/>
      <stop offset="100%" stop-color="#0088cc"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="dropShadow">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bgGrad)"/>

  <circle cx="180" cy="220" r="240" fill="#00c2ff" opacity="0.06"/>
  <circle cx="1420" cy="700" r="260" fill="#22c55e" opacity="0.05"/>

  <!-- Browser window losing extension -->
  <g transform="translate(360, 360)" filter="url(#dropShadow)">
    <rect x="-150" y="-110" width="300" height="220" rx="14" fill="#1e2c47" stroke="#33415c" stroke-width="2"/>
    <rect x="-150" y="-110" width="300" height="40" rx="14" fill="#26344f"/>
    <circle cx="-128" cy="-90" r="6" fill="#ef4444"/>
    <circle cx="-108" cy="-90" r="6" fill="#f59e0b"/>
    <circle cx="-88" cy="-90" r="6" fill="#22c55e"/>
    <!-- disabled extension puzzle piece -->
    <g transform="translate(0, 5)" opacity="0.85">
      <path d="M-30 -30 h25 a12 12 0 0 1 24 0 h25 v25 a12 12 0 0 0 0 24 v25 h-74 v-74 z" fill="#64748b"/>
      <line x1="-55" y1="-55" x2="55" y2="55" stroke="#ef4444" stroke-width="9" stroke-linecap="round"/>
    </g>
    <text x="0" y="92" text-anchor="middle" fill="#94a3b8" font-size="18" font-family="Arial, sans-serif">Manifest V2 disabled</text>
  </g>

  <!-- Arrow to DNS -->
  <g stroke="#00c2ff" stroke-width="4" fill="none" opacity="0.6">
    <path d="M540 360 L700 360" marker-end="url(#ah)"/>
  </g>
  <polygon points="700,348 728,360 700,372" fill="#00c2ff" opacity="0.7"/>

  <!-- Central DNS shield -->
  <g transform="translate(900, 360)" filter="url(#dropShadow)">
    <path d="M0 -150 L105 -108 L105 30 C105 105 0 168 0 168 C0 168 -105 105 -105 30 L-105 -108 Z" fill="url(#shieldGrad)" filter="url(#softGlow)"/>
    <path d="M0 -118 L80 -84 L80 22 C80 78 0 132 0 132 C0 132 -80 78 -80 22 L-80 -84 Z" fill="none" stroke="white" stroke-width="2" opacity="0.4"/>
    <text x="0" y="0" text-anchor="middle" fill="white" font-size="44" font-weight="bold" font-family="Arial, sans-serif">DNS</text>
    <text x="0" y="42" text-anchor="middle" fill="white" font-size="20" font-family="Arial, sans-serif" opacity="0.85">Ads Blocked</text>
  </g>

  <!-- Devices protected on the right -->
  <g transform="translate(1300, 360)" fill="#cbd5e1" opacity="0.9">
    <g transform="translate(0,-110)">
      <rect x="-34" y="-22" width="68" height="44" rx="5" fill="#3b82f6"/>
      <text x="0" y="46" text-anchor="middle" fill="#94a3b8" font-size="15" font-family="Arial, sans-serif">Laptop</text>
    </g>
    <g transform="translate(0,20)">
      <rect x="-18" y="-30" width="36" height="60" rx="6" fill="#22c55e"/>
      <text x="0" y="50" text-anchor="middle" fill="#94a3b8" font-size="15" font-family="Arial, sans-serif">Phone</text>
    </g>
    <g transform="translate(0,150)">
      <rect x="-40" y="-24" width="80" height="48" rx="5" fill="#a855f7"/>
      <text x="0" y="46" text-anchor="middle" fill="#94a3b8" font-size="15" font-family="Arial, sans-serif">Smart TV</text>
    </g>
  </g>

  <g stroke="#22c55e" stroke-width="3" fill="none" opacity="0.4">
    <path d="M1010 320 Q1150 250 1260 250"/>
    <path d="M1010 360 Q1150 380 1260 380"/>
    <path d="M1010 410 Q1150 500 1260 510"/>
  </g>

  <!-- Title -->
  <text x="800" y="660" text-anchor="middle" fill="white" font-size="62" font-weight="bold" font-family="Arial, sans-serif">
    Block Ads After Manifest V3
  </text>
  <text x="800" y="722" text-anchor="middle" fill="#94a3b8" font-size="28" font-family="Arial, sans-serif">
    Network-Wide DNS Protection
  </text>

  <!-- Top badge -->
  <g transform="translate(800, 80)">
    <rect x="-110" y="-25" width="220" height="50" rx="25" fill="none" stroke="#00c2ff" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" fill="#00c2ff" font-size="20" font-weight="bold" font-family="Arial, sans-serif" letter-spacing="3">GUIDE 2026</text>
  </g>

  <g opacity="0.5" stroke-width="3" fill="none">
    <path d="M20 60 L20 20 L60 20" stroke="#00c2ff"/>
    <path d="M1540 20 L1580 20 L1580 60" stroke="#22c55e"/>
    <path d="M20 840 L20 880 L60 880" stroke="#22c55e"/>
    <path d="M1540 880 L1580 880 L1580 840" stroke="#00c2ff"/>
  </g>
</svg>
