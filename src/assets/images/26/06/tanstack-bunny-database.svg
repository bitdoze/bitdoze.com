<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF4EB"/>
      <stop offset="55%" stop-color="#FFE7D1"/>
      <stop offset="100%" stop-color="#FFD9B8"/>
    </linearGradient>
    <linearGradient id="db" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8A3D"/>
      <stop offset="100%" stop-color="#FF6A00"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1320" cy="180" r="150" fill="#FF6A00" opacity="0.07"/>
  <circle cx="220" cy="700" r="120" fill="#FF6A00" opacity="0.06"/>
  <!-- Title -->
  <text x="800" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="86" font-weight="800" fill="#1a1a2e" text-anchor="middle" letter-spacing="-2">TanStack + Bunny DB</text>
  <text x="800" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="600" fill="#FF6A00" text-anchor="middle">Type-safe full-stack with Drizzle</text>
  <!-- App window -->
  <g transform="translate(470,440)">
    <rect x="0" y="0" width="250" height="180" rx="16" fill="#ffffff" stroke="#FF6A00" stroke-width="5"/>
    <rect x="0" y="0" width="250" height="40" rx="16" fill="#FF6A00"/>
    <rect x="0" y="24" width="250" height="16" fill="#FF6A00"/>
    <circle cx="24" cy="20" r="7" fill="#ffffff" opacity="0.8"/>
    <circle cx="48" cy="20" r="7" fill="#ffffff" opacity="0.6"/>
    <rect x="24" y="70" width="160" height="18" rx="9" fill="#FFB27D"/>
    <rect x="24" y="104" width="200" height="18" rx="9" fill="#FFD9B8"/>
    <rect x="24" y="138" width="120" height="18" rx="9" fill="#FFD9B8"/>
  </g>
  <!-- Arrow -->
  <g stroke="#1a1a2e" stroke-width="6" fill="none">
    <line x1="760" y1="530" x2="870" y2="530"/>
    <path d="M855 515 L875 530 L855 545" fill="#1a1a2e" stroke="none"/>
  </g>
  <!-- Database cylinder -->
  <g transform="translate(890,455)">
    <path d="M0 30 V160 a120 34 0 0 0 240 0 V30" fill="url(#db)"/>
    <ellipse cx="120" cy="30" rx="120" ry="34" fill="#FFB27D"/>
    <ellipse cx="120" cy="30" rx="120" ry="34" fill="none" stroke="#FF6A00" stroke-width="4"/>
    <ellipse cx="120" cy="95" rx="120" ry="34" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.5"/>
    <text x="120" y="160" font-family="ui-monospace, SFMono-Regular, monospace" font-size="44" font-weight="700" fill="#ffffff" text-anchor="middle">libSQL</text>
  </g>
  <!-- Footer -->
  <text x="800" y="820" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="600" fill="#9a5a2e" text-anchor="middle">TanStack Start &#183; Bunny Database &#183; Drizzle ORM</text>
</svg>
