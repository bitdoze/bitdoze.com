<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF4EB"/>
      <stop offset="55%" stop-color="#FFE7D1"/>
      <stop offset="100%" stop-color="#FFD9B8"/>
    </linearGradient>
    <linearGradient id="disk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8A3D"/>
      <stop offset="100%" stop-color="#FF6A00"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1320" cy="180" r="150" fill="#FF6A00" opacity="0.07"/>
  <circle cx="220" cy="700" r="120" fill="#FF6A00" opacity="0.06"/>
  <!-- Title -->
  <text x="800" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="92" font-weight="800" fill="#1a1a2e" text-anchor="middle" letter-spacing="-2">S3 as a Filesystem</text>
  <text x="800" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="600" fill="#FF6A00" text-anchor="middle">Mount a Bucket on Your VPS</text>
  <!-- Bucket -->
  <g transform="translate(560,440)">
    <path d="M40 0 H280 L255 230 H65 Z" fill="url(#disk)"/>
    <ellipse cx="160" cy="0" rx="120" ry="34" fill="#FFB27D"/>
    <ellipse cx="160" cy="0" rx="120" ry="34" fill="none" stroke="#FF6A00" stroke-width="4"/>
    <text x="160" y="135" font-family="ui-monospace, SFMono-Regular, monospace" font-size="64" font-weight="700" fill="#ffffff" text-anchor="middle">S3</text>
  </g>
  <!-- Arrow -->
  <g stroke="#1a1a2e" stroke-width="6" fill="none">
    <line x1="900" y1="555" x2="1010" y2="555"/>
    <path d="M995 540 L1015 555 L995 570" fill="#1a1a2e" stroke="none"/>
  </g>
  <!-- Mount folder -->
  <g transform="translate(1020,455)">
    <rect x="0" y="40" width="240" height="160" rx="16" fill="#ffffff" stroke="#FF6A00" stroke-width="5"/>
    <path d="M0 56 V40 a16 16 0 0 1 16 -16 H90 l28 28 H0 Z" fill="#FF6A00"/>
    <text x="120" y="150" font-family="ui-monospace, SFMono-Regular, monospace" font-size="32" font-weight="700" fill="#1a1a2e" text-anchor="middle">/mnt/data</text>
  </g>
  <!-- Footer -->
  <text x="800" y="820" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="600" fill="#9a5a2e" text-anchor="middle">ZeroFS &#183; JuiceFS &#183; Bunny.net</text>
</svg>
