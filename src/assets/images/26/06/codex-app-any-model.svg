<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="50%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g opacity="0.05" stroke="#6366f1" stroke-width="1">
    <line x1="0" y1="225" x2="1600" y2="225"/>
    <line x1="0" y1="450" x2="1600" y2="450"/>
    <line x1="0" y1="675" x2="1600" y2="675"/>
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
  </g>
  <!-- Title -->
  <text x="800" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="800" fill="#312e81" text-anchor="middle" letter-spacing="-2">Codex App</text>
  <text x="800" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#6d28d9" text-anchor="middle" letter-spacing="-1">With Any Model</text>
  <!-- Terminal card -->
  <rect x="430" y="370" width="740" height="270" rx="18" fill="url(#terminal)"/>
  <circle cx="470" cy="405" r="8" fill="#f87171"/>
  <circle cx="496" cy="405" r="8" fill="#fbbf24"/>
  <circle cx="522" cy="405" r="8" fill="#34d399"/>
  <text x="470" y="475" font-family="ui-monospace, SFMono-Regular, monospace" font-size="26" fill="#a5b4fc">[model_providers.opencode-go]</text>
  <text x="470" y="525" font-family="ui-monospace, SFMono-Regular, monospace" font-size="26" fill="#c4b5fd">base_url = "https://opencode.ai/zen/go/v1"</text>
  <text x="470" y="575" font-family="ui-monospace, SFMono-Regular, monospace" font-size="26" fill="#a5b4fc">wire_api = "chat"</text>
  <!-- Model chips -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600">
    <rect x="330" y="700" width="200" height="60" rx="14" fill="#ffffff" stroke="url(#accent)" stroke-width="2"/>
    <text x="430" y="738" fill="#4338ca" text-anchor="middle">GLM 5.1</text>
    <rect x="555" y="700" width="230" height="60" rx="14" fill="#ffffff" stroke="url(#accent)" stroke-width="2"/>
    <text x="670" y="738" fill="#4338ca" text-anchor="middle">MiniMax M3</text>
    <rect x="810" y="700" width="250" height="60" rx="14" fill="#ffffff" stroke="url(#accent)" stroke-width="2"/>
    <text x="935" y="738" fill="#4338ca" text-anchor="middle">MiMo V2.5 Pro</text>
    <rect x="1085" y="700" width="240" height="60" rx="14" fill="#ffffff" stroke="url(#accent)" stroke-width="2"/>
    <text x="1205" y="738" fill="#4338ca" text-anchor="middle">OpenCode Go</text>
  </g>
  <!-- Footer -->
  <text x="800" y="845" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#818cf8" text-anchor="middle">bitdoze.com</text>
</svg>
