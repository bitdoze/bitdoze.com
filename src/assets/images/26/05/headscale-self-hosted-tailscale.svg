<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f7ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0ecff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mesh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)" rx="12"/>
  <!-- Subtle dots -->
  <g opacity="0.08">
    <circle cx="200" cy="300" r="60" fill="#3b82f6"/>
    <circle cx="600" cy="350" r="80" fill="#3b82f6"/>
    <circle cx="1000" cy="280" r="60" fill="#3b82f6"/>
    <line x1="200" y1="300" x2="600" y2="350" stroke="#3b82f6" stroke-width="2"/>
    <line x1="600" y1="350" x2="1000" y2="280" stroke="#3b82f6" stroke-width="2"/>
    <line x1="200" y1="300" x2="1000" y2="280" stroke="#3b82f6" stroke-width="1"/>
  </g>
  <!-- Mesh network icon -->
  <g transform="translate(480, 340)">
    <circle cx="0" cy="0" r="18" fill="#3b82f6"/>
    <circle cx="80" cy="-40" r="14" fill="#3b82f6" opacity="0.8"/>
    <circle cx="80" cy="40" r="14" fill="#3b82f6" opacity="0.8"/>
    <circle cx="-80" cy="-40" r="14" fill="#3b82f6" opacity="0.7"/>
    <circle cx="-80" cy="40" r="14" fill="#3b82f6" opacity="0.7"/>
    <line x1="0" y1="0" x2="80" y2="-40" stroke="#3b82f6" stroke-width="3" opacity="0.5"/>
    <line x1="0" y1="0" x2="80" y2="40" stroke="#3b82f6" stroke-width="3" opacity="0.5"/>
    <line x1="0" y1="0" x2="-80" y2="-40" stroke="#3b82f6" stroke-width="3" opacity="0.5"/>
    <line x1="0" y1="0" x2="-80" y2="40" stroke="#3b82f6" stroke-width="3" opacity="0.5"/>
    <line x1="-80" y1="-40" x2="80" y2="-40" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>
  </g>
  <!-- Title -->
  <text x="600" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#1e3a5f" text-anchor="middle" letter-spacing="-1">Headscale Setup Guide</text>
  <text x="600" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#3b82f6" text-anchor="middle" font-weight="600">Self-Hosted Tailscale Control Server</text>
  <!-- Bottom -->
  <text x="600" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#5a7baa" text-anchor="middle">WireGuard mesh · Docker deploy · Full control over your network</text>
  <!-- Tags -->
  <g transform="translate(320, 560)">
    <rect x="0" y="0" width="120" height="32" rx="16" fill="#3b82f6" opacity="0.12"/>
    <text x="60" y="21" font-family="system-ui, sans-serif" font-size="13" fill="#3b82f6" text-anchor="middle" font-weight="600">Self-Hosted</text>
  </g>
  <g transform="translate(460, 560)">
    <rect x="0" y="0" width="110" height="32" rx="16" fill="#3b82f6" opacity="0.12"/>
    <text x="55" y="21" font-family="system-ui, sans-serif" font-size="13" fill="#3b82f6" text-anchor="middle" font-weight="600">WireGuard</text>
  </g>
  <g transform="translate(590, 560)">
    <rect x="0" y="0" width="100" height="32" rx="16" fill="#3b82f6" opacity="0.12"/>
    <text x="50" y="21" font-family="system-ui, sans-serif" font-size="13" fill="#3b82f6" text-anchor="middle" font-weight="600">Docker</text>
  </g>
  <g transform="translate(710, 560)">
    <rect x="0" y="0" width="130" height="32" rx="16" fill="#3b82f6" opacity="0.12"/>
    <text x="65" y="21" font-family="system-ui, sans-serif" font-size="13" fill="#3b82f6" text-anchor="middle" font-weight="600">Mesh VPN</text>
  </g>
</svg>
