<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c1222"/>
      <stop offset="50%" stop-color="#131b2e"/>
      <stop offset="100%" stop-color="#0c1222"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0e2440" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="price" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="150" x2="1600" y2="150"/>
    <line x1="0" y1="300" x2="1600" y2="300"/>
    <line x1="0" y1="450" x2="1600" y2="450"/>
    <line x1="0" y1="600" x2="1600" y2="600"/>
    <line x1="0" y1="750" x2="1600" y2="750"/>
    <line x1="400" y1="0" x2="400" y2="900"/>
    <line x1="800" y1="0" x2="800" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/>
  </g>
  <!-- Glow effect behind main card -->
  <ellipse cx="800" cy="400" rx="500" ry="200" fill="#06b6d4" opacity="0.04" filter="url(#glow)"/>
  <!-- Main card -->
  <rect x="120" y="200" width="1360" height="500" rx="20" fill="url(#card)" stroke="#1e3a5f" stroke-width="1.5"/>
  <!-- Left side: OpenCode Go branding -->
  <rect x="180" y="280" width="380" height="160" rx="14" fill="#0e7490" opacity="0.2"/>
  <rect x="180" y="280" width="380" height="160" rx="14" stroke="url(#accent)" stroke-width="2" fill="none"/>
  <text x="370" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#22d3ee" text-anchor="middle" letter-spacing="-1">OpenCode Go</text>
  <text x="370" y="385" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#64748b" text-anchor="middle">12 AI Coding Models</text>
  <!-- Price badge -->
  <rect x="260" y="470" width="220" height="70" rx="12" fill="url(#price)" opacity="0.15"/>
  <rect x="260" y="470" width="220" height="70" rx="12" stroke="#10b981" stroke-width="1.5" fill="none"/>
  <text x="370" y="518" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#10b981" text-anchor="middle">$10/mo</text>
  <!-- Right side: Title -->
  <text x="660" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#f1f5f9" letter-spacing="-1">Run AI Coding Agents</text>
  <text x="660" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#f1f5f9" letter-spacing="-1">with Any Tool</text>
  <text x="660" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#64748b">Works with OpenCode, Hermes Agent, OpenClaw, Pi</text>
  <!-- Model chips -->
  <rect x="660" y="480" width="170" height="48" rx="10" fill="#0e7490" opacity="0.25"/>
  <text x="745" y="510" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#22d3ee" text-anchor="middle" font-weight="500">DeepSeek V4</text>
  <rect x="850" y="480" width="130" height="48" rx="10" fill="#0e7490" opacity="0.25"/>
  <text x="915" y="510" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#22d3ee" text-anchor="middle" font-weight="500">GLM 5.1</text>
  <rect x="1000" y="480" width="170" height="48" rx="10" fill="#0e7490" opacity="0.25"/>
  <text x="1085" y="510" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#22d3ee" text-anchor="middle" font-weight="500">Qwen 3.6</text>
  <rect x="1190" y="480" width="170" height="48" rx="10" fill="#0e7490" opacity="0.25"/>
  <text x="1275" y="510" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#22d3ee" text-anchor="middle" font-weight="500">MiniMax M2.7</text>
  <rect x="660" y="545" width="140" height="48" rx="10" fill="#0e7490" opacity="0.25"/>
  <text x="730" y="575" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#22d3ee" text-anchor="middle" font-weight="500">Kimi K2.6</text>
  <rect x="820" y="545" width="170" height="48" rx="10" fill="#0e7490" opacity="0.25"/>
  <text x="905" y="575" font-family="system-ui, -apple-system, sans-serif" font-size="17" fill="#22d3ee" text-anchor="middle" font-weight="500">MiMo V2.5 Pro</text>
  <rect x="1010" y="545" width="100" height="48" rx="10" fill="#0e7490" opacity="0.12"/>
  <text x="1060" y="575" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#475569" text-anchor="middle">+6 more</text>
  <!-- Footer -->
  <text x="800" y="830" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#334155" text-anchor="middle">bitdoze.com</text>
</svg>
