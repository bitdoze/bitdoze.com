<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <radialGradient id="glow1" cx="300" cy="200" r="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="900" cy="450" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="600" cy="100" r="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.25"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  
  <!-- Ambient glows -->
  <rect width="1200" height="675" fill="url(#glow1)"/>
  <rect width="1200" height="675" fill="url(#glow2)"/>
  <rect width="1200" height="675" fill="url(#glow3)"/>
  
  <!-- Category badge -->
  <rect x="460" y="80" width="280" height="36" rx="18" fill="#4F46E5" opacity="0.1"/>
  <rect x="460" y="80" width="280" height="36" rx="18" stroke="#4F46E5" stroke-width="1.5" fill="none" opacity="0.3"/>
  <text x="600" y="104" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#4F46E5" text-anchor="middle" letter-spacing="2" text-transform="uppercase">AI CODING</text>
  
  <!-- Central icon - Terminal/Code symbol -->
  <g transform="translate(600, 200)">
    <!-- Terminal window -->
    <rect x="-80" y="-50" width="160" height="100" rx="12" fill="white" stroke="#E2E8F0" stroke-width="2"/>
    <rect x="-80" y="-50" width="160" height="24" rx="12" fill="#F1F5F9"/>
    <rect x="-80" y="-38" width="160" height="12" fill="#F1F5F9"/>
    <!-- Window dots -->
    <circle cx="-60" cy="-38" r="5" fill="#EF4444" opacity="0.8"/>
    <circle cx="-45" cy="-38" r="5" fill="#F59E0B" opacity="0.8"/>
    <circle cx="-30" cy="-38" r="5" fill="#10B981" opacity="0.8"/>
    <!-- Code lines -->
    <rect x="-55" y="-18" width="80" height="6" rx="3" fill="#4F46E5" opacity="0.6"/>
    <rect x="-55" y="-6" width="60" height="6" rx="3" fill="#06B6D4" opacity="0.5"/>
    <rect x="-55" y="6" width="70" height="6" rx="3" fill="#8B5CF6" opacity="0.4"/>
    <rect x="-55" y="18" width="50" height="6" rx="3" fill="#EC4899" opacity="0.3"/>
    <!-- Arrow cursor -->
    <path d="M 40 -15 L 55 0 L 40 15" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Main title -->
  <text x="600" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#0F172A" text-anchor="middle" letter-spacing="-1">
    <tspan>OpenCode </tspan>
    <tspan fill="url(#titleGrad)">Go</tspan>
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="385" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#475569" text-anchor="middle" font-weight="400">12 Modelos de IA por $10/Mes</text>
  
  <!-- Model chips -->
  <g transform="translate(600, 440)">
    <!-- Row 1 -->
    <rect x="-380" y="-15" width="140" height="32" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="-310" y="7" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#4F46E5" text-anchor="middle" font-weight="500">DeepSeek V4</text>
    
    <rect x="-220" y="-15" width="120" height="32" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="-160" y="7" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#06B6D4" text-anchor="middle" font-weight="500">Qwen 3.6</text>
    
    <rect x="-80" y="-15" width="100" height="32" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="-30" y="7" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8B5CF6" text-anchor="middle" font-weight="500">GLM 5.1</text>
    
    <rect x="40" y="-15" width="130" height="32" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="105" y="7" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#EC4899" text-anchor="middle" font-weight="500">MiniMax M2.7</text>
    
    <rect x="190" y="-15" width="110" height="32" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="245" y="7" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#F59E0B" text-anchor="middle" font-weight="500">Kimi K2.6</text>
    
    <rect x="320" y="-15" width="120" height="32" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="380" y="7" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#10B981" text-anchor="middle" font-weight="500">MiMo V2.5</text>
  </g>
  
  <!-- Price badge -->
  <g transform="translate(600, 520)">
    <rect x="-60" y="-20" width="120" height="40" rx="20" fill="#10B981" opacity="0.1"/>
    <rect x="-60" y="-20" width="120" height="40" rx="20" stroke="#10B981" stroke-width="1.5" fill="none" opacity="0.3"/>
    <text x="0" y="8" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#10B981" text-anchor="middle" font-weight="700">$10/mes</text>
  </g>
  
  <!-- Bottom features -->
  <g transform="translate(600, 590)">
    <text x="-200" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">Cero retención</text>
    <circle cx="-120" cy="-4" r="3" fill="#CBD5E1"/>
    <text x="-40" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">Multi-agente</text>
    <circle cx="50" cy="-4" r="3" fill="#CBD5E1"/>
    <text x="140" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">Global CDN</text>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="100" cy="100" r="4" fill="#6366F1" opacity="0.15"/>
  <circle cx="1100" cy="575" r="4" fill="#06B6D4" opacity="0.15"/>
  <circle cx="150" cy="550" r="3" fill="#EC4899" opacity="0.12"/>
  <circle cx="1050" cy="125" r="3" fill="#8B5CF6" opacity="0.12"/>
  <circle cx="80" cy="350" r="5" fill="#F59E0B" opacity="0.1"/>
  <circle cx="1120" cy="350" r="5" fill="#10B981" opacity="0.1"/>
  
  <!-- Footer -->
  <text x="600" y="650" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">bitdoze.com</text>
</svg>
