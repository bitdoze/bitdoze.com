<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4" /> <!-- Very light mint -->
      <stop offset="50%" stop-color="#ecfeff" /> <!-- Very light cyan -->
      <stop offset="100%" stop-color="#eef2ff" /> <!-- Very light indigo -->
    </linearGradient>
    
    <!-- Drop Shadow for Cards -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.04" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg-gradient)" />

  <!-- Abstract Server/Cloud Graphics (Subtle background elements) -->
  <g opacity="0.3">
    <circle cx="700" cy="100" r="140" fill="#e0e7ff" />
    <circle cx="100" cy="350" r="120" fill="#dcfce7" />
    
    <!-- Connective lines -->
    <path d="M 150 150 L 250 100 L 350 180" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 6" fill="none" />
    <path d="M 600 300 L 680 220 L 750 280" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 6" fill="none" />
  </g>

  <!-- Decorative Minimalist Node Cards -->
  <g transform="translate(180, 260)" filter="url(#shadow)">
    <rect width="120" height="80" rx="16" fill="#ffffff" />
    <rect x="20" y="25" width="80" height="8" rx="4" fill="#3b82f6" opacity="0.8" />
    <rect x="20" y="45" width="50" height="8" rx="4" fill="#cbd5e1" />
  </g>

  <g transform="translate(340, 280)" filter="url(#shadow)">
    <rect width="120" height="80" rx="16" fill="#ffffff" />
    <rect x="20" y="25" width="80" height="8" rx="4" fill="#10b981" opacity="0.8" />
    <rect x="20" y="45" width="60" height="8" rx="4" fill="#cbd5e1" />
  </g>

  <g transform="translate(500, 260)" filter="url(#shadow)">
    <rect width="120" height="80" rx="16" fill="#ffffff" />
    <rect x="20" y="25" width="80" height="8" rx="4" fill="#6366f1" opacity="0.8" />
    <rect x="20" y="45" width="40" height="8" rx="4" fill="#cbd5e1" />
  </g>

  <!-- Connective Dots -->
  <circle cx="240" cy="300" r="4" fill="#3b82f6" />
  <circle cx="400" cy="320" r="4" fill="#10b981" />
  <circle cx="560" cy="300" r="4" fill="#6366f1" />

  <!-- Headline Text -->
  <text x="400" y="170" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-weight="800" 
        font-size="42" 
        fill="#0f172a" 
        text-anchor="middle"
        letter-spacing="-0.02em">
    Coolify, Dokploy, or Kamal 2?
  </text>

  <!-- Subtitle (Subtle) -->
  <text x="400" y="210" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-weight="500" 
        font-size="18" 
        fill="#475569" 
        text-anchor="middle"
        letter-spacing="0.05em">
    CHOOSING YOUR SELF-HOSTED PAAS
  </text>
</svg>
