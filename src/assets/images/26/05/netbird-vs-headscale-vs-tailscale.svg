<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f3f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4deff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)" rx="12"/>
  <!-- Three network icons -->
  <g transform="translate(180, 300)" opacity="0.15">
    <circle cx="40" cy="40" r="40" fill="#7c3aed"/>
    <circle cx="40" cy="40" r="25" fill="white"/>
    <text x="40" y="45" font-family="system-ui, sans-serif" font-size="20" fill="#7c3aed" text-anchor="middle" font-weight="700">NB</text>
  </g>
  <g transform="translate(480, 280)" opacity="0.2">
    <circle cx="50" cy="50" r="50" fill="#7c3aed"/>
    <circle cx="50" cy="50" r="32" fill="white"/>
    <text x="50" y="55" font-family="system-ui, sans-serif" font-size="22" fill="#7c3aed" text-anchor="middle" font-weight="700">HS</text>
  </g>
  <g transform="translate(860, 300)" opacity="0.15">
    <circle cx="40" cy="40" r="40" fill="#7c3aed"/>
    <circle cx="40" cy="40" r="25" fill="white"/>
    <text x="40" y="45" font-family="system-ui, sans-serif" font-size="20" fill="#7c3aed" text-anchor="middle" font-weight="700">TS</text>
  </g>
  <!-- Title -->
  <text x="600" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" fill="#2d1b69" text-anchor="middle" letter-spacing="-1">Mesh VPN Comparison</text>
  <text x="600" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#7c3aed" text-anchor="middle" font-weight="600">NetBird vs Headscale vs Tailscale</text>
  <!-- Bottom -->
  <text x="600" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#6b5a8a" text-anchor="middle">WireGuard mesh · Self-hosted vs cloud · Which fits your setup?</text>
  <!-- Tags -->
  <g transform="translate(280, 560)">
    <rect x="0" y="0" width="120" height="32" rx="16" fill="#7c3aed" opacity="0.12"/>
    <text x="60" y="21" font-family="system-ui, sans-serif" font-size="13" fill="#7c3aed" text-anchor="middle" font-weight="600">Comparison</text>
  </g>
  <g transform="translate(420, 560)">
    <rect x="0" y="0" width="110" height="32" rx="16" fill="#7c3aed" opacity="0.12"/>
    <text x="55" y="21" font-family="system-ui, sans-serif" font-size="13" fill="#7c3aed" text-anchor="middle" font-weight="600">WireGuard</text>
  </g>
  <g transform="translate(550, 560)">
    <rect x="0" y="0" width="100" height="32" rx="16" fill="#7c3aed" opacity="0.12"/>
    <text x="50" y="21" font-family="system-ui, sans-serif" font-size="13" fill="#7c3aed" text-anchor="middle" font-weight="600">Mesh VPN</text>
  </g>
  <g transform="translate(670, 560)">
    <rect x="0" y="0" width="120" height="32" rx="16" fill="#7c3aed" opacity="0.12"/>
    <text x="60" y="21" font-family="system-ui, sans-serif" font-size="13" fill="#7c3aed" text-anchor="middle" font-weight="600">Self-Hosted</text>
  </g>
</svg>
