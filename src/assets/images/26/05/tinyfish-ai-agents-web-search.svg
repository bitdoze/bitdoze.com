<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F0F9FF"/>
      <stop offset="100%" stop-color="#E0F2FE"/>
    </linearGradient>
    <radialGradient id="glow1" cx="250" cy="180" r="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="950" cy="500" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="600" cy="80" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fishGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="searchGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#BAE6FD" stroke-width="1" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  
  <!-- Ambient glows -->
  <rect width="1200" height="675" fill="url(#glow1)"/>
  <rect width="1200" height="675" fill="url(#glow2)"/>
  <rect width="1200" height="675" fill="url(#glow3)"/>
  
  <!-- Category badge -->
  <rect x="430" y="65" width="340" height="36" rx="18" fill="#0EA5E9" opacity="0.1"/>
  <rect x="430" y="65" width="340" height="36" rx="18" stroke="#0EA5E9" stroke-width="1.5" fill="none" opacity="0.3"/>
  <text x="600" y="89" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#0EA5E9" text-anchor="middle" letter-spacing="2">WEB SEARCH + FETCH</text>
  
  <!-- Central icon - Fish with search -->
  <g transform="translate(600, 220)">
    <!-- Fish body -->
    <ellipse cx="0" cy="0" rx="70" ry="45" fill="url(#fishGrad)" opacity="0.15"/>
    <ellipse cx="0" cy="0" rx="70" ry="45" stroke="url(#fishGrad)" stroke-width="2.5" fill="none" opacity="0.6"/>
    <!-- Fish tail -->
    <path d="M -65 0 L -95 -30 L -95 30 Z" fill="url(#fishGrad)" opacity="0.3"/>
    <!-- Fish eye -->
    <circle cx="35" cy="-10" r="10" fill="white" stroke="#0EA5E9" stroke-width="2"/>
    <circle cx="38" cy="-10" r="5" fill="#0EA5E9"/>
    <!-- Search magnifying glass on fish -->
    <circle cx="0" cy="-5" r="22" fill="none" stroke="white" stroke-width="3" opacity="0.9"/>
    <line x1="16" y1="11" x2="30" y2="25" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
    <!-- Code brackets inside search -->
    <text x="0" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="white" text-anchor="middle" font-weight="700" opacity="0.9">&lt;/&gt;</text>
  </g>
  
  <!-- TinyFish text -->
  <text x="600" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="60" font-weight="800" fill="#0C4A6E" text-anchor="middle" letter-spacing="-2">
    <tspan>Tiny</tspan><tspan fill="url(#fishGrad)">Fish</tspan>
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#64748B" text-anchor="middle" font-weight="400">Free Web Access for AI Coding Agents</text>
  
  <!-- Feature boxes -->
  <g transform="translate(600, 440)">
    <!-- Search box -->
    <rect x="-280" y="-30" width="250" height="60" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="-155" y="-5" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#0EA5E9" text-anchor="middle" font-weight="700">SEARCH</text>
    <text x="-155" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748B" text-anchor="middle">30 req/min • 360ms avg</text>
    
    <!-- Fetch box -->
    <rect x="30" y="-30" width="250" height="60" rx="12" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="155" y="-5" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6366F1" text-anchor="middle" font-weight="700">FETCH</text>
    <text x="155" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748B" text-anchor="middle">150 URLs/min • JS rendering</text>
  </g>
  
  <!-- FREE badge -->
  <g transform="translate(600, 530)">
    <rect x="-60" y="-18" width="120" height="36" rx="18" fill="#10B981" opacity="0.15"/>
    <rect x="-60" y="-18" width="120" height="36" rx="18" stroke="#10B981" stroke-width="2" fill="none" opacity="0.4"/>
    <text x="0" y="8" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#10B981" text-anchor="middle" font-weight="800" letter-spacing="3">100% FREE</text>
  </g>
  
  <!-- Agent logos row -->
  <g transform="translate(600, 580)">
    <text x="-280" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle">Pi Agent</text>
    <circle cx="-200" cy="-4" r="3" fill="#CBD5E1"/>
    <text x="-140" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle">Hermes</text>
    <circle cx="-70" cy="-4" r="3" fill="#CBD5E1"/>
    <text x="-10" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle">OpenClaw</text>
    <circle cx="65" cy="-4" r="3" fill="#CBD5E1"/>
    <text x="130" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle">Claude Code</text>
    <circle cx="215" cy="-4" r="3" fill="#CBD5E1"/>
    <text x="280" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle">Codex</text>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="100" cy="120" r="4" fill="#0EA5E9" opacity="0.15"/>
  <circle cx="1100" cy="555" r="4" fill="#6366F1" opacity="0.15"/>
  <circle cx="150" cy="530" r="3" fill="#10B981" opacity="0.12"/>
  <circle cx="1050" cy="140" r="3" fill="#F59E0B" opacity="0.12"/>
  <circle cx="80" cy="350" r="5" fill="#06B6D4" opacity="0.1"/>
  <circle cx="1120" cy="350" r="5" fill="#8B5CF6" opacity="0.1"/>
  
  <!-- Footer -->
  <text x="600" y="650" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">bitdoze.com</text>
</svg>
