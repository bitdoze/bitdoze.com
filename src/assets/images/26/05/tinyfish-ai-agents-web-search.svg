<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="fish" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)" rx="0"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="135" x2="1200" y2="135" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="270" x2="1200" y2="270" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="405" x2="1200" y2="405" stroke="#fff" stroke-width="1"/>
    <line x1="0" y1="540" x2="1200" y2="540" stroke="#fff" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="675" stroke="#fff" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="675" stroke="#fff" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="675" stroke="#fff" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="675" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Fish icon - stylized -->
  <g transform="translate(140, 200)">
    <!-- Fish body -->
    <ellipse cx="0" cy="0" rx="80" ry="45" fill="url(#fish)" opacity="0.9"/>
    <!-- Tail -->
    <polygon points="-80,0 -130,-40 -130,40" fill="url(#fish)" opacity="0.7"/>
    <!-- Eye -->
    <circle cx="40" cy="-10" r="10" fill="#0f172a"/>
    <circle cx="43" cy="-12" r="4" fill="#fff"/>
    <!-- Fin -->
    <path d="M-10,-45 Q20,-70 30,-45" fill="url(#fish)" opacity="0.6"/>
    <!-- Scale details -->
    <path d="M-20,-15 Q0,-30 20,-15" fill="none" stroke="#0f172a" stroke-width="1.5" opacity="0.2"/>
    <path d="M-30,0 Q-10,-15 10,0" fill="none" stroke="#0f172a" stroke-width="1.5" opacity="0.2"/>
    <path d="M-20,15 Q0,0 20,15" fill="none" stroke="#0f172a" stroke-width="1.5" opacity="0.2"/>
  </g>

  <!-- Search icon -->
  <g transform="translate(140, 420)">
    <circle cx="0" cy="0" r="35" fill="none" stroke="#38bdf8" stroke-width="4" opacity="0.8"/>
    <line x1="25" y1="25" x2="45" y2="45" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <text x="0" y="65" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="16">Search</text>
  </g>

  <!-- Fetch icon -->
  <g transform="translate(140, 540)">
    <rect x="-30" y="-25" width="60" height="50" rx="6" fill="none" stroke="#818cf8" stroke-width="3" opacity="0.8"/>
    <line x1="-18" y1="-10" x2="18" y2="-10" stroke="#818cf8" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="-18" y1="0" x2="12" y2="0" stroke="#818cf8" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <line x1="-18" y1="10" x2="6" y2="10" stroke="#818cf8" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <path d="M5,18 L15,25 L25,18" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
    <text x="0" y="55" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="16">Fetch</text>
  </g>

  <!-- Connecting lines -->
  <line x1="220" y1="200" x2="175" y2="420" stroke="url(#accent)" stroke-width="1.5" opacity="0.3" stroke-dasharray="6,4"/>
  <line x1="220" y1="200" x2="175" y2="540" stroke="url(#accent)" stroke-width="1.5" opacity="0.3" stroke-dasharray="6,4"/>

  <!-- Main title -->
  <text x="600" y="140" text-anchor="middle" fill="#f1f5f9" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" letter-spacing="-1">
    TinyFish
  </text>
  <text x="600" y="195" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="24" font-weight="400">
    Free Web Search + Fetch for AI Agents
  </text>

  <!-- Agent boxes -->
  <!-- Pi -->
  <g transform="translate(400, 300)">
    <rect x="-90" y="-35" width="180" height="70" rx="12" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" fill="#38bdf8" font-family="system-ui, sans-serif" font-size="22" font-weight="600">Pi Agent</text>
    <text x="0" y="18" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">pi-tinyfish</text>
  </g>

  <!-- Hermes -->
  <g transform="translate(640, 300)">
    <rect x="-90" y="-35" width="180" height="70" rx="12" fill="#1e293b" stroke="#818cf8" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" fill="#818cf8" font-family="system-ui, sans-serif" font-size="22" font-weight="600">Hermes</text>
    <text x="0" y="18" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">MCP / Skill</text>
  </g>

  <!-- OpenClaw -->
  <g transform="translate(880, 300)">
    <rect x="-90" y="-35" width="180" height="70" rx="12" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
    <text x="0" y="-5" text-anchor="middle" fill="#34d399" font-family="system-ui, sans-serif" font-size="22" font-weight="600">OpenClaw</text>
    <text x="0" y="18" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="13">REST API</text>
  </g>

  <!-- TinyFish center hub -->
  <g transform="translate(640, 450)">
    <rect x="-120" y="-40" width="240" height="80" rx="16" fill="#0f172a" stroke="url(#accent)" stroke-width="2.5"/>
    <text x="0" y="-8" text-anchor="middle" fill="#f1f5f9" font-family="system-ui, sans-serif" font-size="20" font-weight="600">TinyFish API</text>
    <text x="0" y="18" text-anchor="middle" fill="#38bdf8" font-family="system-ui, sans-serif" font-size="15" font-weight="500">Search + Fetch = FREE</text>
  </g>

  <!-- Connecting arrows from agents to TinyFish -->
  <path d="M400,335 Q400,410 520,450" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.5" marker-end="url(#arrowhead)"/>
  <path d="M640,335 L640,410" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.5" marker-end="url(#arrowhead2)"/>
  <path d="M880,335 Q880,410 760,450" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.5" marker-end="url(#arrowhead3)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#38bdf8" opacity="0.5"/>
    </marker>
    <marker id="arrowhead2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#818cf8" opacity="0.5"/>
    </marker>
    <marker id="arrowhead3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#34d399" opacity="0.5"/>
    </marker>
  </defs>

  <!-- Bottom tagline -->
  <text x="600" y="570" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="17">
    One API key. Works with every coding agent. No credit card.
  </text>

  <!-- Free badge -->
  <g transform="translate(1050, 100)">
    <rect x="-50" y="-20" width="100" height="40" rx="20" fill="#38bdf8" opacity="0.15"/>
    <text x="0" y="6" text-anchor="middle" fill="#38bdf8" font-family="system-ui, sans-serif" font-size="16" font-weight="700">FREE</text>
  </g>
</svg>