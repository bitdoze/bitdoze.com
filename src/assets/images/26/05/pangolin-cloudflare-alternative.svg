<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8eeff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4f6ef7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b5de7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tunnel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6c8cff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f6ef7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)" rx="12"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="135" x2="1200" y2="135" stroke="#4f6ef7" stroke-width="1"/>
    <line x1="0" y1="270" x2="1200" y2="270" stroke="#4f6ef7" stroke-width="1"/>
    <line x1="0" y1="405" x2="1200" y2="405" stroke="#4f6ef7" stroke-width="1"/>
    <line x1="0" y1="540" x2="1200" y2="540" stroke="#4f6ef7" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="675" stroke="#4f6ef7" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="675" stroke="#4f6ef7" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="675" stroke="#4f6ef7" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="675" stroke="#4f6ef7" stroke-width="1"/>
  </g>

  <!-- Shield icon (left) -->
  <g transform="translate(180, 240)">
    <path d="M80 0 L160 40 L160 120 C160 170 120 210 80 230 C40 210 0 170 0 120 L0 40 Z" fill="url(#shield)" opacity="0.15"/>
    <path d="M80 20 L140 50 L140 110 C140 150 110 180 80 195 C50 180 20 150 20 110 L20 50 Z" fill="url(#shield)" opacity="0.3"/>
    <path d="M80 40 L120 60 L120 100 C120 130 100 150 80 160 C60 150 40 130 40 100 L40 60 Z" fill="url(#shield)"/>
    <!-- Lock icon inside shield -->
    <rect x="65" y="85" width="30" height="25" rx="3" fill="white" opacity="0.9"/>
    <path d="M72 85 L72 75 C72 68 88 68 88 75 L88 85" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
    <circle cx="80" cy="95" r="3" fill="url(#shield)"/>
  </g>

  <!-- Tunnel lines (center) -->
  <g transform="translate(380, 290)">
    <path d="M0 30 Q100 0 200 30 Q300 60 400 30" fill="none" stroke="url(#tunnel)" stroke-width="6" opacity="0.3"/>
    <path d="M0 50 Q100 20 200 50 Q300 80 400 50" fill="none" stroke="url(#tunnel)" stroke-width="6" opacity="0.2"/>
    <path d="M0 70 Q100 40 200 70 Q300 100 400 70" fill="none" stroke="url(#tunnel)" stroke-width="6" opacity="0.1"/>
  </g>

  <!-- Server icon (right) -->
  <g transform="translate(900, 260)">
    <rect x="0" y="0" width="100" height="30" rx="5" fill="#4f6ef7" opacity="0.8"/>
    <rect x="0" y="40" width="100" height="30" rx="5" fill="#4f6ef7" opacity="0.6"/>
    <rect x="0" y="80" width="100" height="30" rx="5" fill="#4f6ef7" opacity="0.4"/>
    <circle cx="20" cy="15" r="5" fill="white" opacity="0.8"/>
    <circle cx="20" cy="55" r="5" fill="white" opacity="0.8"/>
    <circle cx="20" cy="95" r="5" fill="white" opacity="0.8"/>
    <rect x="40" y="10" width="45" height="10" rx="2" fill="white" opacity="0.3"/>
    <rect x="40" y="50" width="45" height="10" rx="2" fill="white" opacity="0.3"/>
    <rect x="40" y="90" width="45" height="10" rx="2" fill="white" opacity="0.3"/>
  </g>

  <!-- Main title -->
  <text x="600" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#1a2744" text-anchor="middle" letter-spacing="-1">
    Pangolin
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="26" fill="#4f6ef7" text-anchor="middle" font-weight="600">
    Self-Hosted Tunnel Alternative
  </text>
  
  <!-- Bottom text -->
  <text x="600" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#5a6b8a" text-anchor="middle">
    WireGuard tunnels · Zero-trust access · No Cloudflare needed
  </text>

  <!-- Tags -->
  <g transform="translate(350, 560)">
    <rect x="0" y="0" width="120" height="32" rx="16" fill="#4f6ef7" opacity="0.12"/>
    <text x="60" y="21" font-family="system-ui, sans-serif" font-size="13" fill="#4f6ef7" text-anchor="middle" font-weight="600">Self-Hosted</text>
  </g>
  <g transform="translate(490, 560)">
    <rect x="0" y="0" width="100" height="32" rx="16" fill="#4f6ef7" opacity="0.12"/>
    <text x="50" y="21" font-family="system-ui, sans-serif" font-size="13" fill="#4f6ef7" text-anchor="middle" font-weight="600">Open Source</text>
  </g>
  <g transform="translate(610, 560)">
    <rect x="0" y="0" width="100" height="32" rx="16" fill="#4f6ef7" opacity="0.12"/>
    <text x="50" y="21" font-family="system-ui, sans-serif" font-size="13" fill="#4f6ef7" text-anchor="middle" font-weight="600">Docker</text>
  </g>
  <g transform="translate(730, 560)">
    <rect x="0" y="0" width="110" height="32" rx="16" fill="#4f6ef7" opacity="0.12"/>
    <text x="55" y="21" font-family="system-ui, sans-serif" font-size="13" fill="#4f6ef7" text-anchor="middle" font-weight="600">WireGuard</text>
  </g>
</svg>