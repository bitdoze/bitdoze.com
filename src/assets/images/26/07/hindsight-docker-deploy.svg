<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="60%" r="35%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="80%" r="30%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.25"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <rect width="1200" height="675" fill="url(#glow1)"/>
  <rect width="1200" height="675" fill="url(#glow2)"/>
  <rect width="1200" height="675" fill="url(#glow3)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="6" fill="#6366F1" opacity="0.15"/>
  <circle cx="1100" cy="120" r="4" fill="#06B6D4" opacity="0.18"/>
  <circle cx="150" cy="580" r="5" fill="#EC4899" opacity="0.12"/>
  <circle cx="1050" cy="550" r="7" fill="#6366F1" opacity="0.1"/>
  <circle cx="950" cy="90" r="3" fill="#06B6D4" opacity="0.2"/>
  <circle cx="250" cy="150" r="4" fill="#EC4899" opacity="0.15"/>

  <!-- Category badge -->
  <rect x="440" y="140" width="320" height="40" rx="20" fill="#4F46E5" opacity="0.1"/>
  <rect x="440" y="140" width="320" height="40" rx="20" fill="none" stroke="#4F46E5" stroke-width="1.5" opacity="0.3"/>
  <text x="600" y="166" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#4F46E5" letter-spacing="3">AGENT MEMORY</text>

  <!-- Brain/memory icon -->
  <g transform="translate(600, 260)" opacity="0.9">
    <!-- Docker whale body -->
    <rect x="-60" y="-30" width="120" height="70" rx="12" fill="#2496ED" opacity="0.15"/>
    <rect x="-60" y="-30" width="120" height="70" rx="12" fill="none" stroke="#2496ED" stroke-width="2" opacity="0.5"/>
    <!-- Docker containers on top -->
    <rect x="-40" y="-50" width="20" height="18" rx="3" fill="#2496ED" opacity="0.3" stroke="#2496ED" stroke-width="1.5"/>
    <rect x="-15" y="-50" width="20" height="18" rx="3" fill="#2496ED" opacity="0.3" stroke="#2496ED" stroke-width="1.5"/>
    <rect x="10" y="-50" width="20" height="18" rx="3" fill="#2496ED" opacity="0.3" stroke="#2496ED" stroke-width="1.5"/>
    <!-- Memory nodes -->
    <circle cx="-30" cy="5" r="8" fill="none" stroke="#6366F1" stroke-width="2"/>
    <circle cx="0" cy="5" r="8" fill="none" stroke="#06B6D4" stroke-width="2"/>
    <circle cx="30" cy="5" r="8" fill="none" stroke="#EC4899" stroke-width="2"/>
    <!-- Connecting lines -->
    <line x1="-22" y1="5" x2="-8" y2="5" stroke="#4F46E5" stroke-width="1.5" opacity="0.5"/>
    <line x1="8" y1="5" x2="22" y2="5" stroke="#4F46E5" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Main title -->
  <text x="600" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="800" fill="#0F172A">
    Deploy <tspan fill="url(#textGrad)">Hindsight</tspan>
  </text>
  <text x="600" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="58" font-weight="800" fill="#0F172A">
    on Docker
  </text>

  <!-- Subtitle -->
  <text x="600" y="490" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#64748B" font-weight="400">
    Agent memory that learns over time
  </text>

  <!-- Tech stack pills -->
  <g transform="translate(600, 550)">
    <rect x="-180" y="-16" width="80" height="32" rx="16" fill="#2496ED" opacity="0.12"/>
    <text x="-140" y="5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2496ED" font-weight="600">Docker</text>

    <rect x="-80" y="-16" width="100" height="32" rx="16" fill="#336791" opacity="0.12"/>
    <text x="-30" y="5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#336791" font-weight="600">PostgreSQL</text>

    <rect x="40" y="-16" width="80" height="32" rx="16" fill="#10B981" opacity="0.12"/>
    <text x="80" y="5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#10B981" font-weight="600">pgvector</text>
  </g>
</svg>
