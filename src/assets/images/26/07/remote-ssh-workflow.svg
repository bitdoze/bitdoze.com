<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" width="1000" height="480">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC"/>
      <stop offset="100%" style="stop-color:#E2E8F0"/>
    </linearGradient>
    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.07"/>
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#CBD5E1" stroke-width="0.5" opacity="0.2"/>
    </pattern>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4F46E5"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#06B6D4"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="480" fill="url(#bgGrad)"/>
  <ellipse cx="150" cy="200" rx="250" ry="200" fill="url(#blob1)"/>
  <ellipse cx="850" cy="300" rx="250" ry="180" fill="url(#blob2)"/>
  <rect width="1000" height="480" fill="url(#grid)"/>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#0F172A">Remote SSH Attach Workflow</text>
  <text x="500" y="54" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748B">Access Herdr on a VPS from any device</text>

  <!-- ===== LAPTOP (LEFT) ===== -->
  <g filter="url(#shadow)">
    <rect x="30" y="100" width="240" height="310" rx="14" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  </g>
  <!-- Laptop header -->
  <rect x="30" y="100" width="240" height="36" rx="14" fill="url(#headerGrad)"/>
  <rect x="30" y="122" width="240" height="14" fill="url(#headerGrad)"/>
  <text x="150" y="124" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="white" font-weight="600">💻 Local Laptop</text>

  <!-- Local terminal -->
  <rect x="45" y="150" width="210" height="120" rx="8" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <rect x="45" y="150" width="210" height="20" rx="8" fill="#1E293B"/>
  <rect x="45" y="164" width="210" height="6" fill="#1E293B"/>
  <circle cx="58" cy="160" r="3.5" fill="#EF4444" opacity="0.7"/>
  <circle cx="70" cy="160" r="3.5" fill="#EAB308" opacity="0.7"/>
  <circle cx="82" cy="160" r="3.5" fill="#22C55E" opacity="0.7"/>
  <text x="55" y="186" font-family="monospace" font-size="10" fill="#22C55E">$ herdr --remote ssh://</text>
  <text x="55" y="200" font-family="monospace" font-size="10" fill="#22C55E">  user@vps:2222</text>
  <text x="55" y="218" font-family="monospace" font-size="9" fill="#06B6D4">Connecting to remote...</text>
  <text x="55" y="232" font-family="monospace" font-size="9" fill="#94A3B8">Streaming TUI locally ✓</text>
  <text x="55" y="246" font-family="monospace" font-size="9" fill="#A78BFA">herdr&gt; _</text>

  <!-- Thin Client label -->
  <rect x="55" y="280" width="210" height="36" rx="8" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1"/>
  <text x="160" y="296" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#4338CA" font-weight="600">Herdr Thin Client</text>
  <text x="160" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#6366F1">Renders remote TUI locally</text>

  <!-- User label -->
  <rect x="55" y="330" width="210" height="28" rx="8" fill="#F1F5F9"/>
  <text x="160" y="349" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#475569" font-weight="500">👤 Developer on the go</text>

  <!-- Mobile device (under laptop) -->
  <g transform="translate(55, 368)">
    <rect x="0" y="0" width="65" height="28" rx="8" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
    <text x="32" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#065F46" font-weight="600">📱 Phone</text>
  </g>
  <text x="135" y="387" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#64748B">Moshi iOS / Termux</text>

  <!-- ===== SSH TUNNEL (CENTER) ===== -->
  <!-- Tunnel visual -->
  <g transform="translate(340, 180)">
    <!-- Tunnel body -->
    <rect x="0" y="0" width="240" height="120" rx="16" fill="#F0FDFA" stroke="#06B6D4" stroke-width="2" stroke-dasharray="8,4" opacity="0.7"/>
    <!-- Lock icon -->
    <rect x="90" y="15" width="60" height="44" rx="10" fill="#06B6D4" opacity="0.15"/>
    <rect x="98" y="30" width="44" height="30" rx="6" fill="#06B6D4" opacity="0.3"/>
    <path d="M108,30 L108,22 A12,12 0 0,1 132,22 L132,30" fill="none" stroke="#06B6D4" stroke-width="3" stroke-linecap="round"/>
    <circle cx="120" cy="44" r="4" fill="#06B6D4"/>
    <text x="120" y="75" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#0E7490" font-weight="700">SSH Tunnel</text>
    <text x="120" y="92" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#0891B2" font-weight="500">Encrypted Connection</text>
    <text x="120" y="107" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#0891B2" font-weight="500">Port 2222</text>
  </g>

  <!-- Data flow arrows -->
  <path d="M278,260 L332,260" stroke="#4F46E5" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M332,230 L278,230" stroke="#06B6D4" stroke-width="2.5" fill="none" marker-end="url(#arrowCyan)"/>
  <text x="305" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#4F46E5" font-weight="600">TUI</text>
  <text x="305" y="278" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#06B6D4" font-weight="600">Input</text>

  <path d="M588,260 L640,260" stroke="#4F46E5" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M640,230 L588,230" stroke="#06B6D4" stroke-width="2.5" fill="none" marker-end="url(#arrowCyan)"/>
  <text x="614" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#4F46E5" font-weight="600">TUI</text>
  <text x="614" y="278" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#06B6D4" font-weight="600">Input</text>

  <!-- ===== VPS (RIGHT) ===== -->
  <g filter="url(#shadow)">
    <rect x="650" y="100" width="320" height="310" rx="14" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  </g>
  <!-- VPS header -->
  <rect x="650" y="100" width="320" height="36" rx="14" fill="#475569"/>
  <rect x="650" y="122" width="320" height="14" fill="#475569"/>
  <text x="810" y="124" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="white" font-weight="600">🖥️ VPS / Remote Server</text>

  <!-- Herdr Session Server -->
  <rect x="665" y="150" width="290" height="44" rx="10" fill="#4F46E5" opacity="0.1" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="810" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#4338CA" font-weight="700">Herdr Session Server</text>
  <text x="810" y="186" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6366F1">herdr session attach production</text>

  <!-- Agent panes on VPS -->
  <rect x="665" y="206" width="138" height="90" rx="8" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <rect x="665" y="206" width="138" height="18" rx="8" fill="#166534"/>
  <rect x="665" y="218" width="138" height="6" fill="#166534"/>
  <text x="734" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#86EFAC" font-weight="600">Claude Code</text>
  <rect x="673" y="232" width="80" height="4" rx="2" fill="#4F46E5" opacity="0.5"/>
  <rect x="673" y="240" width="100" height="4" rx="2" fill="#94A3B8" opacity="0.3"/>
  <rect x="673" y="248" width="60" height="4" rx="2" fill="#06B6D4" opacity="0.4"/>
  <rect x="673" y="256" width="90" height="4" rx="2" fill="#94A3B8" opacity="0.2"/>
  <circle cx="677" cy="272" r="3" fill="#22C55E"/>
  <text x="684" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#22C55E">Working</text>

  <rect x="813" y="206" width="138" height="90" rx="8" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <rect x="813" y="206" width="138" height="18" rx="8" fill="#1E40AF"/>
  <rect x="813" y="218" width="138" height="6" fill="#1E40AF"/>
  <text x="882" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#93C5FD" font-weight="600">Codex</text>
  <rect x="821" y="232" width="70" height="4" rx="2" fill="#94A3B8" opacity="0.3"/>
  <rect x="821" y="240" width="100" height="4" rx="2" fill="#94A3B8" opacity="0.2"/>
  <rect x="821" y="248" width="80" height="4" rx="2" fill="#94A3B8" opacity="0.25"/>
  <circle cx="825" cy="272" r="3" fill="#3B82F6"/>
  <text x="832" y="275" font-family="system-ui, -apple-system, sans-serif" font-size="7" fill="#3B82F6">Idle</text>

  <!-- State sidebar on VPS -->
  <rect x="665" y="306" width="290" height="50" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="680" y="322" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748B" font-weight="600">Agent State:</text>
  <circle cx="680" cy="340" r="4" fill="#22C55E"/>
  <text x="688" y="344" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#475569">Claude: Working</text>
  <circle cx="790" cy="340" r="4" fill="#3B82F6"/>
  <text x="798" y="344" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#475569">Codex: Idle</text>
  <circle cx="890" cy="340" r="4" fill="#8B5CF6"/>
  <text x="898" y="344" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#475569">Copilot: Done</text>

  <!-- Network label -->
  <rect x="665" y="366" width="290" height="32" rx="8" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
  <text x="810" y="387" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#065F46" font-weight="600">🌐 Public IP / WireGuard VPN</text>

  <!-- CLI commands annotation -->
  <rect x="665" y="406" width="290" height="0" rx="0" fill="none"/>

  <!-- Connection flow label -->
  <rect x="370" y="380" width="200" height="28" rx="14" fill="#06B6D4" opacity="0.1" stroke="#06B6D4" stroke-width="1"/>
  <text x="470" y="399" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#0E7490" font-weight="600">herdr --remote ssh://...</text>

  <!-- Command examples -->
  <g transform="translate(30, 424)">
    <rect x="0" y="0" width="940" height="44" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <text x="20" y="18" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748B" font-weight="600">Commands:</text>
    <text x="20" y="34" font-family="monospace" font-size="9" fill="#334155">herdr --remote ssh://user@vps:2222</text>
    <text x="350" y="34" font-family="monospace" font-size="9" fill="#334155">ssh -L 2222:localhost:2222 user@vps</text>
    <text x="680" y="34" font-family="monospace" font-size="9" fill="#334155">herdr session list</text>
  </g>
</svg>