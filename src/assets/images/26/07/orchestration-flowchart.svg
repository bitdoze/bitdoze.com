<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" width="1000" height="520">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC"/>
      <stop offset="100%" style="stop-color:#E2E8F0"/>
    </linearGradient>
    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.07"/>
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#CBD5E1" stroke-width="0.5" opacity="0.2"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4F46E5"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#06B6D4"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22C55E"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#EAB308"/>
    </marker>
    <marker id="arrowPink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#EC4899"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="520" fill="url(#bgGrad)"/>
  <ellipse cx="200" cy="250" rx="280" ry="220" fill="url(#blob1)"/>
  <ellipse cx="800" cy="200" rx="260" ry="200" fill="url(#blob2)"/>
  <rect width="1000" height="520" fill="url(#grid)"/>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#0F172A">Agent Orchestration via Socket API</text>
  <text x="500" y="54" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748B">Lead agent drives helper agents programmatically</text>

  <!-- ===== STEP 1: Lead Agent Initiates ===== -->
  <g filter="url(#shadow)">
    <rect x="50" y="90" width="200" height="110" rx="14" fill="white" stroke="#4F46E5" stroke-width="2"/>
  </g>
  <rect x="50" y="90" width="200" height="30" rx="14" fill="#4F46E5"/>
  <rect x="50" y="108" width="200" height="12" fill="#4F46E5"/>
  <text x="150" y="112" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white" font-weight="700">1 · Lead Agent</text>
  <text x="150" y="138" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#334155" font-weight="500">Claude Code</text>
  <text x="150" y="156" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#334155" font-weight="500">Analyzes task,</text>
  <text x="150" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#334155" font-weight="500">delegates subtasks</text>
  <text x="150" y="192" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6366F1" font-weight="600">Running in Pane 1</text>

  <!-- Arrow: Step 1 → Step 2 -->
  <path d="M258,145 L332,145" stroke="#4F46E5" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="295" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#4F46E5" font-weight="600">API Call</text>

  <!-- ===== STEP 2: Socket API ===== -->
  <g filter="url(#shadow)">
    <rect x="340" y="80" width="200" height="140" rx="14" fill="white" stroke="#06B6D4" stroke-width="2"/>
  </g>
  <rect x="340" y="80" width="200" height="30" rx="14" fill="#06B6D4"/>
  <rect x="340" y="98" width="200" height="12" fill="#06B6D4"/>
  <text x="440" y="102" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white" font-weight="700">2 · Socket API</text>

  <rect x="355" y="120" width="170" height="22" rx="6" fill="#F0FDFA" stroke="#99F6E4" stroke-width="1"/>
  <text x="440" y="135" text-anchor="middle" font-family="monospace" font-size="9" fill="#0E7490">herdr workspace create</text>

  <rect x="355" y="148" width="170" height="22" rx="6" fill="#F0FDFA" stroke="#99F6E4" stroke-width="1"/>
  <text x="440" y="163" text-anchor="middle" font-family="monospace" font-size="9" fill="#0E7490">herdr pane split -v</text>

  <rect x="355" y="176" width="170" height="22" rx="6" fill="#F0FDFA" stroke="#99F6E4" stroke-width="1"/>
  <text x="440" y="191" text-anchor="middle" font-family="monospace" font-size="9" fill="#0E7490">herdr pane run "codex"</text>

  <!-- Arrow: Step 2 → Step 3 (top) -->
  <path d="M548,120 L632,120" stroke="#06B6D4" stroke-width="2.5" fill="none" marker-end="url(#arrowCyan)"/>
  <text x="590" y="112" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#06B6D4" font-weight="600">Spawn</text>

  <!-- Arrow: Step 2 → Step 3 (bottom, Codex) -->
  <path d="M548,187 L632,230" stroke="#06B6D4" stroke-width="2.5" fill="none" marker-end="url(#arrowCyan)"/>
  <text x="600" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#06B6D4" font-weight="600">Spawn</text>

  <!-- ===== STEP 3: Helper Agents ===== -->
  <!-- Helper Agent 1 -->
  <g filter="url(#shadow)">
    <rect x="640" y="80" width="160" height="100" rx="14" fill="white" stroke="#22C55E" stroke-width="1.5"/>
  </g>
  <rect x="640" y="80" width="160" height="26" rx="14" fill="#22C55E"/>
  <rect x="640" y="96" width="160" height="10" fill="#22C55E"/>
  <text x="720" y="99" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white" font-weight="700">3a · Copilot CLI</text>
  <text x="720" y="124" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#334155" font-weight="500">Lint &amp; format check</text>
  <text x="720" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#334155" font-weight="500">Running in Pane 2</text>
  <circle cx="660" cy="162" r="4" fill="#22C55E"/>
  <text x="670" y="166" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#22C55E" font-weight="600">Working...</text>

  <!-- Helper Agent 2 -->
  <g filter="url(#shadow)">
    <rect x="640" y="200" width="160" height="100" rx="14" fill="white" stroke="#8B5CF6" stroke-width="1.5"/>
  </g>
  <rect x="640" y="200" width="160" height="26" rx="14" fill="#8B5CF6"/>
  <rect x="640" y="216" width="160" height="10" fill="#8B5CF6"/>
  <text x="720" y="219" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white" font-weight="700">3b · Codex</text>
  <text x="720" y="244" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#334155" font-weight="500">Write unit tests</text>
  <text x="720" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#334155" font-weight="500">Running in Pane 3</text>
  <circle cx="660" cy="282" r="4" fill="#8B5CF6"/>
  <text x="670" y="286" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#8B5CF6" font-weight="600">Working...</text>

  <!-- ===== STEP 4: State Feedback ===== -->
  <!-- Arrow: Helpers → State Monitor -->
  <path d="M808,130 L870,130 L870,340 L540,340" stroke="#EAB308" stroke-width="2" fill="none" marker-end="url(#arrowAmber)" stroke-dasharray="6,3"/>
  <path d="M808,250 L870,250 L870,340" stroke="#EAB308" stroke-width="2" fill="none" stroke-dasharray="6,3"/>

  <text x="890" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#A16207" font-weight="600">State</text>
  <text x="890" y="254" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#A16207" font-weight="600">Updates</text>

  <!-- Step 4: State Monitor / Wait -->
  <g filter="url(#shadow)">
    <rect x="340" y="310" width="200" height="90" rx="14" fill="white" stroke="#EAB308" stroke-width="2"/>
  </g>
  <rect x="340" y="310" width="200" height="28" rx="14" fill="#EAB308"/>
  <rect x="340" y="328" width="200" height="10" fill="#EAB308"/>
  <text x="440" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white" font-weight="700">4 · State Feedback</text>

  <text x="440" y="358" text-anchor="middle" font-family="monospace" font-size="9" fill="#92400E">herdr wait agent-status</text>
  <text x="440" y="376" text-anchor="middle" font-family="monospace" font-size="9" fill="#92400E">  --pane 2 --state done</text>
  <text x="440" y="392" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#A16207">Blocks until agent finishes</text>

  <!-- Arrow: State → Read Output -->
  <path d="M548,370 L632,370" stroke="#EC4899" stroke-width="2.5" fill="none" marker-end="url(#arrowPink)"/>
  <text x="590" y="360" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#EC4899" font-weight="600">Read</text>

  <!-- Step 5: Read Output -->
  <g filter="url(#shadow)">
    <rect x="640" y="330" width="160" height="80" rx="14" fill="white" stroke="#EC4899" stroke-width="1.5"/>
  </g>
  <rect x="640" y="330" width="160" height="26" rx="14" fill="#EC4899"/>
  <rect x="640" y="346" width="160" height="10" fill="#EC4899"/>
  <text x="720" y="349" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="white" font-weight="700">5 · Read Results</text>

  <text x="720" y="374" text-anchor="middle" font-family="monospace" font-size="9" fill="#9D174D">herdr pane read</text>
  <text x="720" y="390" text-anchor="middle" font-family="monospace" font-size="9" fill="#9D174D">  --pane 2</text>

  <!-- Feedback loop arrow: Read → Lead Agent -->
  <path d="M640,400 L150,400 L150,208" stroke="#4F46E5" stroke-width="2" fill="none" marker-end="url(#arrow)" stroke-dasharray="8,4"/>
  <text x="395" y="418" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#4F46E5" font-weight="600">Results fed back to Lead Agent → Loop or Complete</text>

  <!-- Loop indicator -->
  <g transform="translate(90, 290)">
    <rect x="-30" y="-18" width="60" height="36" rx="18" fill="#4F46E5" opacity="0.1" stroke="#4F46E5" stroke-width="1.5"/>
    <text x="0" y="-2" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#4F46E5" font-weight="700">Loop</text>
    <text x="0" y="10" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#6366F1">or Done</text>
  </g>

  <!-- Legend -->
  <g transform="translate(50, 470)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748B" font-weight="600">Flow:</text>
    <line x1="50" y1="-4" x2="80" y2="-4" stroke="#4F46E5" stroke-width="2"/>
    <text x="85" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">API Call</text>
    <line x1="145" y1="-4" x2="175" y2="-4" stroke="#06B6D4" stroke-width="2"/>
    <text x="180" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Spawn Agent</text>
    <line x1="275" y1="-4" x2="305" y2="-4" stroke="#EAB308" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="310" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">State Update</text>
    <line x1="405" y1="-4" x2="435" y2="-4" stroke="#EC4899" stroke-width="2"/>
    <text x="440" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Read Output</text>
    <line x1="520" y1="-4" x2="550" y2="-4" stroke="#4F46E5" stroke-width="2" stroke-dasharray="8,4"/>
    <text x="555" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Feedback Loop</text>
  </g>
</svg>