<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="meetilyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#3730A3"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366F1"/>
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06B6D4"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#F59E0B"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8B5CF6"/>
    </marker>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="0.5" opacity="0.2"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="480" fill="url(#bg)"/>
  <rect width="900" height="480" fill="url(#grid)"/>

  <!-- Device boundary -->
  <rect x="40" y="55" width="820" height="340" rx="16" fill="#EEF2FF" fill-opacity="0.5" stroke="#6366F1" stroke-width="2" stroke-dasharray="8 5"/>
  <text x="450" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#6366F1" font-weight="700">YOUR MACHINE — No Data Leaves This Box</text>

  <!-- Title -->
  <text x="450" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94A3B8" font-weight="500" letter-spacing="1.5">MEETILY ARCHITECTURE</text>

  <!-- Audio sources -->
  <!-- System Audio -->
  <rect x="65" y="100" width="150" height="65" rx="10" fill="white" stroke="#6366F1" stroke-width="1.5"/>
  <text x="140" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#312E81" font-weight="700">System Audio</text>
  <text x="140" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6366F1">Zoom / Meet / Teams</text>

  <!-- Microphone -->
  <rect x="65" y="280" width="150" height="65" rx="10" fill="white" stroke="#6366F1" stroke-width="1.5"/>
  <text x="140" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#312E81" font-weight="700">Microphone</text>
  <text x="140" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6366F1">Your Voice</text>

  <!-- Arrows from sources to Meetily -->
  <path d="M215 135 L280 195" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <path d="M215 310 L280 250" stroke="#6366F1" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Meetily core -->
  <rect x="280" y="155" width="150" height="130" rx="12" fill="url(#meetilyGrad)" stroke="#3730A3" stroke-width="1.5"/>
  <text x="355" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="white" font-weight="800">Meetily</text>
  <text x="355" y="222" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#C7D2FE">Tauri (Rust)</text>
  <text x="355" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#C7D2FE">Next.js Frontend</text>
  <text x="355" y="258" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#A5B4FC">Dual-Channel</text>
  <text x="355" y="273" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#A5B4FC">Audio Capture</text>

  <!-- Arrow to Transcription -->
  <path d="M430 220 L480 220" stroke="url(#accent)" stroke-width="2" marker-end="url(#arrowCyan)"/>

  <!-- Transcription -->
  <rect x="480" y="145" width="160" height="150" rx="10" fill="white" stroke="#06B6D4" stroke-width="1.5"/>
  <rect x="480" y="145" width="160" height="30" rx="10" fill="#06B6D4" fill-opacity="0.1"/>
  <text x="560" y="166" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#0E7490" font-weight="700">Transcription</text>
  <text x="560" y="195" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#164E63" font-weight="600">Parakeet (fast)</text>
  <text x="560" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#164E63" font-weight="600">Whisper (99 lang)</text>
  <text x="560" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#67E8F9">GPU: Metal / CUDA</text>
  <text x="560" y="258" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#67E8F9">Vulkan / OpenBLAS</text>
  <text x="560" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#22D3EE">ONNX Runtime</text>

  <!-- Arrow to AI Summary -->
  <path d="M640 220 L690 220" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- AI Summary -->
  <rect x="690" y="145" width="140" height="150" rx="10" fill="white" stroke="#10B981" stroke-width="1.5"/>
  <rect x="690" y="145" width="140" height="30" rx="10" fill="#10B981" fill-opacity="0.1"/>
  <text x="760" y="166" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#065F46" font-weight="700">AI Summary</text>
  <text x="760" y="198" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#047857" font-weight="600">Ollama (local)</text>
  <text x="760" y="218" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#047857">Claude / Groq</text>
  <text x="760" y="238" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#047857">OpenRouter</text>
  <text x="760" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6EE7B7">Qwen 3.5 built-in</text>
  <text x="760" y="278" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6EE7B7">BYOK any LLM</text>

  <!-- Bottom: SQLite + Editor + Export -->
  <path d="M355 285 L355 350 L380 350" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrowPurple)"/>
  <path d="M760 295 L760 350 L580 350" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrowPurple)"/>

  <rect x="300" y="340" width="280" height="50" rx="10" fill="white" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="440" y="362" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#5B21B6" font-weight="700">SQLite DB → BlockNote Editor</text>
  <text x="440" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8B5CF6">Export: Markdown / PDF / DOCX</text>

  <!-- Legend -->
  <rect x="65" y="420" width="770" height="45" rx="8" fill="white" fill-opacity="0.7" stroke="#CBD5E1" stroke-width="1"/>
  <circle cx="100" cy="442" r="6" fill="#6366F1" opacity="0.2"/>
  <circle cx="100" cy="442" r="3" fill="#6366F1"/>
  <text x="112" y="447" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">Audio Input</text>
  <circle cx="240" cy="442" r="6" fill="#4F46E5" opacity="0.2"/>
  <circle cx="240" cy="442" r="3" fill="#4F46E5"/>
  <text x="252" y="447" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">Core App</text>
  <circle cx="370" cy="442" r="6" fill="#06B6D4" opacity="0.2"/>
  <circle cx="370" cy="442" r="3" fill="#06B6D4"/>
  <text x="382" y="447" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">Transcription (Local)</text>
  <circle cx="540" cy="442" r="6" fill="#10B981" opacity="0.2"/>
  <circle cx="540" cy="442" r="3" fill="#10B981"/>
  <text x="552" y="447" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">Summarization (Local or Cloud)</text>
  <circle cx="740" cy="442" r="6" fill="#8B5CF6" opacity="0.2"/>
  <circle cx="740" cy="442" r="3" fill="#8B5CF6"/>
  <text x="752" y="447" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">Storage &amp; Export</text>
</svg>