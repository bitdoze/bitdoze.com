<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="astroGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FF5D01"/>
      <stop offset="100%" stop-color="#FF8A4C"/>
    </linearGradient>
    <linearGradient id="nextGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#333333"/>
    </linearGradient>
    <linearGradient id="tanGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#F87171"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="0.8" opacity="0.2"/>
    </pattern>
    <radialGradient id="blob1" cx="0.15" cy="0.2" r="0.5">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="0.85" cy="0.8" r="0.4">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>
  <rect width="800" height="500" fill="url(#grid)" rx="12"/>
  <rect width="800" height="500" fill="url(#blob1)"/>
  <rect width="800" height="500" fill="url(#blob2)"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="22" fill="#0F172A">Default Bundle Size Comparison</text>
  <text x="400" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="13" fill="#64748B">JavaScript shipped to browser for a simple blog page (gzipped)</text>

  <!-- Chart area -->
  <g transform="translate(120, 90)">
    <!-- Y-axis gridlines -->
    <line x1="0" y1="300" x2="560" y2="300" stroke="#94A3B8" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="225" x2="560" y2="225" stroke="#CBD5E1" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.5"/>
    <line x1="0" y1="150" x2="560" y2="150" stroke="#CBD5E1" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.5"/>
    <line x1="0" y1="75" x2="560" y2="75" stroke="#CBD5E1" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.5"/>
    <line x1="0" y1="0" x2="560" y2="0" stroke="#CBD5E1" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.5"/>

    <!-- Y-axis labels -->
    <text x="-10" y="304" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748B">0 KB</text>
    <text x="-10" y="229" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748B">25 KB</text>
    <text x="-10" y="154" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748B">50 KB</text>
    <text x="-10" y="79" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748B">75 KB</text>
    <text x="-10" y="4" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748B">100 KB</text>

    <!-- Astro bar: 0KB — show minimal indicator -->
    <g transform="translate(70, 0)">
      <rect x="0" y="296" width="100" height="4" rx="2" fill="url(#astroGrad)"/>
      <text x="50" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="20" fill="#FF5D01">0 KB</text>
      <text x="50" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="14" fill="#0F172A">Astro</text>
      <text x="50" y="348" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">Zero JS by default</text>
    </g>

    <!-- Next.js bar: 95KB → 95/100 * 300 = 285px height -->
    <g transform="translate(230, 0)">
      <rect x="0" y="15" width="100" height="285" rx="6" fill="url(#nextGrad)" opacity="0.9"/>
      <text x="50" y="10" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="20" fill="#000000">~95 KB</text>
      <text x="50" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="14" fill="#0F172A">Next.js</text>
      <text x="50" y="348" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">React runtime + RSC</text>
    </g>

    <!-- TanStack Start bar: ~50KB intermediate → 50/100 * 300 = 150px height -->
    <g transform="translate(390, 0)">
      <rect x="0" y="150" width="100" height="150" rx="6" fill="url(#tanGrad)" opacity="0.9"/>
      <text x="50" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="20" fill="#EF4444">~50 KB</text>
      <text x="50" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="14" fill="#0F172A">TanStack</text>
      <text x="50" y="348" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">SSR then SPA behavior</text>
    </g>
  </g>

  <!-- Legend note -->
  <text x="400" y="475" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94A3B8" font-style="italic">Measured for a simple blog/content page • TanStack Start varies with app complexity</text>
</svg>