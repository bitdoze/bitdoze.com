<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" width="1000" height="560">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC"/>
      <stop offset="100%" style="stop-color:#E2E8F0"/>
    </linearGradient>
    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#CBD5E1" stroke-width="0.5" opacity="0.2"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4F46E5"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#06B6D4"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="560" fill="url(#bgGrad)"/>
  <ellipse cx="200" cy="150" rx="300" ry="220" fill="url(#blob1)"/>
  <ellipse cx="800" cy="420" rx="280" ry="200" fill="url(#blob2)"/>
  <rect width="1000" height="560" fill="url(#grid)"/>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#0F172A">Herdr Architecture Overview</text>
  <text x="500" y="54" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#64748B">Client-Server Model with Agent State Awareness</text>

  <!-- ===== MAIN TERMINAL CLIENT (LEFT) ===== -->
  <g filter="url(#shadow)">
    <rect x="30" y="80" width="380" height="440" rx="14" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
  </g>
  <!-- Client header -->
  <rect x="30" y="80" width="380" height="36" rx="14" fill="url(#headerGrad)"/>
  <rect x="30" y="102" width="380" height="14" fill="url(#headerGrad)"/>
  <circle cx="52" cy="98" r="6" fill="#EF4444" opacity="0.8"/>
  <circle cx="70" cy="98" r="6" fill="#EAB308" opacity="0.8"/>
  <circle cx="88" cy="98" r="6" fill="#22C55E" opacity="0.8"/>
  <text x="220" y="102" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="white" font-weight="600">Herdr TUI Client</text>

  <!-- Sidebar (Agent State Panel) -->
  <rect x="40" y="126" width="90" height="380" rx="6" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="85" y="146" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748B" font-weight="700" letter-spacing="1.5">AGENTS</text>

  <!-- Agent entries in sidebar -->
  <rect x="48" y="156" width="74" height="40" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1"/>
  <circle cx="60" cy="170" r="4" fill="#22C55E"/>
  <text x="68" y="168" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#166534" font-weight="600">Claude</text>
  <text x="60" y="182" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#16A34A">Working</text>

  <rect x="48" y="204" width="74" height="40" rx="6" fill="#FEF9C3" stroke="#FDE68A" stroke-width="1"/>
  <circle cx="60" cy="218" r="4" fill="#EAB308"/>
  <text x="68" y="216" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#854D0E" font-weight="600">Codex</text>
  <text x="60" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#A16207">Blocked</text>

  <rect x="48" y="252" width="74" height="40" rx="6" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <circle cx="60" cy="266" r="4" fill="#3B82F6"/>
  <text x="68" y="264" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#1E40AF" font-weight="600">Copilot</text>
  <text x="60" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#2563EB">Idle</text>

  <rect x="48" y="300" width="74" height="40" rx="6" fill="#F3E8FF" stroke="#C4B5FD" stroke-width="1"/>
  <circle cx="60" cy="314" r="4" fill="#8B5CF6"/>
  <text x="68" y="312" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6D28D9" font-weight="600">Gemini</text>
  <text x="60" y="326" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#7C3AED">Done</text>

  <!-- PTY Panes -->
  <!-- Pane 1: Claude Code (working) -->
  <rect x="140" y="126" width="260" height="182" rx="6" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <rect x="140" y="126" width="260" height="22" rx="6" fill="#166534"/>
  <rect x="140" y="142" width="260" height="6" fill="#166534"/>
  <text x="150" y="142" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#86EFAC" font-weight="600">Claude Code — Pane 1</text>
  <rect x="150" y="158" width="100" height="6" rx="3" fill="#4F46E5" opacity="0.6"/>
  <rect x="150" y="170" width="160" height="5" rx="2.5" fill="#94A3B8" opacity="0.3"/>
  <rect x="150" y="180" width="130" height="5" rx="2.5" fill="#06B6D4" opacity="0.4"/>
  <rect x="150" y="190" width="180" height="5" rx="2.5" fill="#94A3B8" opacity="0.25"/>
  <rect x="150" y="200" width="90" height="5" rx="2.5" fill="#EC4899" opacity="0.4"/>
  <rect x="150" y="210" width="140" height="5" rx="2.5" fill="#94A3B8" opacity="0.2"/>
  <!-- Working spinner -->
  <circle cx="156" cy="236" r="5" fill="#22C55E" opacity="0.8"/>
  <text x="166" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#22C55E">▶ Generating code...</text>

  <!-- Pane 2: Codex (blocked) -->
  <rect x="140" y="316" width="260" height="134" rx="6" fill="#0F172A" stroke="#334155" stroke-width="1"/>
  <rect x="140" y="316" width="260" height="22" rx="6" fill="#854D0E"/>
  <rect x="140" y="332" width="260" height="6" fill="#854D0E"/>
  <text x="150" y="332" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#FDE68A" font-weight="600">Codex — Pane 2</text>
  <rect x="150" y="348" width="120" height="5" rx="2.5" fill="#94A3B8" opacity="0.3"/>
  <rect x="150" y="358" width="80" height="5" rx="2.5" fill="#94A3B8" opacity="0.2"/>
  <rect x="150" y="368" width="150" height="5" rx="2.5" fill="#94A3B8" opacity="0.25"/>
  <!-- Blocked prompt -->
  <rect x="148" y="388" width="244" height="50" rx="6" fill="#FEF9C3" opacity="0.15" stroke="#EAB308" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="270" y="407" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#EAB308" font-weight="600">⚠ Waiting for permission...</text>
  <text x="270" y="424" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#A16207">Approve file write?</text>

  <!-- ===== SESSION SERVER (CENTER) ===== -->
  <g filter="url(#shadow)">
    <rect x="460" y="100" width="200" height="180" rx="12" fill="white" stroke="#4F46E5" stroke-width="2"/>
  </g>
  <rect x="460" y="100" width="200" height="32" rx="12" fill="#4F46E5"/>
  <rect x="460" y="120" width="200" height="12" fill="#4F46E5"/>
  <text x="560" y="122" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="white" font-weight="700">Session Server</text>

  <!-- Server internals -->
  <rect x="475" y="144" width="170" height="28" rx="6" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1"/>
  <text x="560" y="163" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#4338CA" font-weight="600">PTY Manager</text>

  <rect x="475" y="180" width="80" height="28" rx="6" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
  <text x="515" y="199" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#065F46" font-weight="600">Session 1</text>

  <rect x="565" y="180" width="80" height="28" rx="6" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1"/>
  <text x="605" y="199" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#9A3412" font-weight="600">Session 2</text>

  <rect x="475" y="216" width="170" height="28" rx="6" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1"/>
  <text x="560" y="235" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#0C4A6E" font-weight="600">Agent Detection</text>

  <rect x="475" y="252" width="170" height="20" rx="6" fill="#FAF5FF" stroke="#DDD6FE" stroke-width="1"/>
  <text x="560" y="266" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#6D28D9" font-weight="500">State: blocked | working | done | idle</text>

  <!-- Arrows: Client ↔ Server -->
  <path d="M410,260 L450,210" stroke="#4F46E5" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M460,270 L415,310" stroke="#4F46E5" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="408" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#4F46E5" font-weight="600" transform="rotate(-50,408,230)">PTY I/O</text>
  <text x="408" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#4F46E5" font-weight="600" transform="rotate(50,408,305)">State</text>

  <!-- ===== SOCKET API (BOTTOM CENTER) ===== -->
  <g filter="url(#shadow)">
    <rect x="460" y="330" width="200" height="100" rx="12" fill="white" stroke="#06B6D4" stroke-width="2"/>
  </g>
  <rect x="460" y="330" width="200" height="30" rx="12" fill="#06B6D4"/>
  <rect x="460" y="350" width="200" height="10" fill="#06B6D4"/>
  <text x="560" y="351" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white" font-weight="700">Socket API</text>

  <text x="560" y="378" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#0E7490" font-weight="500">herdr pane run</text>
  <text x="560" y="393" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#0E7490" font-weight="500">herdr wait agent-status</text>
  <text x="560" y="408" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#0E7490" font-weight="500">herdr pane read</text>

  <!-- Arrow: Server ↔ Socket API -->
  <path d="M560,280 L560,322" stroke="#06B6D4" stroke-width="2" fill="none" marker-end="url(#arrowCyan)"/>
  <text x="574" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#06B6D4" font-weight="600">Unix Socket</text>

  <!-- ===== REMOTE ACCESS (RIGHT) ===== -->
  <g filter="url(#shadow)">
    <rect x="720" y="100" width="250" height="180" rx="12" fill="white" stroke="#94A3B8" stroke-width="1.5"/>
  </g>
  <rect x="720" y="100" width="250" height="32" rx="12" fill="#475569"/>
  <rect x="720" y="120" width="250" height="12" fill="#475569"/>
  <text x="845" y="122" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="white" font-weight="600">Remote Access</text>

  <!-- SSH tunnel -->
  <rect x="735" y="148" width="220" height="36" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/>
  <text x="845" y="171" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#334155" font-weight="600">SSH Tunnel (port 2222)</text>

  <!-- Remote clients -->
  <g transform="translate(770, 200)">
    <rect x="0" y="0" width="60" height="50" rx="8" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1"/>
    <text x="30" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#4F46E5">💻</text>
    <text x="30" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#4338CA" font-weight="600">Laptop</text>
  </g>
  <g transform="translate(870, 200)">
    <rect x="0" y="0" width="60" height="50" rx="8" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="1"/>
    <text x="30" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#065F46">📱</text>
    <text x="30" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#065F46" font-weight="600">Phone</text>
  </g>

  <!-- Arrow: Server → Remote -->
  <path d="M660,200 L712,200" stroke="#94A3B8" stroke-width="2" fill="none" marker-end="url(#arrowGray)"/>
  <text x="686" y="192" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#64748B" font-weight="600">SSH</text>

  <!-- ===== PLUGINS & MARKETPLACE (BOTTOM RIGHT) ===== -->
  <g filter="url(#shadow)">
    <rect x="720" y="330" width="250" height="100" rx="12" fill="white" stroke="#EC4899" stroke-width="1.5"/>
  </g>
  <rect x="720" y="330" width="250" height="30" rx="12" fill="#EC4899"/>
  <rect x="720" y="350" width="250" height="10" fill="#EC4899"/>
  <text x="845" y="351" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white" font-weight="700">Plugin Ecosystem</text>

  <text x="845" y="378" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#9D174D" font-weight="500">herdr-plus • file-viewer</text>
  <text x="845" y="395" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#9D174D" font-weight="500">ccgram • vim-navigation</text>
  <text x="845" y="412" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#9D174D" font-weight="500">Community Marketplace</text>

  <!-- Arrow: Server → Plugins -->
  <path d="M660,380 L712,380" stroke="#EC4899" stroke-width="1.5" fill="none" marker-end="url(#arrowPink)"/>
  <defs>
    <marker id="arrowPink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#EC4899"/>
    </marker>
  </defs>

  <!-- Legend -->
  <g transform="translate(30, 480)">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748B" font-weight="600">Legend:</text>
    <circle cx="60" cy="-4" r="5" fill="#22C55E"/>
    <text x="70" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Working</text>
    <circle cx="130" cy="-4" r="5" fill="#EAB308"/>
    <text x="140" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Blocked</text>
    <circle cx="200" cy="-4" r="5" fill="#3B82F6"/>
    <text x="210" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Idle</text>
    <circle cx="255" cy="-4" r="5" fill="#8B5CF6"/>
    <text x="265" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">Done</text>
    <rect x="310" y="-10" width="20" height="12" rx="2" fill="none" stroke="#4F46E5" stroke-width="1.5"/>
    <text x="335" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">PTY I/O</text>
    <rect x="390" y="-10" width="20" height="12" rx="2" fill="none" stroke="#06B6D4" stroke-width="1.5"/>
    <text x="415" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#475569">API Call</text>
  </g>
</svg>