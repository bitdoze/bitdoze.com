<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <radialGradient id="glow1" cx="25%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="55%" r="35%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="80%" r="30%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leftGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="rightGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.25"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <rect width="1200" height="675" fill="url(#glow1)"/>
  <rect width="1200" height="675" fill="url(#glow2)"/>
  <rect width="1200" height="675" fill="url(#glow3)"/>

  <!-- Decorative circles -->
  <circle cx="90" cy="70" r="5" fill="#6366F1" opacity="0.15"/>
  <circle cx="1110" cy="110" r="4" fill="#10B981" opacity="0.18"/>
  <circle cx="140" cy="590" r="6" fill="#F59E0B" opacity="0.12"/>
  <circle cx="1060" cy="560" r="5" fill="#6366F1" opacity="0.1"/>

  <!-- Category badge -->
  <rect x="400" y="120" width="400" height="40" rx="20" fill="#6366F1" opacity="0.08"/>
  <rect x="400" y="120" width="400" height="40" rx="20" fill="none" stroke="#6366F1" stroke-width="1.5" opacity="0.25"/>
  <text x="600" y="146" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#6366F1" letter-spacing="3">AGENT MEMORY</text>

  <!-- VS divider -->
  <line x1="600" y1="200" x2="600" y2="480" stroke="#94A3B8" stroke-width="2" opacity="0.3" stroke-dasharray="8,6"/>
  <circle cx="600" cy="340" r="28" fill="#F8FAFC" stroke="#94A3B8" stroke-width="2" opacity="0.5"/>
  <text x="600" y="348" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="800" fill="#64748B">VS</text>

  <!-- Left: Cognee -->
  <g transform="translate(300, 280)">
    <!-- Graph nodes icon -->
    <circle cx="-30" cy="-40" r="10" fill="none" stroke="#6366F1" stroke-width="2.5"/>
    <circle cx="30" cy="-40" r="10" fill="none" stroke="#6366F1" stroke-width="2.5"/>
    <circle cx="0" cy="-10" r="10" fill="none" stroke="#6366F1" stroke-width="2.5"/>
    <line x1="-22" y1="-35" x2="-8" y2="-15" stroke="#6366F1" stroke-width="1.5" opacity="0.6"/>
    <line x1="22" y1="-35" x2="8" y2="-15" stroke="#6366F1" stroke-width="1.5" opacity="0.6"/>
    <line x1="-22" y1="-40" x2="22" y2="-40" stroke="#6366F1" stroke-width="1.5" opacity="0.4"/>
  </g>
  <text x="300" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="url(#leftGrad)">Cognee</text>
  <text x="300" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#64748B">Knowledge Graphs</text>

  <!-- Right: Hindsight -->
  <g transform="translate(900, 280)">
    <!-- Memory layers icon -->
    <rect x="-35" y="-50" width="70" height="14" rx="7" fill="none" stroke="#10B981" stroke-width="2"/>
    <rect x="-35" y="-28" width="70" height="14" rx="7" fill="none" stroke="#10B981" stroke-width="2"/>
    <rect x="-35" y="-6" width="70" height="14" rx="7" fill="none" stroke="#10B981" stroke-width="2"/>
  </g>
  <text x="900" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="url(#rightGrad)">Hindsight</text>
  <text x="900" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#64748B">Agent Memory</text>

  <!-- Main title -->
  <text x="600" y="510" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="40" font-weight="800" fill="#0F172A">
    Which one for your agent?
  </text>

  <!-- Subtitle -->
  <text x="600" y="555" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#64748B" font-weight="400">
    Architecture, integrations, and when to use each
  </text>

  <!-- Bottom pills -->
  <g transform="translate(600, 610)">
    <rect x="-160" y="-16" width="100" height="32" rx="16" fill="#6366F1" opacity="0.1"/>
    <text x="-110" y="5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6366F1" font-weight="600">Graphs</text>

    <rect x="-40" y="-16" width="80" height="32" rx="16" fill="#F59E0B" opacity="0.1"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#F59E0B" font-weight="600">Benchmarks</text>

    <rect x="60" y="-16" width="100" height="32" rx="16" fill="#10B981" opacity="0.1"/>
    <text x="110" y="5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#10B981" font-weight="600">MCP</text>
  </g>
</svg>
