<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <!-- Ambient blobs -->
    <radialGradient id="blob1" cx="25%" cy="30%" r="35%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="75%" cy="60%" r="30%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob3" cx="50%" cy="85%" r="25%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.25"/>
    </pattern>
    <!-- Icon gradient -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#blob1)"/>
  <rect width="1200" height="675" fill="url(#blob2)"/>
  <rect width="1200" height="675" fill="url(#blob3)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>

  <!-- Decorative dots -->
  <circle cx="80" cy="60" r="4" fill="#6366F1" opacity="0.15"/>
  <circle cx="150" cy="120" r="3" fill="#06B6D4" opacity="0.12"/>
  <circle cx="1050" cy="80" r="5" fill="#EC4899" opacity="0.14"/>
  <circle cx="1120" cy="150" r="3" fill="#6366F1" opacity="0.12"/>
  <circle cx="100" cy="580" r="4" fill="#06B6D4" opacity="0.15"/>
  <circle cx="1100" cy="600" r="3" fill="#6366F1" opacity="0.12"/>
  <circle cx="950" cy="550" r="4" fill="#EC4899" opacity="0.13"/>
  <circle cx="200" cy="500" r="3" fill="#06B6D4" opacity="0.14"/>

  <!-- Central Icon: Shield with lock + chat bubble -->
  <g transform="translate(600, 180)">
    <!-- Shield shape -->
    <path d="M0,-70 L55,-45 L55,20 C55,55 30,75 0,85 C-30,75 -55,55 -55,20 L-55,-45 Z" fill="url(#shieldGrad)" opacity="0.9"/>
    <path d="M0,-55 L42,-35 L42,16 C42,44 22,60 0,68 C-22,60 -42,44 -42,16 L-42,-35 Z" fill="none" stroke="#fff" stroke-width="2" opacity="0.4"/>
    <!-- Lock icon inside shield -->
    <rect x="-16" y="-8" width="32" height="26" rx="4" fill="#fff" opacity="0.9"/>
    <path d="M-10,-8 L-10,-18 C-10,-28 10,-28 10,-18 L10,-8" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <circle cx="0" cy="6" r="4" fill="#4F46E5"/>
    <!-- Small chat bubbles -->
    <g transform="translate(50,-30)">
      <rect x="0" y="0" width="30" height="20" rx="10" fill="#06B6D4" opacity="0.8"/>
      <circle cx="10" cy="10" r="2.5" fill="#fff"/>
      <circle cx="20" cy="10" r="2.5" fill="#fff"/>
    </g>
    <g transform="translate(-80,10)">
      <rect x="0" y="0" width="25" height="18" rx="9" fill="#EC4899" opacity="0.7"/>
      <circle cx="8" cy="9" r="2" fill="#fff"/>
      <circle cx="17" cy="9" r="2" fill="#fff"/>
    </g>
  </g>

  <!-- Category Badge -->
  <g transform="translate(600, 310)">
    <rect x="-85" y="-14" width="170" height="28" rx="14" fill="#4F46E5" opacity="0.1"/>
    <rect x="-85" y="-14" width="170" height="28" rx="14" fill="none" stroke="#4F46E5" stroke-width="1.5" opacity="0.4"/>
    <text x="0" y="4" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" letter-spacing="2" fill="#4F46E5" text-transform="uppercase" opacity="0.8">SELF-HOSTING</text>
  </g>

  <!-- Main Title -->
  <text x="600" y="380" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#0F172A" letter-spacing="-1">
    <tspan>Chatto </tspan><tspan fill="url(#titleGrad)">Self-Hosted</tspan>
  </text>

  <!-- Subtitle -->
  <text x="600" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="500" fill="#64748B" letter-spacing="-0.5">
    Privacy Answer to EU Chat Control
  </text>

  <!-- Bottom accent line -->
  <rect x="500" y="470" width="200" height="3" rx="1.5" fill="url(#titleGrad)" opacity="0.6"/>
</svg>