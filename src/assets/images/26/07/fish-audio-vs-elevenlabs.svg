<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" fill="none">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="50%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.25"/>
    </pattern>

    <!-- Glowing Blobs Gradients -->
    <radialGradient id="blob-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob-indigo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob-pink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>

    <!-- Text Gradient -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <!-- Left Brand Gradient (Fish Audio: Indigo/Cyan) -->
    <linearGradient id="brand-fish" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <!-- Right Brand Gradient (ElevenLabs: Coral/Orange) -->
    <linearGradient id="brand-eleven" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg-grad)"/>

  <!-- Glowing Ambient Blobs -->
  <circle cx="200" cy="180" r="350" fill="url(#blob-cyan)" />
  <circle cx="1000" cy="480" r="400" fill="url(#blob-indigo)" />
  <circle cx="600" cy="337" r="300" fill="url(#blob-pink)" />

  <!-- Grid Overlay -->
  <rect width="1200" height="675" fill="url(#grid)" />

  <!-- Decorative Particles -->
  <circle cx="250" cy="150" r="6" fill="#4F46E5" opacity="0.15" />
  <circle cx="950" cy="200" r="8" fill="#06B6D4" opacity="0.15" />
  <circle cx="180" cy="500" r="10" fill="#EC4899" opacity="0.12" />
  <circle cx="1020" cy="450" r="5" fill="#4F46E5" opacity="0.2" />

  <!-- Comparison Center Graphic -->
  <g transform="translate(600, 190)">
    <!-- Left Circle (Fish Audio) -->
    <g transform="translate(-100, 0)">
      <circle cx="0" cy="0" r="55" fill="url(#brand-fish)" />
      <!-- Stylized wave lines -->
      <path d="M-25 0 L-25 -10 L-25 10 M-15 0 L-15 -25 L-15 25 M-5 0 L-5 -35 L-5 35 M5 0 L5 -25 L5 25 M15 0 L15 -15 L15 15 M25 0 L25 -5 L25 5" stroke="white" stroke-width="4.5" stroke-linecap="round" />
    </g>

    <!-- Connecting glowing bridge -->
    <path d="M-45 0 L45 0" stroke="#CBD5E1" stroke-width="3" stroke-dasharray="6 6" />

    <!-- Right Circle (ElevenLabs) -->
    <g transform="translate(100, 0)">
      <circle cx="0" cy="0" r="55" fill="url(#brand-eleven)" />
      <!-- Soundwave representing speech -->
      <path d="M-25 0 L-25 -5 L-25 5 M-15 0 L-15 -15 L-15 15 M-5 0 L-5 -30 L-5 30 M5 0 L5 -35 L5 35 M15 0 L15 -20 L15 20 M25 0 L25 -10 L25 10" stroke="white" stroke-width="4.5" stroke-linecap="round" />
    </g>

    <!-- VS Badge -->
    <circle cx="0" cy="0" r="26" fill="#0F172A" stroke="#FFFFFF" stroke-width="3" />
    <text y="5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="15" fill="#FFFFFF">VS</text>
  </g>

  <!-- Title & Badge Group -->
  <g transform="translate(600, 420)">
    <!-- Badge -->
    <g transform="translate(0, -90)">
      <rect x="-55" y="-18" width="110" height="36" rx="18" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5" />
      <text y="5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#4F46E5" letter-spacing="1.5">COMPARE</text>
    </g>

    <!-- Main Title -->
    <text y="0" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="76" font-weight="900" fill="#0F172A" letter-spacing="-2">
      Fish Audio <tspan fill="url(#text-grad)">vs ElevenLabs</tspan>
    </text>
  </g>
</svg>
