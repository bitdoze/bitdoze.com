<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" width="1000" height="560">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="composioGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="executorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4F46E5" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="selfHostGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.4"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#CBD5E1" stroke-width="0.5" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1000" height="560" fill="url(#bgGrad)" rx="12"/>
  <rect width="1000" height="560" fill="url(#grid)" rx="12"/>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#0F172A">Pricing Comparison: Executor.sh vs Composio</text>
  <line x1="300" y1="46" x2="700" y2="46" stroke="url(#titleGrad)" stroke-width="2" stroke-linecap="round"/>

  <!-- Legend -->
  <rect x="250" y="56" width="14" height="14" rx="3" fill="#EC4899"/>
  <text x="270" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569" font-weight="500">Composio</text>
  <rect x="360" y="56" width="14" height="14" rx="3" fill="#4F46E5"/>
  <text x="380" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569" font-weight="500">Executor.sh (Cloud)</text>
  <rect x="530" y="56" width="14" height="14" rx="3" fill="#10B981"/>
  <text x="550" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569" font-weight="500">Executor.sh (Self-Hosted)</text>

  <!-- Chart area -->
  <!-- Y-axis: Cost ($) -->
  <!-- X-axis: Call volume -->
  <!-- Chart area: x=100 to x=900, y=90 to y=430 -->
  <!-- Y-axis labels: $0, $50, $100, $150, $200, $250 -->
  <!-- X-axis labels: 0, 100K, 200K, 500K, 1M, 2M, 5M -->

  <!-- Chart background -->
  <rect x="100" y="90" width="800" height="340" fill="white" rx="4" opacity="0.6"/>

  <!-- Grid lines (horizontal) -->
  <line x1="100" y1="90" x2="900" y2="90" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="100" y1="148" x2="900" y2="148" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="100" y1="206" x2="900" y2="206" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="100" y1="264" x2="900" y2="264" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="100" y1="322" x2="900" y2="322" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="100" y1="380" x2="900" y2="380" stroke="#E2E8F0" stroke-width="1"/>
  <line x1="100" y1="430" x2="900" y2="430" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- Y-axis labels -->
  <text x="90" y="434" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">$0</text>
  <text x="90" y="384" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">$50</text>
  <text x="90" y="326" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">$100</text>
  <text x="90" y="268" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">$150</text>
  <text x="90" y="210" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">$200</text>
  <text x="90" y="152" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">$250</text>

  <!-- Y-axis title -->
  <text x="25" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569" font-weight="600" transform="rotate(-90, 25, 260)">Monthly Cost (USD)</text>

  <!-- X-axis labels -->
  <!-- Scale: 0=100, 100K=233, 200K=366, 500K=500, 1M=633, 2M=766, 5M=900 -->
  <text x="100" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">0</text>
  <text x="233" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">100K</text>
  <text x="366" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">200K</text>
  <text x="500" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">500K</text>
  <text x="633" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">1M</text>
  <text x="766" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">2M</text>
  <text x="900" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">5M</text>

  <!-- X-axis title -->
  <text x="500" y="472" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569" font-weight="600">Monthly Call Volume</text>

  <!-- Vertical grid lines -->
  <line x1="233" y1="90" x2="233" y2="430" stroke="#E2E8F0" stroke-width="0.5"/>
  <line x1="366" y1="90" x2="366" y2="430" stroke="#E2E8F0" stroke-width="0.5"/>
  <line x1="500" y1="90" x2="500" y2="430" stroke="#E2E8F0" stroke-width="0.5"/>
  <line x1="633" y1="90" x2="633" y2="430" stroke="#E2E8F0" stroke-width="0.5"/>
  <line x1="766" y1="90" x2="766" y2="430" stroke="#E2E8F0" stroke-width="0.5"/>
  <line x1="900" y1="90" x2="900" y2="430" stroke="#E2E8F0" stroke-width="0.5"/>

  <!-- === DATA LINES === -->
  <!-- Y scale: $0 = y430, $250 = y90 → each $1 = 1.36px -->
  <!-- y = 430 - (cost * 1.36) -->

  <!-- Composio line (pink): Free $0→$29→$229→$229+overages -->
  <!-- 0: $0 → y=430 -->
  <!-- 100K: ~$29 → y=430-(29*1.36)=390 -->
  <!-- 200K: $29 → y=390 -->
  <!-- 500K: $229 → y=430-(229*1.36)=118 -->
  <!-- 1M: $229+overages ~$350 → y=90 (capped) -->
  <!-- 2M: $229 (plan covers it) → y=118 -->
  <!-- 5M: Enterprise custom ~$500+ → y=90 (capped) -->
  <polyline points="100,430 233,398 366,390 500,118 633,118 766,118 900,95"
    fill="none" stroke="#EC4899" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Composio data points -->
  <circle cx="100" cy="430" r="5" fill="#EC4899"/>
  <circle cx="233" cy="398" r="5" fill="#EC4899"/>
  <circle cx="366" cy="390" r="5" fill="#EC4899"/>
  <circle cx="500" cy="118" r="5" fill="#EC4899"/>
  <circle cx="633" cy="118" r="5" fill="#EC4899"/>
  <circle cx="766" cy="118" r="5" fill="#EC4899"/>
  <circle cx="900" cy="95" r="5" fill="#EC4899"/>

  <!-- Executor Cloud line (indigo): Free $0→$150 flat -->
  <!-- 0: $0 → y=430 -->
  <!-- 100K: $0 (free tier 10K, assume on free) → y=430 -->
  <!-- 200K: $150 → y=226 -->
  <!-- 500K: $150 → y=226 -->
  <!-- 1M: $150 → y=226 -->
  <!-- 2M: $150 → y=226 -->
  <!-- 5M: Enterprise → y=95 -->
  <polyline points="100,430 233,430 366,226 500,226 633,226 766,226 900,95"
    fill="none" stroke="#4F46E5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Executor cloud data points -->
  <circle cx="100" cy="430" r="5" fill="#4F46E5"/>
  <circle cx="233" cy="430" r="5" fill="#4F46E5"/>
  <circle cx="366" cy="226" r="5" fill="#4F46E5"/>
  <circle cx="500" cy="226" r="5" fill="#4F46E5"/>
  <circle cx="633" cy="226" r="5" fill="#4F46E5"/>
  <circle cx="766" cy="226" r="5" fill="#4F46E5"/>
  <circle cx="900" cy="95" r="5" fill="#4F46E5"/>

  <!-- Executor Self-Hosted line (green): $0 always (infra only ~$5) -->
  <!-- 0: ~$5 → y=423 -->
  <!-- All volumes: ~$5 flat -->
  <polyline points="100,423 233,423 366,423 500,423 633,423 766,423 900,423"
    fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Self-hosted data points -->
  <circle cx="100" cy="423" r="5" fill="#10B981"/>
  <circle cx="500" cy="423" r="5" fill="#10B981"/>
  <circle cx="900" cy="423" r="5" fill="#10B981"/>

  <!-- Price labels on lines -->
  <text x="370" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#EC4899">$29</text>
  <text x="505" y="108" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#EC4899">$229</text>
  <text x="905" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#EC4899">Enterprise</text>

  <text x="370" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#4F46E5">$150/org</text>
  <text x="905" y="88" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#4F46E5">Enterprise</text>

  <text x="505" y="416" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#10B981">$0 + infra (~$5/mo)</text>

  <!-- Annotation: break-even point -->
  <line x1="290" y1="350" x2="290" y2="260" stroke="#F59E0B" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="290" y="252" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#92400E">Break-even</text>
  <text x="290" y="265" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#92400E">~150K calls</text>

  <!-- Footer note -->
  <text x="500" y="500" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94A3B8">Executor.sh self-hosted has zero per-call costs. Cloud plans are per-org, not per-call.</text>
  <text x="500" y="520" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#CBD5E1">Prices as of July 2026. Check both platforms for current pricing.</text>
</svg>