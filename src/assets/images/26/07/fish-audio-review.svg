<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a2744"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="fish" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)" rx="0"/>
  <!-- Sound wave bars -->
  <g transform="translate(600,380)" opacity="0.3">
    <rect x="-200" y="-40" width="8" height="80" rx="4" fill="url(#wave)"/>
    <rect x="-180" y="-60" width="8" height="120" rx="4" fill="url(#wave)"/>
    <rect x="-160" y="-80" width="8" height="160" rx="4" fill="url(#wave)"/>
    <rect x="-140" y="-50" width="8" height="100" rx="4" fill="url(#wave)"/>
    <rect x="-120" y="-90" width="8" height="180" rx="4" fill="url(#wave)"/>
    <rect x="-100" y="-70" width="8" height="140" rx="4" fill="url(#wave)"/>
    <rect x="-80" y="-100" width="8" height="200" rx="4" fill="url(#wave)"/>
    <rect x="-60" y="-60" width="8" height="120" rx="4" fill="url(#wave)"/>
    <rect x="-40" y="-80" width="8" height="160" rx="4" fill="url(#wave)"/>
    <rect x="-20" y="-50" width="8" height="100" rx="4" fill="url(#wave)"/>
    <rect x="0" y="-70" width="8" height="140" rx="4" fill="url(#wave)"/>
    <rect x="20" y="-90" width="8" height="180" rx="4" fill="url(#wave)"/>
    <rect x="40" y="-60" width="8" height="120" rx="4" fill="url(#wave)"/>
    <rect x="60" y="-80" width="8" height="160" rx="4" fill="url(#wave)"/>
    <rect x="80" y="-100" width="8" height="200" rx="4" fill="url(#wave)"/>
    <rect x="100" y="-70" width="8" height="140" rx="4" fill="url(#wave)"/>
    <rect x="120" y="-50" width="8" height="100" rx="4" fill="url(#wave)"/>
    <rect x="140" y="-80" width="8" height="160" rx="4" fill="url(#wave)"/>
    <rect x="160" y="-60" width="8" height="120" rx="4" fill="url(#wave)"/>
    <rect x="180" y="-40" width="8" height="80" rx="4" fill="url(#wave)"/>
  </g>
  <!-- Fish icon -->
  <g transform="translate(140,337) scale(1.2)">
    <path d="M60 0C60 0 85 20 100 40C115 60 100 80 100 80C100 80 115 100 100 120C85 140 60 160 60 160C60 160 45 140 30 120C15 100 0 80 0 80C0 80 15 60 30 40C45 20 60 0 60 0Z" fill="url(#fish)" opacity="0.6"/>
    <circle cx="75" cy="70" r="8" fill="white" opacity="0.8"/>
  </g>
  <!-- Text -->
  <text x="600" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white" letter-spacing="-1">Fish Audio</text>
  <text x="600" y="300" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="#94a3b8" font-weight="400">AI Voice Cloning &amp; TTS</text>
  <!-- Subtle dots -->
  <circle cx="100" cy="100" r="2" fill="#38bdf8" opacity="0.4"/>
  <circle cx="1100" cy="150" r="2" fill="#818cf8" opacity="0.4"/>
  <circle cx="200" cy="550" r="2" fill="#c084fc" opacity="0.4"/>
  <circle cx="1000" cy="500" r="2" fill="#38bdf8" opacity="0.4"/>
  <circle cx="500" cy="580" r="1.5" fill="#818cf8" opacity="0.3"/>
  <circle cx="800" cy="120" r="1.5" fill="#c084fc" opacity="0.3"/>
