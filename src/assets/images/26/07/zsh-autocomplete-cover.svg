<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E2E8F0;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="70%" r="40%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5" />
      <stop offset="100%" style="stop-color:#06B6D4" />
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.25"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#glow1)"/>
  <rect width="1200" height="675" fill="url(#glow2)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <!-- Terminal icon -->
  <g transform="translate(600, 200)">
    <rect x="-80" y="-50" width="160" height="100" rx="12" fill="#1E293B" opacity="0.9"/>
    <rect x="-70" y="-40" width="140" height="80" rx="6" fill="#0F172A"/>
    <text x="-50" y="-10" font-family="monospace" font-size="16" fill="#22D3EE">$ zsh</text>
    <text x="-50" y="15" font-family="monospace" font-size="14" fill="#A5F3FC">~ ❯ _</text>
  </g>
  <!-- Category badge -->
  <rect x="480" y="310" width="240" height="36" rx="18" fill="#4F46E5" opacity="0.15"/>
  <text x="600" y="334" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#4F46E5" letter-spacing="2">TERMINAL</text>
  <!-- Title -->
  <text x="600" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#0F172A">ZSH <tspan fill="url(#textGrad)">Autocomplete</tspan></text>
  <!-- Decorative dots -->
  <circle cx="100" cy="100" r="4" fill="#6366F1" opacity="0.15"/>
  <circle cx="1100" cy="575" r="5" fill="#06B6D4" opacity="0.12"/>
  <circle cx="150" cy="550" r="3" fill="#EC4899" opacity="0.18"/>
</svg>
