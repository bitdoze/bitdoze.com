<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" width="960" height="580">
  <defs>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="memGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#64748B" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="580" rx="16" fill="#F8FAFC"/>
  <rect width="960" height="580" rx="16" fill="none" stroke="#E2E8F0" stroke-width="2"/>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" fill="url(#titleGrad)" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700">Mastra Framework Architecture</text>

  <!-- Agent box (center top) -->
  <g filter="url(#shadow)">
    <rect x="355" y="60" rx="12" ry="12" width="250" height="70" fill="url(#agentGrad)"/>
    <text x="480" y="92" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700">Agent</text>
    <text x="480" y="112" text-anchor="middle" fill="#C7D2FE" font-family="system-ui, -apple-system, sans-serif" font-size="12">generate() · stream()</text>
  </g>

  <!-- Arrows from Agent down to four pillars -->
  <line x1="380" y1="130" x2="155" y2="175" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="440" y1="130" x2="375" y2="175" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="520" y1="130" x2="585" y2="175" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="130" x2="805" y2="175" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Four pillar boxes row 1 -->
  <!-- Tools -->
  <g filter="url(#shadow)">
    <rect x="60" y="175" rx="10" ry="10" width="190" height="55" fill="#FFFFFF" stroke="#6366F1" stroke-width="2"/>
    <text x="155" y="200" text-anchor="middle" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600">🔧 Tools</text>
    <text x="155" y="218" text-anchor="middle" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11">Typed functions, MCP</text>
  </g>

  <!-- Workflows -->
  <g filter="url(#shadow)">
    <rect x="280" y="175" rx="10" ry="10" width="190" height="55" fill="#FFFFFF" stroke="#6366F1" stroke-width="2"/>
    <text x="375" y="200" text-anchor="middle" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600">⚡ Workflows</text>
    <text x="375" y="218" text-anchor="middle" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11">Graph · branch · parallel</text>
  </g>

  <!-- Evals -->
  <g filter="url(#shadow)">
    <rect x="490" y="175" rx="10" ry="10" width="190" height="55" fill="#FFFFFF" stroke="#6366F1" stroke-width="2"/>
    <text x="585" y="200" text-anchor="middle" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600">📊 Evals</text>
    <text x="585" y="218" text-anchor="middle" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11">Model-graded · rule-based</text>
  </g>

  <!-- Observability -->
  <g filter="url(#shadow)">
    <rect x="710" y="175" rx="10" ry="10" width="190" height="55" fill="#FFFFFF" stroke="#6366F1" stroke-width="2"/>
    <text x="805" y="200" text-anchor="middle" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600">🔍 Observability</text>
    <text x="805" y="218" text-anchor="middle" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11">Studio · traces · logs</text>
  </g>

  <!-- Arrow from Tools/Workflows down to Memory -->
  <line x1="480" y1="230" x2="480" y2="275" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Memory section -->
  <g filter="url(#shadow)">
    <rect x="180" y="275" rx="12" ry="12" width="600" height="110" fill="#FFFFFF" stroke="#EC4899" stroke-width="2"/>
    <text x="480" y="302" text-anchor="middle" fill="url(#memGrad)" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700">🧠 Memory — 4 Tiers</text>
    <!-- Tier boxes -->
    <g transform="translate(210, 318)">
      <rect x="0" y="0" rx="6" ry="6" width="120" height="50" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="1"/>
      <text x="60" y="22" text-anchor="middle" fill="#9D174D" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Message</text>
      <text x="60" y="38" text-anchor="middle" fill="#9D174D" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">History</text>
    </g>
    <g transform="translate(345, 318)">
      <rect x="0" y="0" rx="6" ry="6" width="120" height="50" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="1"/>
      <text x="60" y="22" text-anchor="middle" fill="#9D174D" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Working</text>
      <text x="60" y="38" text-anchor="middle" fill="#9D174D" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Memory</text>
    </g>
    <g transform="translate(480, 318)">
      <rect x="0" y="0" rx="6" ry="6" width="120" height="50" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="1"/>
      <text x="60" y="22" text-anchor="middle" fill="#9D174D" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Semantic</text>
      <text x="60" y="38" text-anchor="middle" fill="#9D174D" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Recall</text>
    </g>
    <g transform="translate(615, 318)">
      <rect x="0" y="0" rx="6" ry="6" width="120" height="50" fill="#FDF2F8" stroke="#F9A8D4" stroke-width="1"/>
      <text x="60" y="22" text-anchor="middle" fill="#9D174D" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">RAG</text>
      <text x="60" y="38" text-anchor="middle" fill="#9D174D" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">Gateway</text>
    </g>
  </g>

  <!-- Arrow from Memory down to Model Router -->
  <line x1="480" y1="385" x2="480" y2="415" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Model Router -->
  <g filter="url(#shadow)">
    <rect x="300" y="415" rx="10" ry="10" width="360" height="50" fill="#FFFFFF" stroke="#06B6D4" stroke-width="2"/>
    <text x="480" y="445" text-anchor="middle" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600">🔄 Model Router — 40–124 Providers · 600–4,000+ Models</text>
  </g>

  <!-- Arrow from Router down to Deployment -->
  <line x1="480" y1="465" x2="480" y2="490" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Deployment targets -->
  <g transform="translate(60, 490)">
    <rect x="0" y="0" rx="8" ry="8" width="140" height="45" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
    <text x="70" y="28" text-anchor="middle" fill="#166534" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Vercel</text>
  </g>
  <g transform="translate(220, 490)">
    <rect x="0" y="0" rx="8" ry="8" width="140" height="45" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
    <text x="70" y="28" text-anchor="middle" fill="#166534" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Netlify</text>
  </g>
  <g transform="translate(380, 490)">
    <rect x="0" y="0" rx="8" ry="8" width="140" height="45" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
    <text x="70" y="28" text-anchor="middle" fill="#166534" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Cloudflare</text>
  </g>
  <g transform="translate(540, 490)">
    <rect x="0" y="0" rx="8" ry="8" width="140" height="45" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
    <text x="70" y="28" text-anchor="middle" fill="#166534" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Self-Hosted</text>
  </g>
  <g transform="translate(700, 490)">
    <rect x="0" y="0" rx="8" ry="8" width="200" height="45" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
    <text x="100" y="28" text-anchor="middle" fill="#166534" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Hono / Express / Next.js</text>
  </g>

  <!-- Label under deployment -->
  <text x="480" y="558" text-anchor="middle" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="12">Zero platform lock-in · Apache 2.0 · Deploy anywhere Node.js runs</text>
</svg>