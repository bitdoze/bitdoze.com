<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <radialGradient id="blob1" cx="0.25" cy="0.3" r="0.45">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="0.75" cy="0.6" r="0.4">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob3" cx="0.5" cy="0.85" r="0.35">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.25"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg-grad)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>

  <!-- Ambient blobs -->
  <ellipse cx="300" cy="200" rx="450" ry="300" fill="url(#blob1)"/>
  <ellipse cx="900" cy="400" rx="400" ry="280" fill="url(#blob2)"/>
  <ellipse cx="600" cy="580" rx="350" ry="240" fill="url(#blob3)"/>

  <!-- VS central icon -->
  <g transform="translate(600, 180)">
    <!-- Two overlapping rounded rects representing frameworks -->
    <!-- Left: Mastra -->
    <rect x="-120" y="-50" rx="14" ry="14" width="100" height="100" fill="#4F46E5" opacity="0.9"/>
    <text x="-70" y="8" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700">M</text>
    <!-- Right: Eve -->
    <rect x="20" y="-50" rx="14" ry="14" width="100" height="100" fill="#06B6D4" opacity="0.9"/>
    <text x="70" y="8" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700">E</text>
    <!-- VS circle -->
    <circle cx="0" cy="0" r="24" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
    <text x="0" y="6" text-anchor="middle" fill="#4F46E5" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="800">VS</text>
    <!-- Connecting arrows -->
    <line x1="-15" y1="0" x2="-25" y2="0" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
    <line x1="15" y1="0" x2="25" y2="0" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Category badge -->
  <g transform="translate(600, 290)">
    <rect x="-90" y="-16" rx="16" ry="16" width="180" height="32" fill="#4F46E5" opacity="0.1"/>
    <rect x="-90" y="-16" rx="16" ry="16" width="180" height="32" fill="none" stroke="#4F46E5" stroke-width="1.5" opacity="0.4"/>
    <text x="0" y="5" text-anchor="middle" fill="#4F46E5" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" letter-spacing="2">FRAMEWORK COMPARISON</text>
  </g>

  <!-- Main title -->
  <text x="600" y="370" text-anchor="middle" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800">
    Mastra <tspan fill="#94A3B8" font-weight="400">vs</tspan> <tspan fill="url(#title-grad)">Eve</tspan>
  </text>

  <!-- Subtitle -->
  <text x="600" y="420" text-anchor="middle" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="500">
    Best TypeScript AI Agent Framework
  </text>

  <!-- Bottom decorative line -->
  <rect x="450" y="450" rx="2" ry="2" width="300" height="4" fill="url(#title-grad)" opacity="0.3"/>

  <!-- Decorative dots -->
  <circle cx="80" cy="60" r="4" fill="#6366F1" opacity="0.15"/>
  <circle cx="120" cy="100" r="3" fill="#06B6D4" opacity="0.12"/>
  <circle cx="50" cy="140" r="5" fill="#EC4899" opacity="0.14"/>
  <circle cx="1120" cy="80" r="4" fill="#06B6D4" opacity="0.15"/>
  <circle cx="1150" cy="140" r="3" fill="#6366F1" opacity="0.12"/>
  <circle cx="1080" cy="120" r="5" fill="#EC4899" opacity="0.14"/>
  <circle cx="100" cy="580" r="4" fill="#06B6D4" opacity="0.15"/>
  <circle cx="60" cy="620" r="3" fill="#6366F1" opacity="0.12"/>
  <circle cx="1100" cy="560" r="4" fill="#EC4899" opacity="0.15"/>
  <circle cx="1140" cy="600" r="3" fill="#6366F1" opacity="0.12"/>
  <circle cx="1160" cy="540" r="5" fill="#06B6D4" opacity="0.14"/>

  <!-- Bottom brand mark -->
  <text x="600" y="640" text-anchor="middle" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500">bitdoze.com</text>
</svg>