<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" width="1100" height="520">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="sesGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FEF3C7"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <linearGradient id="apiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECFDF5"/>
      <stop offset="100%" stop-color="#D1FAE5"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#CBD5E1" stroke-width="0.5" opacity="0.2"/>
    </pattern>
    <!-- Arrow marker -->
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4F46E5"/>
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#06B6D4"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D97706"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="520" fill="url(#bgGrad)" rx="12"/>
  <rect width="1100" height="520" fill="url(#grid)" rx="12"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#0F172A">Executor.sh Architecture</text>
  <line x1="380" y1="48" x2="720" y2="48" stroke="url(#headerGrad)" stroke-width="2" stroke-linecap="round"/>

  <!-- ==================== LAYER 1: MCP Clients ==================== -->
  <text x="110" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#64748B" text-anchor="middle">MCP CLIENTS</text>

  <!-- Claude Code -->
  <rect x="30" y="95" width="160" height="56" rx="10" fill="#4F46E5" opacity="0.9"/>
  <text x="110" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="white">Claude Code</text>
  <text x="110" y="138" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white" opacity="0.8">MCP Client</text>

  <!-- Cursor -->
  <rect x="210" y="95" width="160" height="56" rx="10" fill="#4F46E5" opacity="0.9"/>
  <text x="290" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="white">Cursor</text>
  <text x="290" y="138" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white" opacity="0.8">MCP Client</text>

  <!-- Codex -->
  <rect x="390" y="95" width="160" height="56" rx="10" fill="#4F46E5" opacity="0.9"/>
  <text x="470" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="white">Codex</text>
  <text x="470" y="138" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white" opacity="0.8">MCP Client</text>

  <!-- ==================== Arrows: Clients → MCP Endpoint ==================== -->
  <line x1="110" y1="155" x2="110" y2="195" stroke="#4F46E5" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="290" y1="155" x2="290" y2="195" stroke="#4F46E5" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="470" y1="155" x2="470" y2="195" stroke="#4F46E5" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Dots for "any MCP client" -->
  <text x="570" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#94A3B8">· · ·</text>

  <!-- ==================== LAYER 2: MCP Endpoint ==================== -->
  <rect x="180" y="200" width="240" height="50" rx="10" fill="#06B6D4" opacity="0.9"/>
  <text x="300" y="222" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="white">MCP Endpoint</text>
  <text x="300" y="239" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="white" opacity="0.85">Single unified entry point</text>

  <!-- ==================== Arrow: MCP Endpoint → Executor Gateway ==================== -->
  <line x1="300" y1="255" x2="300" y2="285" stroke="#06B6D4" stroke-width="2" marker-end="url(#arrowCyan)"/>

  <!-- ==================== LAYER 3: Executor Gateway ==================== -->
  <rect x="100" y="290" width="400" height="100" rx="14" fill="white" stroke="#4F46E5" stroke-width="2"/>
  <text x="300" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0F172A">Executor Gateway</text>

  <!-- Sub-components inside gateway -->
  <rect x="120" y="328" width="110" height="48" rx="8" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1"/>
  <text x="175" y="348" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#4338CA">Tool Router</text>
  <text x="175" y="364" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6366F1">Discovery</text>

  <rect x="245" y="328" width="110" height="48" rx="8" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1"/>
  <text x="300" y="348" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#4338CA">Policy Engine</text>
  <text x="300" y="364" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6366F1">Allow / Gate / Block</text>

  <rect x="370" y="328" width="110" height="48" rx="8" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1"/>
  <text x="425" y="348" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#4338CA">Pause / Resume</text>
  <text x="425" y="364" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6366F1">OAuth &amp; Approval</text>

  <!-- ==================== Credential Injection (side) ==================== -->
  <rect x="550" y="295" width="160" height="46" rx="10" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="630" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#059669">Credentials</text>
  <text x="630" y="330" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#047857">Host-side injection</text>
  <!-- Arrow from credentials into gateway -->
  <line x1="550" y1="318" x2="502" y2="335" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>

  <!-- ==================== Arrow: Gateway → SES Sandbox ==================== -->
  <line x1="300" y1="395" x2="300" y2="420" stroke="#D97706" stroke-width="2" marker-end="url(#arrowAmber)"/>
  <text x="320" y="414" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#92400E" font-weight="600">execute</text>

  <!-- ==================== LAYER 4: SES Sandbox ==================== -->
  <rect x="120" y="425" width="360" height="55" rx="12" fill="url(#sesGrad)" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="300" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#92400E">SES Sandbox</text>
  <text x="300" y="468" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#B45309">Isolated QuickJS runtime — no credential access</text>

  <!-- Lock icon in sandbox -->
  <circle cx="155" cy="452" r="10" fill="none" stroke="#92400E" stroke-width="1.5"/>
  <rect x="150" y="455" width="10" height="8" rx="2" fill="#92400E" opacity="0.7"/>

  <!-- ==================== Arrows: Sandbox → External APIs ==================== -->
  <!-- To MCP servers -->
  <line x1="620" y1="440" x2="700" y2="440" stroke="#06B6D4" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <!-- To OpenAPI -->
  <line x1="620" y1="452" x2="700" y2="360" stroke="#06B6D4" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <!-- To GraphQL -->
  <line x1="620" y1="465" x2="700" y2="280" stroke="#06B6D4" stroke-width="2" marker-end="url(#arrowCyan)"/>

  <!-- ==================== LAYER 5: External APIs ==================== -->
  <text x="850" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#64748B" text-anchor="middle">EXTERNAL APIS</text>

  <!-- MCP Servers -->
  <rect x="710" y="100" width="160" height="50" rx="10" fill="url(#apiGrad)" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="790" y="122" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#059669">MCP Servers</text>
  <text x="790" y="140" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#047857">Slack, GitHub, Notion...</text>

  <!-- Arrow from MCP Endpoint up to MCP Servers (bidirectional) -->
  <line x1="420" y1="200" x2="710" y2="130" stroke="#06B6D4" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowCyan)"/>

  <!-- OpenAPI -->
  <rect x="710" y="175" width="160" height="50" rx="10" fill="url(#apiGrad)" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="790" y="197" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#059669">OpenAPI</text>
  <text x="790" y="215" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#047857">REST API specs</text>

  <!-- GraphQL -->
  <rect x="710" y="250" width="160" height="50" rx="10" fill="url(#apiGrad)" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="790" y="272" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#059669">GraphQL</text>
  <text x="790" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#047857">GraphQL endpoints</text>

  <!-- Google Discovery -->
  <rect x="710" y="325" width="160" height="50" rx="10" fill="url(#apiGrad)" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="790" y="347" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#059669">Google Discovery</text>
  <text x="790" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#047857">Auto-indexed APIs</text>

  <!-- Custom JS -->
  <rect x="710" y="400" width="160" height="50" rx="10" fill="url(#apiGrad)" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="790" y="422" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#059669">Custom JS Tools</text>
  <text x="790" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#047857">User-defined logic</text>

  <!-- Arrow label for context efficiency -->
  <rect x="880" y="140" width="180" height="55" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1" opacity="0.9"/>
  <text x="970" y="162" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#92400E">Context Efficiency</text>
  <text x="970" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#B45309">1 tool shown (~1K tokens)</text>
  <text x="970" y="194" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#B45309">vs thousands (~279K tokens)</text>
</svg>