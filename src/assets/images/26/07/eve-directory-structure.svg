<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" width="960" height="600">
  <defs>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#64748B" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="folderGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="600" rx="16" fill="#F8FAFC"/>
  <rect width="960" height="600" rx="16" fill="none" stroke="#E2E8F0" stroke-width="2"/>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" fill="url(#titleGrad)" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700">Vercel Eve — Filesystem-First Agent Structure</text>

  <!-- Root folder -->
  <g transform="translate(80, 65)">
    <rect x="0" y="0" rx="10" ry="10" width="800" height="510" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
    <!-- my-agent/ -->
    <g transform="translate(20, 15)">
      <text x="0" y="16" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">📁 my-agent/</text>
    </g>
    <!-- agent/ folder -->
    <g transform="translate(40, 45)">
      <rect x="0" y="0" rx="8" ry="8" width="720" height="440" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="20" y="25" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700">📁 agent/</text>

      <!-- agent.ts -->
      <g transform="translate(40, 45)">
        <rect x="0" y="0" rx="8" ry="8" width="200" height="55" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
        <text x="16" y="24" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">📄 agent.ts</text>
        <text x="16" y="42" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11">Model &amp; runtime config</text>
      </g>

      <!-- instructions.md -->
      <g transform="translate(280, 45)">
        <rect x="0" y="0" rx="8" ry="8" width="200" height="55" fill="#F0FDF4" stroke="#22C55E" stroke-width="1.5"/>
        <text x="16" y="24" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">📄 instructions.md</text>
        <text x="16" y="42" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11">System prompt (always-on)</text>
      </g>

      <!-- tools/ -->
      <g transform="translate(520, 45)">
        <rect x="0" y="0" rx="8" ry="8" width="160" height="55" fill="url(#folderGrad)" opacity="0.9"/>
        <text x="16" y="24" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">📁 tools/</text>
        <text x="16" y="42" fill="#C7D2FE" font-family="system-ui, -apple-system, sans-serif" font-size="11">Typed functions</text>
      </g>

      <!-- tools content -->
      <g transform="translate(60, 115)">
        <rect x="0" y="0" rx="6" ry="6" width="160" height="36" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
        <text x="14" y="23" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="12">└ get_weather.ts</text>
      </g>

      <!-- skills/ -->
      <g transform="translate(40, 175)">
        <rect x="0" y="0" rx="8" ry="8" width="160" height="55" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
        <text x="16" y="24" fill="#92400E" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">📁 skills/</text>
        <text x="16" y="42" fill="#A16207" font-family="system-ui, -apple-system, sans-serif" font-size="11">On-demand playbooks</text>
      </g>
      <g transform="translate(60, 245)">
        <rect x="0" y="0" rx="6" ry="6" width="160" height="36" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1"/>
        <text x="14" y="23" fill="#92400E" font-family="system-ui, -apple-system, sans-serif" font-size="12">└ plan_a_trip.md</text>
      </g>

      <!-- channels/ -->
      <g transform="translate(240, 175)">
        <rect x="0" y="0" rx="8" ry="8" width="160" height="55" fill="#F3E8FF" stroke="#A855F7" stroke-width="1.5"/>
        <text x="16" y="24" fill="#6B21A8" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">📁 channels/</text>
        <text x="16" y="42" fill="#7E22CE" font-family="system-ui, -apple-system, sans-serif" font-size="11">Slack · Discord · Teams</text>
      </g>
      <g transform="translate(260, 245)">
        <rect x="0" y="0" rx="6" ry="6" width="160" height="36" fill="#FAF5FF" stroke="#D8B4FE" stroke-width="1"/>
        <text x="14" y="23" fill="#6B21A8" font-family="system-ui, -apple-system, sans-serif" font-size="12">└ slack.ts</text>
      </g>

      <!-- schedules/ -->
      <g transform="translate(440, 175)">
        <rect x="0" y="0" rx="8" ry="8" width="160" height="55" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5"/>
        <text x="16" y="24" fill="#991B1B" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">📁 schedules/</text>
        <text x="16" y="42" fill="#B91C1C" font-family="system-ui, -apple-system, sans-serif" font-size="11">Cron jobs</text>
      </g>
      <g transform="translate(460, 245)">
        <rect x="0" y="0" rx="6" ry="6" width="160" height="36" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1"/>
        <text x="14" y="23" fill="#991B1B" font-family="system-ui, -apple-system, sans-serif" font-size="12">└ weekly_recap.ts</text>
      </g>

      <!-- subagents/ -->
      <g transform="translate(640, 175)">
        <rect x="0" y="0" rx="8" ry="8" width="60" height="55" fill="url(#folderGrad)" opacity="0.9"/>
      </g>
      <g transform="translate(640, 175)">
        <text x="14" y="24" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">📁</text>
        <text x="14" y="42" fill="#C7D2FE" font-family="system-ui, -apple-system, sans-serif" font-size="10">sub-</text>
        <text x="14" y="52" fill="#C7D2FE" font-family="system-ui, -apple-system, sans-serif" font-size="10">agents/</text>
      </g>

      <!-- Flow arrows showing how it all connects -->
      <!-- Arrow from agent.ts to Agent Runtime -->
      <g transform="translate(40, 310)">
        <rect x="0" y="0" rx="10" ry="10" width="660" height="100" fill="#F0F9FF" stroke="#06B6D4" stroke-width="1.5"/>
        <text x="330" y="28" text-anchor="middle" fill="#0E7490" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">How It Connects</text>
        <!-- Flow diagram inside -->
        <rect x="20" y="42" rx="6" ry="6" width="110" height="40" fill="#FFFFFF" stroke="#3B82F6" stroke-width="1"/>
        <text x="75" y="66" text-anchor="middle" fill="#1E40AF" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">instructions.md</text>
        <line x1="130" y1="62" x2="170" y2="62" stroke="#94A3B8" stroke-width="1.5"/>
        <polygon points="170,58 178,62 170,66" fill="#94A3B8"/>
        <rect x="180" y="42" rx="6" ry="6" width="100" height="40" fill="#4F46E5" stroke="none"/>
        <text x="230" y="60" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">Agent</text>
        <text x="230" y="74" text-anchor="middle" fill="#C7D2FE" font-family="system-ui, -apple-system, sans-serif" font-size="9">Runtime</text>
        <line x1="280" y1="62" x2="320" y2="62" stroke="#94A3B8" stroke-width="1.5"/>
        <polygon points="320,58 328,62 320,66" fill="#94A3B8"/>
        <rect x="330" y="42" rx="6" ry="6" width="80" height="40" fill="#FFFFFF" stroke="#22C55E" stroke-width="1"/>
        <text x="370" y="66" text-anchor="middle" fill="#166534" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">tools/</text>
        <line x1="410" y1="62" x2="440" y2="62" stroke="#94A3B8" stroke-width="1.5"/>
        <polygon points="440,58 448,62 440,66" fill="#94A3B8"/>
        <rect x="450" y="42" rx="6" ry="6" width="80" height="40" fill="#FFFFFF" stroke="#A855F7" stroke-width="1"/>
        <text x="490" y="66" text-anchor="middle" fill="#6B21A8" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">channels/</text>
        <line x1="530" y1="62" x2="560" y2="62" stroke="#94A3B8" stroke-width="1.5"/>
        <polygon points="560,58 568,62 560,66" fill="#94A3B8"/>
        <rect x="570" y="42" rx="6" ry="6" width="70" height="40" fill="#FFFFFF" stroke="#EF4444" stroke-width="1"/>
        <text x="605" y="66" text-anchor="middle" fill="#991B1B" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">cron</text>
      </g>
    </g>
  </g>

  <!-- Bottom note -->
  <text x="480" y="588" text-anchor="middle" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="12">No registration needed — filename becomes tool name. Drop a file → model can call it.</text>
</svg>