<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" width="1000" height="560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="chattoBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="0.8" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1000" height="560" fill="url(#bg)"/>
  <rect width="1000" height="560" fill="url(#grid)"/>

  <!-- Title -->
  <text x="500" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#0F172A">Chatto vs Incumbents — Key Differentiators</text>

  <!-- Table header -->
  <g transform="translate(60, 65)">
    <!-- Header row background -->
    <rect x="0" y="0" width="880" height="48" rx="8" fill="#0F172A"/>
    <text x="130" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#fff">Feature</text>
    <text x="330" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#fff">Chatto</text>
    <text x="510" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#fff">Mattermost</text>
    <text x="690" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#fff">Slack</text>
    <text x="850" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#fff">Matrix</text>
  </g>

  <!-- Table rows -->
  <!-- Row 1: Price -->
  <g transform="translate(60, 118)">
    <rect x="0" y="0" width="880" height="44" rx="0" fill="#fff"/>
    <rect x="180" y="0" width="180" height="44" fill="url(#chattoBg)"/>
    <text x="130" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#334155">Price</text>
    <text x="330" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#059669">$0 forever</text>
    <text x="510" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748B">$10/user/mo</text>
    <text x="690" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748B">$7–15/user/mo</text>
    <text x="850" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#059669">Free</text>
  </g>

  <!-- Row 2: Self-Hosted -->
  <g transform="translate(60, 162)">
    <rect x="0" y="0" width="880" height="44" rx="0" fill="#F8FAFC"/>
    <rect x="180" y="0" width="180" height="44" fill="url(#chattoBg)"/>
    <text x="130" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#334155">Self-Hosted</text>
    <text x="330" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#059669">✓</text>
    <text x="510" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#059669">✓</text>
    <text x="690" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#EF4444">✗</text>
    <text x="850" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#059669">✓</text>
  </g>

  <!-- Row 3: Database -->
  <g transform="translate(60, 206)">
    <rect x="0" y="0" width="880" height="44" rx="0" fill="#fff"/>
    <rect x="180" y="0" width="180" height="44" fill="url(#chattoBg)"/>
    <text x="130" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#334155">Database</text>
    <text x="330" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#059669">None (NATS)</text>
    <text x="510" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748B">PostgreSQL</text>
    <text x="690" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8">N/A (SaaS)</text>
    <text x="850" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748B">PostgreSQL</text>
  </g>

  <!-- Row 4: Voice/Video E2EE -->
  <g transform="translate(60, 250)">
    <rect x="0" y="0" width="880" height="44" rx="0" fill="#F8FAFC"/>
    <rect x="180" y="0" width="180" height="44" fill="url(#chattoBg)"/>
    <text x="130" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#334155">Voice/Video</text>
    <text x="330" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#059669">Yes (E2EE)</text>
    <text x="510" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#F59E0B">Pro only</text>
    <text x="690" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#F59E0B">Not E2EE</text>
    <text x="850" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#059669">Yes</text>
  </g>

  <!-- Row 5: SSO -->
  <g transform="translate(60, 294)">
    <rect x="0" y="0" width="880" height="44" rx="0" fill="#fff"/>
    <rect x="180" y="0" width="180" height="44" fill="url(#chattoBg)"/>
    <text x="130" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#334155">SSO</text>
    <text x="330" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#059669">OIDC, Google, GitHub</text>
    <text x="510" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#F59E0B">Pro only</text>
    <text x="690" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#F59E0B">Pro only</text>
    <text x="850" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#059669">Yes</text>
  </g>

  <!-- Row 6: Deployment -->
  <g transform="translate(60, 338)">
    <rect x="0" y="0" width="880" height="44" rx="0" fill="#F8FAFC"/>
    <rect x="180" y="0" width="180" height="44" fill="url(#chattoBg)"/>
    <text x="130" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#334155">Deployment</text>
    <text x="330" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#059669">Single binary</text>
    <text x="510" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748B">Docker + PG</text>
    <text x="690" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8">SaaS only</text>
    <text x="850" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748B">Synapse + PG</text>
  </g>

  <!-- Row 7: RAM idle -->
  <g transform="translate(60, 382)">
    <rect x="0" y="0" width="880" height="44" rx="0" fill="#fff"/>
    <rect x="180" y="0" width="180" height="44" fill="url(#chattoBg)"/>
    <text x="130" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#334155">RAM (idle)</text>
    <text x="330" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#059669">Tens of MB</text>
    <text x="510" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748B">1–2 GB</text>
    <text x="690" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8">N/A</text>
    <text x="850" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748B">512 MB–2 GB</text>
  </g>

  <!-- Row 8: Chat Control -->
  <g transform="translate(60, 426)">
    <rect x="0" y="0" width="880" height="44" rx="0" fill="#F8FAFC"/>
    <rect x="180" y="0" width="180" height="44" fill="url(#chattoBg)"/>
    <text x="130" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#334155">Chat Control</text>
    <text x="330" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#059669">Not affected</text>
    <text x="510" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#F59E0B">Self-host OK</text>
    <text x="690" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#EF4444">Affected</text>
    <text x="850" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#059669">Not affected</text>
  </g>

  <!-- Bottom note -->
  <rect x="60" y="486" width="880" height="48" rx="10" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1"/>
  <text x="500" y="506" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#4338CA">Chatto is the only option that is free, self-hosted, lightweight, and unaffected by Chat Control</text>
  <text x="500" y="524" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#6366F1">Slack and Discord are directly affected — US servers, unencrypted messages, subject to scanning</text>
</svg>