<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>

    <!-- Ambient blobs -->
    <radialGradient id="blobIndigo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobPink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.25"/>
    </pattern>

    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <!-- Badge gradient -->
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>

    <!-- Icon gradient -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <!-- Screen glow -->
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGrad)"/>

  <!-- Grid overlay -->
  <rect width="1200" height="675" fill="url(#grid)"/>

  <!-- Ambient blobs -->
  <ellipse cx="200" cy="150" rx="350" ry="280" fill="url(#blobIndigo)"/>
  <ellipse cx="1000" cy="500" rx="320" ry="250" fill="url(#blobCyan)"/>
  <ellipse cx="600" cy="600" rx="280" ry="200" fill="url(#blobPink)"/>

  <!-- Central icon: Laptop + Phone illustration -->
  <g transform="translate(600, 200)">
    <!-- Laptop body -->
    <rect x="-120" y="-80" width="240" height="150" rx="10" fill="white" stroke="#4F46E5" stroke-width="2.5" opacity="0.95"/>
    <!-- Laptop screen area -->
    <rect x="-105" y="-68" width="210" height="115" rx="4" fill="#F0F4FF"/>
    <!-- Dashboard bars on laptop screen -->
    <rect x="-85" y="-50" width="30" height="60" rx="3" fill="#4F46E5" opacity="0.7"/>
    <rect x="-45" y="-35" width="30" height="75" rx="3" fill="#06B6D4" opacity="0.7"/>
    <rect x="-5" y="-55" width="30" height="55" rx="3" fill="#7C3AED" opacity="0.6"/>
    <rect x="35" y="-42" width="30" height="68" rx="3" fill="#06B6D4" opacity="0.5"/>
    <!-- Mini line chart on right side -->
    <polyline points="80,-40 90,-55 100,-45" fill="none" stroke="#EC4899" stroke-width="2" stroke-linecap="round"/>
    <!-- Laptop base/keyboard -->
    <path d="M -140,75 L -130,70 L 130,70 L 140,75 Z" fill="#CBD5E1" stroke="#94A3B8" stroke-width="1.5"/>

    <!-- Phone (overlapping right side) -->
    <g transform="translate(155, 10)">
      <rect x="-30" y="-75" width="60" height="130" rx="10" fill="white" stroke="#06B6D4" stroke-width="2.5" opacity="0.95"/>
      <!-- Phone screen -->
      <rect x="-23" y="-63" width="46" height="106" rx="4" fill="#F0FDFA"/>
      <!-- Chat bubbles on phone -->
      <rect x="-17" y="-55" width="30" height="12" rx="6" fill="#4F46E5" opacity="0.6"/>
      <rect x="-17" y="-37" width="22" height="12" rx="6" fill="#06B6D4" opacity="0.5"/>
      <rect x="-5" y="-19" width="26" height="12" rx="6" fill="#4F46E5" opacity="0.6"/>
      <rect x="-17" y="-1" width="28" height="12" rx="6" fill="#06B6D4" opacity="0.5"/>
      <!-- Phone top bar -->
      <rect x="-10" y="-70" width="20" height="4" rx="2" fill="#CBD5E1"/>
    </g>

    <!-- Hermes logo connector between laptop and phone -->
    <circle cx="100" cy="-5" r="22" fill="white" stroke="url(#iconGrad)" stroke-width="2.5"/>
    <text x="100" y="4" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="url(#iconGrad)">H</text>

    <!-- Connection lines -->
    <line x1="78" y1="-5" x2="60" y2="-5" stroke="url(#iconGrad)" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>
    <line x1="122" y1="-5" x2="138" y2="-5" stroke="url(#iconGrad)" stroke-width="2" stroke-dasharray="4,3" opacity="0.6"/>
  </g>

  <!-- Category badge -->
  <rect x="435" y="330" width="330" height="38" rx="19" fill="url(#badgeGrad)" opacity="0.9"/>
  <text x="600" y="355" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="white" letter-spacing="2">HERMES AGENT UIs</text>

  <!-- Main title -->
  <text x="600" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#0F172A">
    <tspan fill="url(#titleGrad)">Dashboards</tspan>
    <tspan fill="#0F172A"> &amp; </tspan>
    <tspan fill="url(#titleGrad)">Mobile Apps</tspan>
  </text>

  <!-- Subtitle -->
  <text x="600" y="465" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#64748B" font-weight="400">2026 Complete Guide</text>

  <!-- Decorative dots -->
  <circle cx="80" cy="80" r="4" fill="#6366F1" opacity="0.15"/>
  <circle cx="150" cy="120" r="3" fill="#06B6D4" opacity="0.12"/>
  <circle cx="1050" cy="100" r="5" fill="#EC4899" opacity="0.14"/>
  <circle cx="1120" cy="180" r="3" fill="#6366F1" opacity="0.12"/>
  <circle cx="100" cy="580" r="4" fill="#06B6D4" opacity="0.15"/>
  <circle cx="180" cy="520" r="3" fill="#EC4899" opacity="0.12"/>
  <circle cx="1080" cy="550" r="4" fill="#6366F1" opacity="0.15"/>
  <circle cx="1130" cy="480" r="3" fill="#06B6D4" opacity="0.12"/>
  <circle cx="300" cy="620" r="3" fill="#EC4899" opacity="0.1"/>
  <circle cx="900" cy="600" r="4" fill="#6366F1" opacity="0.12"/>
</svg>
