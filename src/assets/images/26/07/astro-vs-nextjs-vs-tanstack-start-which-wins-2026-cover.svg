<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <radialGradient id="blob1" cx="0.2" cy="0.3" r="0.45">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="0.8" cy="0.2" r="0.4">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob3" cx="0.6" cy="0.75" r="0.35">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.25"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>

  <!-- Ambient blobs -->
  <ellipse cx="240" cy="200" rx="400" ry="280" fill="url(#blob1)"/>
  <ellipse cx="960" cy="135" rx="350" ry="250" fill="url(#blob2)"/>
  <ellipse cx="720" cy="506" rx="320" ry="240" fill="url(#blob3)"/>

  <!-- Central icon: three framework nodes connected by VS lines -->
  <g transform="translate(600, 185)">
    <!-- Connection lines -->
    <line x1="-120" y1="0" x2="-30" y2="0" stroke="url(#titleGrad)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    <line x1="30" y1="0" x2="120" y2="0" stroke="url(#titleGrad)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
    
    <!-- Astro node (left) — stylized rocket/rocket shape -->
    <g transform="translate(-150, 0)">
      <circle cx="0" cy="0" r="38" fill="#F8FAFC" stroke="#FF5D01" stroke-width="3"/>
      <text x="0" y="6" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="18" fill="#FF5D01">Astro</text>
    </g>

    <!-- VS badge (center) -->
    <circle cx="0" cy="0" r="24" fill="url(#titleGrad)"/>
    <text x="0" y="8" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="16" fill="#FFFFFF">VS</text>

    <!-- Next.js node (center-right) -->
    <g transform="translate(0, -70)">
      <circle cx="0" cy="0" r="38" fill="#F8FAFC" stroke="#000000" stroke-width="3"/>
      <text x="0" y="6" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="16" fill="#000000">Next</text>
    </g>

    <!-- TanStack node (right) -->
    <g transform="translate(150, 0)">
      <circle cx="0" cy="0" r="38" fill="#F8FAFC" stroke="#EF4444" stroke-width="3"/>
      <text x="0" y="6" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="13" fill="#EF4444">TanStack</text>
    </g>
  </g>

  <!-- Category badge -->
  <g transform="translate(600, 290)">
    <rect x="-65" y="-16" width="130" height="32" rx="16" fill="url(#accentGrad)" opacity="0.9"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="13" fill="#FFFFFF" letter-spacing="2">META FRAMEWORKS</text>
  </g>

  <!-- Main title -->
  <text x="600" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="64" fill="#0F172A">
    <tspan>Astro </tspan><tspan fill="url(#titleGrad)">vs</tspan><tspan> Next </tspan><tspan fill="url(#titleGrad)">vs</tspan><tspan> TanStack</tspan>
  </text>

  <!-- Subtitle -->
  <text x="600" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="24" fill="#64748B">Which Wins in 2026?</text>

  <!-- Decorative dots -->
  <circle cx="80" cy="80" r="4" fill="#6366F1" opacity="0.15"/>
  <circle cx="140" cy="55" r="3" fill="#06B6D4" opacity="0.12"/>
  <circle cx="1120" cy="90" r="5" fill="#EC4899" opacity="0.14"/>
  <circle cx="1060" cy="60" r="3" fill="#6366F1" opacity="0.12"/>
  <circle cx="100" cy="600" r="4" fill="#06B6D4" opacity="0.15"/>
  <circle cx="1100" cy="590" r="5" fill="#6366F1" opacity="0.13"/>
  <circle cx="1150" cy="550" r="3" fill="#EC4899" opacity="0.12"/>
  <circle cx="60" cy="350" r="3" fill="#EC4899" opacity="0.12"/>
  <circle cx="1140" cy="350" r="4" fill="#06B6D4" opacity="0.14"/>

  <!-- Bottom accent line -->
  <rect x="0" y="665" width="1200" height="10" fill="url(#titleGrad)" opacity="0.6"/>
</svg>