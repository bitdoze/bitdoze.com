<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="chattoBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="mmBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="slackBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="slackBizBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="0.8" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bg)"/>
  <rect width="900" height="500" fill="url(#grid)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#0F172A">Annual Cost for a 50-Person Team</text>
  <text x="450" y="62" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748B">All costs in USD · Chatto on Hetzner CX22 at €3.99/mo</text>

  <!-- Bar chart area -->
  <!-- Scale: max $9000, chart width 650px, starts at x=200 -->
  <!-- Grid lines -->
  <g opacity="0.3">
    <line x1="200" y1="100" x2="850" y2="100" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="200" y1="170" x2="850" y2="170" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="200" y1="240" x2="850" y2="240" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="200" y1="310" x2="850" y2="310" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="200" y1="380" x2="850" y2="380" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,4"/>
  </g>

  <!-- Y axis labels -->
  <text x="190" y="105" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94A3B8">$9,000</text>
  <text x="190" y="175" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94A3B8">$6,750</text>
  <text x="190" y="245" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94A3B8">$4,500</text>
  <text x="190" y="315" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94A3B8">$2,250</text>
  <text x="190" y="385" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94A3B8">$0</text>

  <!-- Baseline -->
  <line x1="200" y1="380" x2="850" y2="380" stroke="#94A3B8" stroke-width="1.5"/>

  <!-- Bar 1: Chatto + Hetzner = ~$52/year (€48) -->
  <!-- Height = (52/9000)*280 = ~1.6px — make it min 8px for visibility -->
  <g transform="translate(0, 0)">
    <rect x="240" y="372" width="90" height="8" rx="4" fill="url(#chattoBar)"/>
    <text x="285" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800" fill="#059669">~€48/yr</text>
    <text x="285" y="408" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#334155">Chatto</text>
    <text x="285" y="426" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">+ Hetzner CX22</text>
  </g>

  <!-- Bar 2: Slack Pro = $4,350/year -->
  <!-- Height = (4350/9000)*280 = ~135px -->
  <g transform="translate(0, 0)">
    <rect x="380" y="245" width="90" height="135" rx="4" fill="url(#slackBar)"/>
    <text x="425" y="238" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800" fill="#DC2626">$4,350/yr</text>
    <text x="425" y="408" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#334155">Slack Pro</text>
    <text x="425" y="426" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">$7.25/user/mo</text>
  </g>

  <!-- Bar 3: Mattermost Pro = $6,000/year -->
  <!-- Height = (6000/9000)*280 = ~187px -->
  <g transform="translate(0, 0)">
    <rect x="520" y="193" width="90" height="187" rx="4" fill="url(#mmBar)"/>
    <text x="565" y="186" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800" fill="#D97706">$6,000/yr</text>
    <text x="565" y="408" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#334155">Mattermost Pro</text>
    <text x="565" y="426" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">$10/user/mo</text>
  </g>

  <!-- Bar 4: Slack Business+ = $9,000/year -->
  <!-- Height = (9000/9000)*280 = ~280px -->
  <g transform="translate(0, 0)">
    <rect x="660" y="100" width="90" height="280" rx="4" fill="url(#slackBizBar)"/>
    <text x="705" y="93" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800" fill="#7C3AED">$9,000/yr</text>
    <text x="705" y="408" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#334155">Slack Biz+</text>
    <text x="705" y="426" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">$15/user/mo</text>
  </g>

  <!-- Savings callout -->
  <rect x="200" y="450" width="650" height="36" rx="10" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1.5"/>
  <text x="525" y="473" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#065F46">Savings vs Mattermost Pro: $5,952/year · Savings vs Slack Pro: $4,298/year</text>
</svg>