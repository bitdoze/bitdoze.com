<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8FAFC"/>
      <stop offset="100%" style="stop-color:#E2E8F0"/>
    </linearGradient>
    <!-- Ambient blobs -->
    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:0.16"/>
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="blob3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:0"/>
    </radialGradient>
    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.25"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGrad)"/>

  <!-- Ambient blobs -->
  <ellipse cx="250" cy="180" rx="350" ry="280" fill="url(#blob1)"/>
  <ellipse cx="950" cy="500" rx="320" ry="260" fill="url(#blob2)"/>
  <ellipse cx="600" cy="620" rx="280" ry="200" fill="url(#blob3)"/>

  <!-- Grid overlay -->
  <rect width="1200" height="675" fill="url(#grid)"/>

  <!-- Central icon: Terminal multiplexer with agent panes -->
  <g transform="translate(600, 200)" opacity="0.95">
    <!-- Main terminal window -->
    <rect x="-120" y="-70" width="240" height="160" rx="12" fill="#0F172A" stroke="#334155" stroke-width="2"/>
    <!-- Title bar -->
    <rect x="-120" y="-70" width="240" height="28" rx="12" fill="#1E293B"/>
    <rect x="-120" y="-54" width="240" height="12" fill="#1E293B"/>
    <!-- Window dots -->
    <circle cx="-100" cy="-56" r="5" fill="#EF4444"/>
    <circle cx="-84" cy="-56" r="5" fill="#EAB308"/>
    <circle cx="-68" cy="-56" r="5" fill="#22C55E"/>

    <!-- Left pane - Agent 1 (Working - green) -->
    <rect x="-112" y="-36" width="108" height="118" rx="4" fill="#0F172A" stroke="#334155" stroke-width="1"/>
    <rect x="-112" y="-36" width="108" height="18" rx="4" fill="#166534"/>
    <rect x="-112" y="-24" width="108" height="6" fill="#166534"/>
    <text x="-58" y="-23" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#86EFAC" font-weight="600">Claude Code</text>
    <!-- Code lines -->
    <rect x="-104" y="-12" width="60" height="4" rx="2" fill="#4F46E5" opacity="0.6"/>
    <rect x="-104" y="-2" width="80" height="4" rx="2" fill="#94A3B8" opacity="0.4"/>
    <rect x="-104" y="8" width="50" height="4" rx="2" fill="#06B6D4" opacity="0.5"/>
    <rect x="-104" y="18" width="70" height="4" rx="2" fill="#94A3B8" opacity="0.3"/>
    <rect x="-104" y="28" width="55" height="4" rx="2" fill="#EC4899" opacity="0.5"/>
    <!-- Working indicator -->
    <circle cx="-100" cy="50" r="4" fill="#22C55E"/>
    <text x="-90" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#22C55E">Working...</text>

    <!-- Right pane - Agent 2 (Blocked - yellow) -->
    <rect x="4" y="-36" width="108" height="118" rx="4" fill="#0F172A" stroke="#334155" stroke-width="1"/>
    <rect x="4" y="-36" width="108" height="18" rx="4" fill="#854D0E"/>
    <rect x="4" y="-24" width="108" height="6" fill="#854D0E"/>
    <text x="58" y="-23" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#FDE68A" font-weight="600">Codex</text>
    <!-- Code lines -->
    <rect x="12" y="-12" width="55" height="4" rx="2" fill="#94A3B8" opacity="0.4"/>
    <rect x="12" y="-2" width="75" height="4" rx="2" fill="#4F46E5" opacity="0.5"/>
    <rect x="12" y="8" width="45" height="4" rx="2" fill="#94A3B8" opacity="0.3"/>
    <rect x="12" y="18" width="65" height="4" rx="2" fill="#94A3B8" opacity="0.4"/>
    <!-- Blocked indicator -->
    <circle cx="16" cy="50" r="4" fill="#EAB308"/>
    <text x="26" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#EAB308">Blocked</text>

    <!-- Sidebar - Agent state panel -->
    <rect x="140" y="-70" width="80" height="160" rx="0" fill="#1E293B" stroke="#334155" stroke-width="1"/>
    <text x="180" y="-52" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#94A3B8" font-weight="600" letter-spacing="1">AGENTS</text>
    <!-- Agent entries in sidebar -->
    <rect x="148" y="-42" width="64" height="22" rx="4" fill="#166534" opacity="0.5"/>
    <circle cx="156" cy="-31" r="3" fill="#22C55E"/>
    <text x="162" y="-27" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#86EFAC">Claude</text>

    <rect x="148" y="-14" width="64" height="22" rx="4" fill="#854D0E" opacity="0.5"/>
    <circle cx="156" cy="-3" r="3" fill="#EAB308"/>
    <text x="162" y="1" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#FDE68A">Codex</text>

    <rect x="148" y="14" width="64" height="22" rx="4" fill="#1E293B" opacity="0.5"/>
    <circle cx="156" cy="25" r="3" fill="#60A5FA"/>
    <text x="162" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#93C5FD">Copilot</text>

    <rect x="148" y="42" width="64" height="22" rx="4" fill="#1E293B" opacity="0.5"/>
    <circle cx="156" cy="53" r="3" fill="#6B7280"/>
    <text x="162" y="57" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#9CA3AF">Gemini</text>

    <!-- Socket API indicator -->
    <rect x="-180" y="20" width="50" height="60" rx="6" fill="#1E293B" stroke="#4F46E5" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="-155" y="44" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#818CF8" font-weight="600">Socket</text>
    <text x="-155" y="56" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="8" fill="#818CF8" font-weight="600">API</text>
    <!-- Arrow from socket to terminal -->
    <path d="M-130,50 L-118,50" stroke="#4F46E5" stroke-width="1.5" fill="none" marker-end="url(#arrowSmall)"/>
  </g>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowSmall" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4F46E5"/>
    </marker>
  </defs>

  <!-- Category badge -->
  <g transform="translate(600, 370)">
    <rect x="-52" y="-14" width="104" height="28" rx="14" fill="#4F46E5" opacity="0.12"/>
    <rect x="-52" y="-14" width="104" height="28" rx="14" fill="none" stroke="#4F46E5" stroke-width="1.5" opacity="0.4"/>
    <text x="0" y="4" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#4F46E5" font-weight="700" letter-spacing="2" text-transform="uppercase">DEV TOOLS</text>
  </g>

  <!-- Main title -->
  <text x="600" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="54" font-weight="800" fill="#0F172A">
    <tspan>Herdr: </tspan><tspan fill="url(#titleGrad)">Agent Multiplexer</tspan>
  </text>

  <!-- Subtitle -->
  <text x="600" y="472" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#475569" font-weight="400">Open-Source AI Coding Terminal</text>

  <!-- Decorative dots -->
  <circle cx="80" cy="80" r="4" fill="#6366F1" opacity="0.15"/>
  <circle cx="140" cy="50" r="3" fill="#06B6D4" opacity="0.12"/>
  <circle cx="60" cy="140" r="2.5" fill="#EC4899" opacity="0.18"/>
  <circle cx="1120" cy="600" r="5" fill="#6366F1" opacity="0.12"/>
  <circle cx="1080" cy="560" r="3" fill="#06B6D4" opacity="0.15"/>
  <circle cx="1150" cy="540" r="2.5" fill="#EC4899" opacity="0.14"/>
  <circle cx="100" cy="600" r="3.5" fill="#6366F1" opacity="0.12"/>
  <circle cx="1100" cy="100" r="4" fill="#06B6D4" opacity="0.12"/>
  <circle cx="50" cy="400" r="2" fill="#EC4899" opacity="0.16"/>
  <circle cx="1160" cy="350" r="3" fill="#6366F1" opacity="0.14"/>
</svg>