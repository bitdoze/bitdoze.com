<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <radialGradient id="blob1" cx="200" cy="150" r="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="1000" cy="500" r="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob3" cx="600" cy="650" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="300" y1="380" x2="900" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.25"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <ellipse cx="200" cy="150" rx="400" ry="350" fill="url(#blob1)"/>
  <ellipse cx="1000" cy="500" rx="420" ry="380" fill="url(#blob2)"/>
  <ellipse cx="600" cy="650" rx="350" ry="300" fill="url(#blob3)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>

  <!-- Central icon: agent + local chip -->
  <g transform="translate(600, 175)">
    <rect x="-52" y="-42" width="104" height="84" rx="18" fill="url(#titleGrad)" opacity="0.92"/>
    <rect x="-38" y="-28" width="76" height="10" rx="5" fill="white" opacity="0.9"/>
    <rect x="-38" y="-10" width="52" height="8" rx="4" fill="white" opacity="0.55"/>
    <rect x="-38" y="6" width="64" height="8" rx="4" fill="white" opacity="0.4"/>
    <circle cx="28" cy="22" r="14" fill="#10B981"/>
    <path d="M22 22 L26 26 L34 18" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- side nodes -->
    <circle cx="-78" cy="-10" r="10" fill="#6366F1" opacity="0.35"/>
    <circle cx="78" cy="-10" r="10" fill="#06B6D4" opacity="0.35"/>
    <line x1="-68" y1="-10" x2="-52" y2="-10" stroke="#6366F1" stroke-width="3" opacity="0.4"/>
    <line x1="52" y1="-10" x2="68" y2="-10" stroke="#06B6D4" stroke-width="3" opacity="0.4"/>
  </g>

  <g transform="translate(600, 300)">
    <rect x="-70" y="-16" width="140" height="32" rx="16" fill="#4F46E5" opacity="0.1"/>
    <rect x="-70" y="-16" width="140" height="32" rx="16" fill="none" stroke="#4F46E5" stroke-width="1.5" opacity="0.3"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#4F46E5" letter-spacing="2">AI AGENT</text>
  </g>

  <text x="600" y="385" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#0F172A">LM Studio</text>
  <text x="600" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="url(#titleGrad)">Bionic</text>

  <text x="600" y="510" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#64748B">Local AI Agent for Open Models</text>

  <circle cx="80" cy="80" r="4" fill="#6366F1" opacity="0.15"/>
  <circle cx="120" cy="120" r="3" fill="#06B6D4" opacity="0.12"/>
  <circle cx="1120" cy="80" r="4" fill="#06B6D4" opacity="0.15"/>
  <circle cx="1080" cy="120" r="3" fill="#EC4899" opacity="0.12"/>
  <circle cx="100" cy="580" r="3.5" fill="#EC4899" opacity="0.15"/>
  <circle cx="140" cy="620" r="2.5" fill="#6366F1" opacity="0.12"/>
  <circle cx="1100" cy="560" r="3.5" fill="#6366F1" opacity="0.15"/>
  <circle cx="1060" cy="600" r="2.5" fill="#06B6D4" opacity="0.12"/>
</svg>
