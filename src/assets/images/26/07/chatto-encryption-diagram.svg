<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" width="1000" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="msgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="keyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="storeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="deleteGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="callGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="0.8" opacity="0.12"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EF4444"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="480" fill="url(#bg)"/>
  <rect width="1000" height="480" fill="url(#grid)"/>

  <!-- Title -->
  <text x="500" y="36" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#0F172A">Chatto Privacy &amp; Encryption Model</text>

  <!-- ===== FLOW 1: Message Encryption at Rest ===== -->
  <text x="250" y="72" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#4F46E5">MESSAGES — Encryption at Rest</text>

  <!-- Step 1: User sends message -->
  <g transform="translate(80, 120)">
    <rect x="-30" y="-25" width="100" height="50" rx="10" fill="url(#msgGrad)" opacity="0.9"/>
    <text x="20" y="-3" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fff">💬 User</text>
    <text x="20" y="14" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#C7D2FE">sends message</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="155" y1="120" x2="200" y2="120" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Encrypted with per-user key -->
  <g transform="translate(260, 120)">
    <rect x="-50" y="-25" width="120" height="50" rx="10" fill="url(#keyGrad)" opacity="0.9"/>
    <text x="10" y="-3" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fff">🔐 Encrypt</text>
    <text x="10" y="14" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#FEF3C7">per-user key</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="335" y1="120" x2="380" y2="120" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Stored in NATS -->
  <g transform="translate(440, 120)">
    <rect x="-50" y="-25" width="120" height="50" rx="10" fill="url(#storeGrad)" opacity="0.9"/>
    <text x="10" y="-3" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fff">🗄️ NATS</text>
    <text x="10" y="14" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#CFFAFE">encrypted on disk</text>
  </g>

  <!-- Encrypted data visual -->
  <g transform="translate(520, 170)">
    <rect x="0" y="0" width="160" height="30" rx="6" fill="#E0F2FE" stroke="#7DD3FC" stroke-width="1"/>
    <text x="80" y="20" text-anchor="middle" font-family="monospace" font-size="10" fill="#0369A1">aGVsbG8gd29ybGQ=...</text>
    <text x="210" y="20" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94A3B8">← unreadable without key</text>
  </g>

  <!-- ===== FLOW 2: Crypto-Shredding ===== -->
  <text x="250" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#EF4444">CRYPTO-SHREDDING — Account Deletion</text>

  <!-- Step A: Account deleted -->
  <g transform="translate(80, 300)">
    <rect x="-30" y="-25" width="100" height="50" rx="10" fill="url(#deleteGrad)" opacity="0.9"/>
    <text x="20" y="-3" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fff">🗑️ Delete</text>
    <text x="20" y="14" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#FEE2E2">user account</text>
  </g>

  <!-- Arrow A→B -->
  <line x1="155" y1="300" x2="200" y2="300" stroke="#EF4444" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Step B: Key destroyed -->
  <g transform="translate(260, 300)">
    <rect x="-50" y="-25" width="120" height="50" rx="10" fill="url(#keyGrad)" opacity="0.9"/>
    <text x="10" y="-3" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fff">💥 Key Destroyed</text>
    <text x="10" y="14" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#FEF3C7">irrecoverable</text>
  </g>

  <!-- Arrow B→C -->
  <line x1="335" y1="300" x2="380" y2="300" stroke="#EF4444" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Step C: Data gone -->
  <g transform="translate(440, 300)">
    <rect x="-50" y="-25" width="120" height="50" rx="10" fill="#FEE2E2" stroke="#FCA5A5" stroke-width="1.5"/>
    <text x="10" y="-3" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#DC2626">🔒 Data Gone</text>
    <text x="10" y="14" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#991B1B">mathematically unrecoverable</text>
  </g>

  <!-- GDPR badge -->
  <g transform="translate(620, 300)">
    <rect x="0" y="-20" width="140" height="40" rx="8" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1.5"/>
    <text x="70" y="1" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#065F46">🇪🇺 GDPR-Friendly</text>
    <text x="70" y="16" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#047857">"prove data is gone"</text>
  </g>

  <!-- ===== FLOW 3: Voice/Video E2EE ===== -->
  <text x="800" y="72" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#10B981">CALLS — End-to-End Encrypted</text>

  <!-- Call flow -->
  <g transform="translate(700, 120)">
    <rect x="0" y="-25" width="80" height="50" rx="10" fill="url(#callGrad)" opacity="0.9"/>
    <text x="40" y="-3" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fff">👤 User A</text>
    <text x="40" y="14" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#D1FAE5">voice/video</text>
  </g>

  <line x1="785" y1="120" x2="810" y2="120" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <g transform="translate(820, 110)">
    <rect x="0" y="-25" width="80" height="50" rx="10" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="1.5"/>
    <text x="40" y="-5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#065F46">LiveKit</text>
    <text x="40" y="10" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#047857">E2EE tunnel</text>
    <text x="40" y="24" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#059669">server can't read</text>
  </g>

  <line x1="905" y1="120" x2="930" y2="120" stroke="#10B981" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <g transform="translate(940, 120)">
    <rect x="-20" y="-25" width="80" height="50" rx="10" fill="url(#callGrad)" opacity="0.9"/>
    <text x="20" y="-3" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fff">👤 User B</text>
    <text x="20" y="14" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#D1FAE5">voice/video</text>
  </g>

  <!-- E2EE shield badge -->
  <g transform="translate(830, 175)">
    <rect x="-40" y="-12" width="80" height="24" rx="12" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1"/>
    <text x="0" y="4" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#065F46">🛡️ E2EE</text>
  </g>

  <!-- ===== Summary boxes ===== -->
  <g transform="translate(500, 390)">
    <!-- Box: What IS protected -->
    <rect x="-220" y="0" width="200" height="65" rx="10" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1.5"/>
    <text x="-120" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#065F46">✅ Protected</text>
    <text x="-120" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#047857">Data encrypted on disk</text>
    <text x="-120" y="55" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#047857">Calls E2EE · No tracking</text>
  </g>

  <g transform="translate(500, 390)">
    <!-- Box: What is NOT -->
    <rect x="20" y="0" width="200" height="65" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>
    <text x="120" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#DC2626">⚠️ Not E2EE</text>
    <text x="120" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#991B1B">Messages are not end-to-end</text>
    <text x="120" y="55" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#991B1B">encrypted between clients</text>
  </g>
</svg>