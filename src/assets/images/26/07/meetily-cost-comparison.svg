<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="0.5" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#grid)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94A3B8" font-weight="500" letter-spacing="2">PRICING COMPARISON</text>
  <text x="400" y="60" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#0F172A" font-weight="800">3-Year Total Cost</text>

  <!-- Chart area -->
  <!-- Meetily CE -->
  <text x="165" y="110" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#0F172A" font-weight="600">Meetily CE</text>
  <rect x="180" y="90" width="8" height="28" rx="4" fill="url(#greenGrad)"/>
  <text x="198" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#10B981" font-weight="800">$0</text>
  <text x="198" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748B">Free forever — MIT license</text>

  <!-- Meetily Pro -->
  <text x="165" y="165" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#0F172A" font-weight="600">Meetily Pro</text>
  <rect x="180" y="147" width="160" height="28" rx="4" fill="#6366F1"/>
  <text x="350" y="167" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#6366F1" font-weight="800">$360</text>
  <text x="350" y="182" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748B">$10/mo × 36 months</text>

  <!-- Otter.ai -->
  <text x="165" y="220" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#0F172A" font-weight="600">Otter.ai</text>
  <rect x="180" y="202" width="270" height="28" rx="4" fill="#F59E0B"/>
  <text x="460" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#B45309" font-weight="800">$300–$612</text>
  <text x="460" y="237" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748B">Pro $100/yr or Business $204/yr</text>

  <!-- Fireflies.ai -->
  <text x="165" y="275" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#0F172A" font-weight="600">Fireflies.ai</text>
  <rect x="180" y="257" width="290" height="28" rx="4" fill="#EF4444"/>
  <text x="480" y="277" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#DC2626" font-weight="800">$360–$648</text>
  <text x="480" y="292" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748B">Pro $120/yr or Business $216/yr</text>

  <!-- Granola -->
  <text x="165" y="330" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#0F172A" font-weight="600">Granola</text>
  <rect x="180" y="312" width="300" height="28" rx="4" fill="#8B5CF6"/>
  <text x="490" y="332" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#6D28D9" font-weight="800">$648</text>
  <text x="490" y="347" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748B">$18/mo × 36 months</text>

  <!-- Fathom -->
  <text x="165" y="385" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#0F172A" font-weight="600">Fathom</text>
  <rect x="180" y="367" width="295" height="28" rx="4" fill="#EC4899"/>
  <text x="485" y="387" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#BE185D" font-weight="800">$540–$684</text>
  <text x="485" y="402" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748B">Premium $180/yr or Team $228/yr</text>
</svg>