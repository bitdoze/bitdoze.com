<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="against" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#DC2626"/>
    </linearGradient>
    <linearGradient id="for" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="abstain" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="0.8" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg)"/>
  <rect width="900" height="520" fill="url(#grid)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#0F172A">EU Parliament Vote — Chat Control 1.0</text>
  <text x="450" y="64" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#64748B">July 9, 2026 · Motion to reject needed 361 votes (absolute majority)</text>

  <!-- Total circle badge -->
  <circle cx="450" cy="140" r="48" fill="#fff" stroke="#E2E8F0" stroke-width="2"/>
  <text x="450" y="133" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#0F172A">607</text>
  <text x="450" y="153" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">TOTAL VOTES</text>

  <!-- Vote bars -->
  <!-- Against: 314 -->
  <g transform="translate(100, 210)">
    <rect x="0" y="0" width="500" height="52" rx="8" fill="#FEE2E2"/>
    <rect x="0" y="0" width="258" height="52" rx="8" fill="url(#against)"/>
    <text x="14" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fff" opacity="0.9">AGAINST</text>
    <text x="14" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#fff">314</text>
    <text x="520" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#DC2626">51.7%</text>
  </g>

  <!-- For: 276 -->
  <g transform="translate(100, 278)">
    <rect x="0" y="0" width="500" height="52" rx="8" fill="#D1FAE5"/>
    <rect x="0" y="0" width="227" height="52" rx="8" fill="url(#for)"/>
    <text x="14" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fff" opacity="0.9">FOR</text>
    <text x="14" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#fff">276</text>
    <text x="520" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#059669">45.5%</text>
  </g>

  <!-- Abstentions: 17 -->
  <g transform="translate(100, 346)">
    <rect x="0" y="0" width="500" height="52" rx="8" fill="#FEF3C7"/>
    <rect x="0" y="0" width="28" height="52" rx="8" fill="url(#abstain)"/>
    <text x="14" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#fff" opacity="0.9">ABSTAIN</text>
    <text x="14" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" fill="#fff">17</text>
    <text x="520" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#D97706">2.8%</text>
  </g>

  <!-- Result callout -->
  <rect x="100" y="418" width="700" height="52" rx="10" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1.5"/>
  <text x="450" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#DC2626">Motion to REJECT failed — needed 361, got 314</text>
  <text x="450" y="458" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#991B1B">Majority opposed, but didn't reach absolute majority threshold</text>

  <!-- Timeline -->
  <g transform="translate(100, 490)">
    <rect x="0" y="-14" width="700" height="28" rx="14" fill="#EEF2FF"/>
    <circle cx="80" cy="0" r="6" fill="#4F46E5"/>
    <text x="80" y="-22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#4F46E5">Jul 2026</text>
    <text x="80" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6366F1">Passed</text>
    <line x1="86" y1="0" x2="280" y2="0" stroke="#4F46E5" stroke-width="2" stroke-dasharray="4,4"/>
    <circle cx="290" cy="0" r="6" fill="#F59E0B"/>
    <text x="290" y="-22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#D97706">Sep 2026</text>
    <text x="290" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#D97706">CC 2.0 trilogue</text>
    <line x1="296" y1="0" x2="500" y2="0" stroke="#F59E0B" stroke-width="2" stroke-dasharray="4,4"/>
    <circle cx="510" cy="0" r="6" fill="#EF4444"/>
    <text x="510" y="-22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#DC2626">Apr 2028</text>
    <text x="510" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#DC2626">CC 1.0 expires</text>
    <line x1="516" y1="0" x2="620" y2="0" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,4"/>
    <circle cx="630" cy="0" r="6" fill="#7C3AED"/>
    <text x="630" y="-22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#7C3AED">Permanent?</text>
    <text x="630" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#7C3AED">CC 2.0 vote</text>
  </g>
</svg>