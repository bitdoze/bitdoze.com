<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" fill="none">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="50%" stop-color="#F1F5F9"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.25"/>
    </pattern>

    <!-- Glowing Blobs Gradients -->
    <radialGradient id="blob-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob-indigo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob-pink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>

    <!-- Text Gradient -->
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <!-- Mic Circle Gradient -->
    <linearGradient id="mic-circle-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>

    <!-- Wave Stroke Gradient -->
    <linearGradient id="wave-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg-grad)"/>

  <!-- Glowing Ambient Blobs -->
  <circle cx="200" cy="180" r="350" fill="url(#blob-cyan)" />
  <circle cx="1000" cy="480" r="400" fill="url(#blob-indigo)" />
  <circle cx="600" cy="337" r="300" fill="url(#blob-pink)" />

  <!-- Grid Overlay -->
  <rect width="1200" height="675" fill="url(#grid)" />

  <!-- Decorative Particles -->
  <circle cx="250" cy="150" r="6" fill="#4F46E5" opacity="0.15" />
  <circle cx="950" cy="200" r="8" fill="#06B6D4" opacity="0.15" />
  <circle cx="180" cy="500" r="10" fill="#EC4899" opacity="0.12" />
  <circle cx="1020" cy="450" r="5" fill="#4F46E5" opacity="0.2" />

  <!-- Voice Cloning Center Graphic -->
  <g transform="translate(600, 200)">
    <!-- Concentric broadcast waves -->
    <path d="M-60 -20 A40 40 0 0 0 -60 20" fill="none" stroke="url(#wave-grad)" stroke-width="4.5" stroke-linecap="round" opacity="0.8" />
    <path d="M-80 -35 A65 65 0 0 0 -80 35" fill="none" stroke="url(#wave-grad)" stroke-width="4.5" stroke-linecap="round" opacity="0.5" />
    <path d="M-100 -50 A90 90 0 0 0 -100 50" fill="none" stroke="url(#wave-grad)" stroke-width="4.5" stroke-linecap="round" opacity="0.2" />

    <path d="M60 -20 A40 40 0 0 1 60 20" fill="none" stroke="url(#wave-grad)" stroke-width="4.5" stroke-linecap="round" opacity="0.8" />
    <path d="M80 -35 A65 65 0 0 1 80 35" fill="none" stroke="url(#wave-grad)" stroke-width="4.5" stroke-linecap="round" opacity="0.5" />
    <path d="M100 -50 A90 90 0 0 1 100 50" fill="none" stroke="url(#wave-grad)" stroke-width="4.5" stroke-linecap="round" opacity="0.2" />

    <!-- Mic Base Circle -->
    <circle cx="0" cy="0" r="45" fill="url(#mic-circle-grad)" />
    
    <!-- Microphone Silhouette -->
    <rect x="-10" y="-22" width="20" height="32" rx="10" fill="none" stroke="white" stroke-width="4" />
    <path d="M-16 -6 A16 16 0 0 0 16 -6" fill="none" stroke="white" stroke-width="4" stroke-linecap="round" />
    <line x1="0" y1="10" x2="0" y2="22" stroke="white" stroke-width="4" stroke-linecap="round" />
    <line x1="-8" y1="22" x2="8" y2="22" stroke="white" stroke-width="4" stroke-linecap="round" />
  </g>

  <!-- Title & Badge Group -->
  <g transform="translate(600, 420)">
    <!-- Badge -->
    <g transform="translate(0, -90)">
      <rect x="-65" y="-18" width="130" height="36" rx="18" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="1.5" />
      <text y="5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#4F46E5" letter-spacing="1.5">AI CLONING</text>
    </g>

    <!-- Main Title -->
    <text y="0" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="76" font-weight="900" fill="#0F172A" letter-spacing="-2">
      Clone Your <tspan fill="url(#text-grad)">Voice</tspan>
    </text>
  </g>
</svg>
