<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" width="1000" height="520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="caddyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="chattoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="natsGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="livekitGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EC4899"/>
      <stop offset="100%" stop-color="#DB2777"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="0.8" opacity="0.12"/>
    </pattern>
    <!-- Arrow marker -->
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748B"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4F46E5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="520" fill="url(#bg)"/>
  <rect width="1000" height="520" fill="url(#grid)"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#0F172A">Chatto Docker Compose Architecture</text>
  <text x="500" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748B">4 services: Caddy (TLS) · Chatto (app) · NATS (persistence) · LiveKit (calls)</text>

  <!-- Docker Compose box -->
  <rect x="120" y="80" width="760" height="400" rx="16" fill="#fff" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="140" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#94A3B8">docker compose</text>

  <!-- Internet (Users) -->
  <g transform="translate(500, 110)">
    <rect x="-60" y="-18" width="120" height="36" rx="18" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#334155">🌐 Internet</text>
  </g>

  <!-- Arrow: Internet → Caddy -->
  <line x1="500" y1="134" x2="500" y2="158" stroke="#64748B" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="520" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94A3B8">TCP 80/443</text>

  <!-- Caddy Box -->
  <g transform="translate(500, 200)">
    <rect x="-100" y="-32" width="200" height="64" rx="12" fill="url(#caddyGrad)" opacity="0.9"/>
    <rect x="-100" y="-32" width="200" height="64" rx="12" fill="none" stroke="#059669" stroke-width="2"/>
    <text x="0" y="-6" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#fff">🔒 Caddy</text>
    <text x="0" y="16" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#D1FAE5">Auto TLS · Reverse Proxy</text>
    <!-- Volume badge -->
    <rect x="60" y="-28" width="70" height="18" rx="4" fill="#fff" opacity="0.2"/>
    <text x="95" y="-16" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#fff">caddy_data</text>
  </g>

  <!-- Arrow: Caddy → Chatto -->
  <line x1="500" y1="232" x2="350" y2="280" stroke="#64748B" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="400" y="252" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94A3B8">HTTP/WS</text>

  <!-- Caddy → LiveKit (for calls) -->
  <line x1="580" y1="220" x2="700" y2="280" stroke="#64748B" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>
  <text x="660" y="242" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94A3B8">UDP 3478</text>

  <!-- Chatto Box -->
  <g transform="translate(300, 340)">
    <rect x="-120" y="-42" width="240" height="84" rx="12" fill="url(#chattoGrad)" opacity="0.95"/>
    <rect x="-120" y="-42" width="240" height="84" rx="12" fill="none" stroke="#4F46E5" stroke-width="2"/>
    <text x="0" y="-10" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#fff">💬 Chatto</text>
    <text x="0" y="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#C7D2FE">Go binary · Web frontend · API</text>
    <text x="0" y="28" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#A5B4FC">GHCR image · Port 8080</text>
    <!-- Volume badge -->
    <rect x="70" y="-38" width="80" height="18" rx="4" fill="#fff" opacity="0.2"/>
    <text x="110" y="-26" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#fff">chatto_data</text>
  </g>

  <!-- Arrow: Chatto → NATS -->
  <line x1="240" y1="350" x2="180" y2="350" stroke="#06B6D4" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- NATS Box -->
  <g transform="translate(130, 350)">
    <rect x="-80" y="-36" width="100" height="72" rx="10" fill="url(#natsGrad)" opacity="0.9"/>
    <rect x="-80" y="-36" width="100" height="72" rx="10" fill="none" stroke="#06B6D4" stroke-width="2"/>
    <text x="-30" y="-8" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#fff">🗄️ NATS</text>
    <text x="-30" y="10" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#CFFAFE">JetStream</text>
    <text x="-30" y="24" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#CFFAFE">Persistence</text>
    <!-- Volume badge -->
    <rect x="-75" y="30" width="60" height="16" rx="4" fill="#fff" opacity="0.2"/>
    <text x="-45" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#fff">nats_data</text>
  </g>

  <!-- Arrow: Chatto → LiveKit -->
  <line x1="420" y1="350" x2="580" y2="350" stroke="#EC4899" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowGray)"/>
  <text x="500" y="342" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#94A3B8">Signaling</text>

  <!-- LiveKit Box -->
  <g transform="translate(680, 340)">
    <rect x="-80" y="-36" width="120" height="72" rx="10" fill="url(#livekitGrad)" opacity="0.9"/>
    <rect x="-80" y="-36" width="120" height="72" rx="10" fill="none" stroke="#EC4899" stroke-width="2"/>
    <text x="-20" y="-8" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#fff">📹 LiveKit</text>
    <text x="-20" y="10" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#FCE7F3">Voice · Video</text>
    <text x="-20" y="24" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#FCE7F3">E2EE · Screen share</text>
    <!-- Ports badge -->
    <rect x="20" y="-32" width="85" height="16" rx="4" fill="#fff" opacity="0.2"/>
    <text x="62" y="-20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#fff">UDP 50000-50200</text>
  </g>

  <!-- .env callout -->
  <g transform="translate(850, 460)">
    <rect x="-70" y="-18" width="140" height="36" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5"/>
    <text x="0" y="2" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#92400E">⚙️ .env file</text>
    <text x="0" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#B45309">Domain · SMTP · Keys</text>
  </g>

  <!-- DNS note -->
  <g transform="translate(200, 460)">
    <rect x="-90" y="-18" width="180" height="36" rx="8" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1.5"/>
    <text x="0" y="2" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#065F46">🌍 DNS A Record</text>
    <text x="0" y="18" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#047857">chat.example.com → VPS IP</text>
  </g>
</svg>