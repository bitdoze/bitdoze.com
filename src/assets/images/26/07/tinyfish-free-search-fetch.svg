<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <radialGradient id="glow1" cx="300" cy="200" r="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="900" cy="450" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="600" cy="100" r="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="freeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.25"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  
  <!-- Ambient glows -->
  <rect width="1200" height="675" fill="url(#glow1)"/>
  <rect width="1200" height="675" fill="url(#glow2)"/>
  <rect width="1200" height="675" fill="url(#glow3)"/>
  
  <!-- Category badge -->
  <rect x="440" y="70" width="320" height="36" rx="18" fill="#2563EB" opacity="0.1"/>
  <rect x="440" y="70" width="320" height="36" rx="18" stroke="#2563EB" stroke-width="1.5" fill="none" opacity="0.3"/>
  <text x="600" y="94" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#2563EB" text-anchor="middle" letter-spacing="2">FREE WEB ACCESS</text>
  
  <!-- Central icon - Search + Code -->
  <g transform="translate(600, 200)">
    <!-- Search magnifying glass -->
    <circle cx="-30" cy="-20" r="35" fill="none" stroke="#2563EB" stroke-width="4" opacity="0.8"/>
    <line x1="-5" y1="5" x2="25" y2="35" stroke="#2563EB" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <!-- Code brackets inside search -->
    <text x="-30" y="-8" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#06B6D4" text-anchor="middle" font-weight="700">&lt;/&gt;</text>
    <!-- Terminal window on right -->
    <rect x="40" y="-40" width="100" height="80" rx="8" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <rect x="40" y="-40" width="100" height="18" rx="8" fill="#F1F5F9"/>
    <rect x="40" y="-28" width="100" height="6" fill="#F1F5F9"/>
    <circle cx="55" cy="-31" r="3" fill="#EF4444" opacity="0.7"/>
    <circle cx="65" cy="-31" r="3" fill="#F59E0B" opacity="0.7"/>
    <circle cx="75" cy="-31" r="3" fill="#10B981" opacity="0.7"/>
    <!-- Code lines -->
    <rect x="50" y="-16" width="60" height="4" rx="2" fill="#2563EB" opacity="0.5"/>
    <rect x="50" y="-8" width="45" height="4" rx="2" fill="#06B6D4" opacity="0.4"/>
    <rect x="50" y="0" width="55" height="4" rx="2" fill="#8B5CF6" opacity="0.3"/>
    <!-- Fish icon -->
    <text x="95" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="24">🐟</text>
  </g>
  
  <!-- FREE badge -->
  <g transform="translate(600, 310)">
    <rect x="-50" y="-18" width="100" height="36" rx="18" fill="url(#freeGrad)" opacity="0.15"/>
    <rect x="-50" y="-18" width="100" height="36" rx="18" stroke="#10B981" stroke-width="2" fill="none" opacity="0.4"/>
    <text x="0" y="8" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#10B981" text-anchor="middle" font-weight="800" letter-spacing="3">FREE</text>
  </g>
  
  <!-- Main title -->
  <text x="600" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#0F172A" text-anchor="middle" letter-spacing="-1">
    <tspan>TinyFish </tspan>
    <tspan fill="url(#titleGrad)">Search + Fetch</tspan>
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="425" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#475569" text-anchor="middle" font-weight="400">Web Access for Your Coding Agents</text>
  
  <!-- Feature chips -->
  <g transform="translate(600, 480)">
    <rect x="-320" y="-15" width="140" height="32" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="-250" y="7" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#2563EB" text-anchor="middle" font-weight="500">No Credit Card</text>
    
    <rect x="-160" y="-15" width="120" height="32" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="-100" y="7" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#06B6D4" text-anchor="middle" font-weight="500">30/min Search</text>
    
    <rect x="-20" y="-15" width="130" height="32" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="45" y="7" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#8B5CF6" text-anchor="middle" font-weight="500">150/min Fetch</text>
    
    <rect x="130" y="-15" width="150" height="32" rx="16" fill="white" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="205" y="7" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#10B981" text-anchor="middle" font-weight="500">JS Rendering</text>
  </g>
  
  <!-- Agent logos row -->
  <g transform="translate(600, 545)">
    <text x="-250" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle">Pi Agent</text>
    <circle cx="-170" cy="-4" r="3" fill="#CBD5E1"/>
    <text x="-120" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle">Hermes</text>
    <circle cx="-55" cy="-4" r="3" fill="#CBD5E1"/>
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle">OpenClaw</text>
    <circle cx="65" cy="-4" r="3" fill="#CBD5E1"/>
    <text x="120" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle">Claude Code</text>
    <circle cx="200" cy="-4" r="3" fill="#CBD5E1"/>
    <text x="260" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94A3B8" text-anchor="middle">+more</text>
  </g>
  
  <!-- Decorative dots -->
  <circle cx="100" cy="100" r="4" fill="#3B82F6" opacity="0.15"/>
  <circle cx="1100" cy="575" r="4" fill="#06B6D4" opacity="0.15"/>
  <circle cx="150" cy="550" r="3" fill="#8B5CF6" opacity="0.12"/>
  <circle cx="1050" cy="125" r="3" fill="#10B981" opacity="0.12"/>
  <circle cx="80" cy="350" r="5" fill="#F59E0B" opacity="0.1"/>
  <circle cx="1120" cy="350" r="5" fill="#2563EB" opacity="0.1"/>
  
  <!-- Footer -->
  <text x="600" y="640" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#94A3B8" text-anchor="middle">bitdoze.com</text>
</svg>
