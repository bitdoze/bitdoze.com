<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5F3FF"/>
      <stop offset="55%" stop-color="#EDE9FE"/>
      <stop offset="100%" stop-color="#DDD6FE"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <linearGradient id="barfast" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="150" r="140" fill="#7C3AED" opacity="0.06"/>
  <circle cx="120" cy="800" r="110" fill="#FB923C" opacity="0.06"/>

  <!-- Title -->
  <text x="800" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="78" font-weight="800" fill="#1a1a2e" text-anchor="middle" letter-spacing="-2">Astro 7: Faster Builds</text>
  <text x="800" y="255" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="600" fill="#7C3AED" text-anchor="middle">743 pages: 103s to 47s</text>

  <!-- Rocket badge -->
  <g transform="translate(230,460)">
    <line x1="-70" y1="70" x2="20" y2="70" stroke="#7C3AED" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
    <line x1="-95" y1="110" x2="0" y2="110" stroke="#7C3AED" stroke-width="9" stroke-linecap="round" opacity="0.4"/>
    <line x1="-70" y1="150" x2="20" y2="150" stroke="#7C3AED" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
    <circle cx="140" cy="110" r="105" fill="#ffffff" stroke="#7C3AED" stroke-width="5"/>
    <path d="M140 40 L178 175 L140 148 L102 175 Z" fill="url(#flame)"/>
    <circle cx="140" cy="108" r="16" fill="#FFD9B8"/>
  </g>

  <!-- Bar chart -->
  <line x1="700" y1="760" x2="1400" y2="760" stroke="#1a1a2e" stroke-width="3" opacity="0.25"/>

  <rect x="760" y="420" width="200" height="340" rx="10" fill="#B9C0D4"/>
  <text x="860" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#1a1a2e" text-anchor="middle">101.77s</text>
  <text x="860" y="800" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="600" fill="#64748B" text-anchor="middle">Astro 6</text>

  <rect x="1150" y="609" width="200" height="151" rx="10" fill="url(#barfast)"/>
  <text x="1250" y="589" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="800" fill="#7C3AED" text-anchor="middle">45.08s</text>
  <text x="1250" y="800" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="700" fill="#7C3AED" text-anchor="middle">Astro 7</text>

  <!-- Speedup badge -->
  <rect x="925" y="330" width="260" height="64" rx="32" fill="#1a1a2e"/>
  <text x="1055" y="371" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#ffffff" text-anchor="middle">2.2x faster</text>

  <!-- Footer -->
  <text x="800" y="852" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#6b5b95" text-anchor="middle">astro build &#183; Rust compiler &#183; Vite 8</text>
</svg>
