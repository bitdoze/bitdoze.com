<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="675" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <radialGradient id="blob1" cx="200" cy="150" r="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="1000" cy="500" r="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob3" cx="600" cy="650" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="300" y1="380" x2="900" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.25"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>

  <!-- Ambient blobs -->
  <ellipse cx="200" cy="150" rx="400" ry="350" fill="url(#blob1)"/>
  <ellipse cx="1000" cy="500" rx="420" ry="380" fill="url(#blob2)"/>
  <ellipse cx="600" cy="650" rx="350" ry="300" fill="url(#blob3)"/>

  <!-- Grid overlay -->
  <rect width="1200" height="675" fill="url(#grid)"/>

  <!-- Central icon: Microphone with sound waves (meeting theme) -->
  <g transform="translate(600, 180)">
    <!-- Microphone body -->
    <rect x="-18" y="-45" width="36" height="60" rx="18" fill="url(#titleGrad)" opacity="0.9"/>
    <!-- Microphone base arc -->
    <path d="M-35 10 Q-35 45 0 45 Q35 45 35 10" fill="none" stroke="url(#titleGrad)" stroke-width="4" stroke-linecap="round"/>
    <!-- Stand -->
    <line x1="0" y1="45" x2="0" y2="60" stroke="url(#titleGrad)" stroke-width="4" stroke-linecap="round"/>
    <line x1="-15" y1="60" x2="15" y2="60" stroke="url(#titleGrad)" stroke-width="4" stroke-linecap="round"/>
    <!-- Sound waves left -->
    <path d="M-40 -20 Q-55 0 -40 20" fill="none" stroke="#6366F1" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <path d="M-55 -30 Q-75 0 -55 30" fill="none" stroke="#6366F1" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    <!-- Sound waves right -->
    <path d="M40 -20 Q55 0 40 20" fill="none" stroke="#06B6D4" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <path d="M55 -30 Q75 0 55 30" fill="none" stroke="#06B6D4" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    <!-- Shield/lock hint (privacy) -->
    <circle cx="30" cy="-35" r="14" fill="#10B981" opacity="0.85"/>
    <path d="M30 -44 L30 -44 C30 -44 23 -40 23 -34 C23 -28 30 -26 30 -26 C30 -26 37 -28 37 -34 C37 -40 30 -44 30 -44Z" fill="white" opacity="0.9"/>
    <rect x="26" y="-36" width="8" height="7" rx="1.5" fill="white" opacity="0.9"/>
    <circle cx="30" cy="-33" r="1.5" fill="#10B981"/>
  </g>

  <!-- Category badge -->
  <g transform="translate(600, 310)">
    <rect x="-85" y="-16" width="170" height="32" rx="16" fill="#4F46E5" opacity="0.1"/>
    <rect x="-85" y="-16" width="170" height="32" rx="16" fill="none" stroke="#4F46E5" stroke-width="1.5" opacity="0.3"/>
    <text x="0" y="5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#4F46E5" letter-spacing="2">SELF-HOSTING</text>
  </g>

  <!-- Main title -->
  <text x="600" y="385" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#0F172A">AI Meeting </text>
  <text x="600" y="445" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="url(#titleGrad)">Assistant</text>

  <!-- Subtitle -->
  <text x="600" y="495" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#64748B">Meetily — Free, Open-Source, Local-First</text>

  <!-- Decorative dots -->
  <circle cx="80" cy="80" r="4" fill="#6366F1" opacity="0.15"/>
  <circle cx="120" cy="120" r="3" fill="#06B6D4" opacity="0.12"/>
  <circle cx="1120" cy="80" r="4" fill="#06B6D4" opacity="0.15"/>
  <circle cx="1080" cy="120" r="3" fill="#EC4899" opacity="0.12"/>
  <circle cx="100" cy="580" r="3.5" fill="#EC4899" opacity="0.15"/>
  <circle cx="140" cy="620" r="2.5" fill="#6366F1" opacity="0.12"/>
  <circle cx="1100" cy="560" r="3.5" fill="#6366F1" opacity="0.15"/>
  <circle cx="1060" cy="600" r="2.5" fill="#06B6D4" opacity="0.12"/>
  <circle cx="200" cy="600" r="2" fill="#06B6D4" opacity="0.18"/>
  <circle cx="1000" cy="100" r="2" fill="#EC4899" opacity="0.18"/>
</svg>