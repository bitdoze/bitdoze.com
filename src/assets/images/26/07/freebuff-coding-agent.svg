  <circle cx="124" cy="118" r="6" fill="#f0b429"/>
  <circle cx="144" cy="118" r="6" fill="#3fb950"/>
  <!-- Terminal title -->
  <text x="340" y="124" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="13">freebuff — terminal</text>
  <!-- Terminal content -->
  <text x="100" y="168" fill="#22d3ee" font-family="monospace" font-size="14" font-weight="bold">$</text>
  <text x="118" y="168" fill="#e6edf3" font-family="monospace" font-size="14">npm install -g freebuff</text>
  <text x="100" y="196" fill="#8b949e" font-family="monospace" font-size="12">+ freebuff@1.2.0</text>
  <text x="100" y="220" fill="#22d3ee" font-family="monospace" font-size="14" font-weight="bold">$</text>
  <text x="118" y="220" fill="#e6edf3" font-family="monospace" font-size="14">freebuff</text>
  <text x="100" y="248" fill="#3fb950" font-family="monospace" font-size="12">✓ Connected to Freebuff</text>
  <text x="100" y="272" fill="#8b949e" font-family="monospace" font-size="12">Model: MiMo V2.5 | Sessions: 1/5</text>
  <text x="100" y="300" fill="#22d3ee" font-family="monospace" font-size="14" font-weight="bold">></text>
  <text x="118" y="300" fill="#e6edf3" font-family="monospace" font-size="14">Build me a solar panel website</text>
  <text x="100" y="300" fill="#e6edf3" font-family="monospace" font-size="14" opacity="0.5">Build me a solar panel website</text>
  <!-- Blinking cursor -->
  <rect x="100" y="320" width="8" height="16" fill="#22d3ee" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- Code diff indicators -->
  <g opacity="0.6">
    <rect x="100" y="360" width="180" height="12" rx="2" fill="#1a3a2a"/>
    <text x="106" y="370" fill="#3fb950" font-family="monospace" font-size="10">+ src/pages/index.astro</text>
    <rect x="100" y="380" width="200" height="12" rx="2" fill="#1a3a2a"/>
    <text x="106" y="390" fill="#3fb950" font-family="monospace" font-size="10">+ src/pages/about.astro</text>
    <rect x="100" y="400" width="220" height="12" rx="2" fill="#1a3a2a"/>
    <text x="106" y="410" fill="#3fb950" font-family="monospace" font-size="10">+ src/pages/services.astro</text>
    <rect x="100" y="420" width="190" height="12" rx="2" fill="#1a3a2a"/>
    <text x="106" y="430" fill="#3fb950" font-family="monospace" font-size="10">+ src/pages/contact.astro</text>
    <rect x="100" y="440" width="160" height="12" rx="2" fill="#1a3a2a"/>
    <text x="106" y="450" fill="#3fb950" font-family="monospace" font-size="10">✓ Build successful!</text>
  </g>
  <!-- Right side: Title and features -->
  <text x="680" y="180" fill="#ffffff" font-family="system-ui, sans-serif" font-size="64" font-weight="800">FreeBuff</text>
  <text x="680" y="230" fill="url(#accent)" font-family="system-ui, sans-serif" font-size="24" font-weight="600">Free AI Coding Agent</text>
  <text x="680" y="260" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="18">CLI + Web · No subscription needed</text>
  <!-- Model badges -->
  <g>
    <rect x="680" y="300" width="120" height="32" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="740" y="321" text-anchor="middle" fill="#22d3ee" font-family="system-ui, sans-serif" font-size="13" font-weight="600">MiMo V2.5</text>
  </g>
  <g>
    <rect x="810" y="300" width="130" height="32" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="875" y="321" text-anchor="middle" fill="#a78bfa" font-family="system-ui, sans-serif" font-size="13" font-weight="600">DeepSeek V4</text>
  </g>
  <g>
    <rect x="950" y="300" width="130" height="32" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="1015" y="321" text-anchor="middle" fill="#f472b6" font-family="system-ui, sans-serif" font-size="13" font-weight="600">MiniMax M3</text>
  </g>
  <g>
    <rect x="680" y="342" width="120" height="32" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="740" y="363" text-anchor="middle" fill="#34d399" font-family="system-ui, sans-serif" font-size="13" font-weight="600">Kimi K2.6</text>
  </g>
  <!-- Features -->
  <g transform="translate(680, 410)">
    <circle cx="12" cy="0" r="12" fill="url(#green)" opacity="0.15"/>
    <text x="12" y="5" text-anchor="middle" fill="#10b981" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">$0</text>
    <text x="36" y="5" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="16">Completely free</text>
  </g>
  <g transform="translate(680, 445)">
    <circle cx="12" cy="0" r="12" fill="url(#green)" opacity="0.15"/>
    <text x="12" y="5" text-anchor="middle" fill="#10b981" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">⚡</text>
    <text x="36" y="5" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="16">9 specialized subagents</text>
  </g>
  <g transform="translate(680, 480)">
    <circle cx="12" cy="0" r="12" fill="url(#green)" opacity="0.15"/>
    <text x="12" y="5" text-anchor="middle" fill="#10b981" font-family="system-ui, sans-serif" font-size="16" font-weight="bold">🌐</text>
    <text x="36" y="5" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="16">Web app builder included</text>
  </g>
