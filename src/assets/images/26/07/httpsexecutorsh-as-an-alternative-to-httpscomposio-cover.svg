<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>

    <!-- Ambient blob gradients -->
    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EC4899" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>

    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <!-- Badge gradient -->
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.25"/>
    </pattern>

    <!-- Icon gradient -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGrad)"/>

  <!-- Ambient blobs -->
  <ellipse cx="200" cy="150" rx="400" ry="300" fill="url(#blob1)"/>
  <ellipse cx="1000" cy="500" rx="350" ry="280" fill="url(#blob2)"/>
  <ellipse cx="600" cy="650" rx="300" ry="200" fill="url(#blob3)"/>

  <!-- Grid overlay -->
  <rect width="1200" height="675" fill="url(#grid)"/>

  <!-- Decorative dots -->
  <circle cx="80" cy="60" r="4" fill="#6366F1" opacity="0.15"/>
  <circle cx="140" cy="100" r="3" fill="#06B6D4" opacity="0.12"/>
  <circle cx="1100" cy="80" r="5" fill="#EC4899" opacity="0.14"/>
  <circle cx="1140" cy="140" r="3" fill="#6366F1" opacity="0.12"/>
  <circle cx="60" cy="600" r="4" fill="#06B6D4" opacity="0.15"/>
  <circle cx="120" cy="560" r="3" fill="#EC4899" opacity="0.12"/>
  <circle cx="1080" cy="580" r="4" fill="#6366F1" opacity="0.14"/>
  <circle cx="1130" cy="620" r="3" fill="#06B6D4" opacity="0.12"/>

  <!-- Central icon: MCP Gateway concept — two nodes connected through a shield/proxy -->
  <!-- Left node (client) -->
  <rect x="340" y="170" width="80" height="60" rx="12" fill="url(#iconGrad)" opacity="0.9"/>
  <text x="380" y="207" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="white">Agent</text>

  <!-- Arrow left -->
  <line x1="430" y1="200" x2="490" y2="200" stroke="#4F46E5" stroke-width="3" stroke-linecap="round"/>
  <polygon points="486,193 500,200 486,207" fill="#4F46E5"/>

  <!-- Center gateway box -->
  <rect x="500" y="155" width="200" height="90" rx="16" fill="url(#iconGrad)"/>
  <text x="600" y="190" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="white">Executor.sh</text>
  <text x="600" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="white" opacity="0.85">MCP Gateway</text>

  <!-- Arrow right -->
  <line x1="710" y1="200" x2="770" y2="200" stroke="#06B6D4" stroke-width="3" stroke-linecap="round"/>
  <polygon points="766,193 780,200 766,207" fill="#06B6D4"/>

  <!-- Right node (APIs) -->
  <rect x="780" y="170" width="80" height="60" rx="12" fill="url(#iconGrad)" opacity="0.9"/>
  <text x="820" y="207" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="white">APIs</text>

  <!-- Shield badge on gateway -->
  <circle cx="600" cy="140" r="18" fill="#10B981" opacity="0.9"/>
  <path d="M 592 140 L 597 145 L 610 133" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Category badge -->
  <rect x="450" y="310" width="300" height="36" rx="18" fill="url(#badgeGrad)" opacity="0.95"/>
  <text x="600" y="334" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" letter-spacing="2" fill="white">AI TOOLS</text>

  <!-- Main title -->
  <text x="600" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#0F172A">Executor.sh </text>
  <text x="600" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="46" font-weight="800" fill="url(#titleGrad)">vs Composio</text>

  <!-- Subtitle -->
  <text x="600" y="500" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#475569" font-weight="400">Self-Hosted Open-Source MCP Gateway</text>
</svg>