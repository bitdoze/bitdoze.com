<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 640" width="960" height="640">
  <defs>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#64748B" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowDark" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22C55E"/>
    </marker>
    <marker id="arrowCyan" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#06B6D4"/>
    </marker>
    <marker id="arrowIndigo" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4F46E5"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#F59E0B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="640" rx="16" fill="#F8FAFC"/>
  <rect width="960" height="640" rx="16" fill="none" stroke="#E2E8F0" stroke-width="2"/>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" fill="url(#titleGrad)" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700">Which Framework Should You Choose?</text>
  <text x="480" y="58" text-anchor="middle" fill="#94A3B8" font-family="system-ui, -apple-system, sans-serif" font-size="13">Decision framework for choosing between Mastra and Eve</text>

  <!-- Step 1: Already on Vercel? -->
  <g filter="url(#shadow)">
    <polygon points="480,90 630,140 480,190 330,140" fill="#FFFFFF" stroke="#4F46E5" stroke-width="2"/>
    <text x="480" y="137" text-anchor="middle" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600">Already on</text>
    <text x="480" y="155" text-anchor="middle" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600">Vercel?</text>
  </g>

  <!-- Arrow from Step 1 left (No) -->
  <line x1="330" y1="140" x2="190" y2="140" stroke="#64748B" stroke-width="2" marker-end="url(#arrowDark)"/>
  <text x="260" y="132" text-anchor="middle" fill="#EF4444" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">No</text>

  <!-- Arrow from Step 1 right (Yes) -->
  <line x1="630" y1="140" x2="770" y2="140" stroke="#64748B" stroke-width="2" marker-end="url(#arrowDark)"/>
  <text x="700" y="132" text-anchor="middle" fill="#22C55E" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700">Yes</text>

  <!-- Step 2a (No path): Need portability? -->
  <g filter="url(#shadow)">
    <polygon points="120,90 270,140 120,190 -30,140" fill="#FFFFFF" stroke="#6366F1" stroke-width="2" transform="translate(60,80) scale(0.85)"/>
  </g>
  <g transform="translate(0, 80)">
    <polygon points="120,90 240,125 120,160 0,125" fill="#FFFFFF" stroke="#6366F1" stroke-width="2"/>
    <text x="120" y="122" text-anchor="middle" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Need</text>
    <text x="120" y="138" text-anchor="middle" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">portability?</text>
  </g>

  <!-- Arrow down from portability (No) -->
  <line x1="120" y1="260" x2="120" y2="310" stroke="#64748B" stroke-width="2" marker-end="url(#arrowDark)"/>
  <text x="132" y="290" fill="#EF4444" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">No</text>

  <!-- Arrow right from portability (Yes) -->
  <line x1="240" y1="205" x2="380" y2="205" stroke="#64748B" stroke-width="2" marker-end="url(#arrowDark)"/>
  <text x="310" y="198" text-anchor="middle" fill="#22C55E" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">Yes</text>

  <!-- Step 2b (Yes path): Need fastest path? -->
  <g transform="translate(700, 80)">
    <polygon points="120,90 240,125 120,160 0,125" fill="#FFFFFF" stroke="#06B6D4" stroke-width="2"/>
    <text x="120" y="122" text-anchor="middle" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Fastest deploy</text>
    <text x="120" y="138" text-anchor="middle" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">on Vercel?</text>
  </g>

  <!-- Arrow down from fastest (No) -->
  <line x1="820" y1="260" x2="820" y2="310" stroke="#64748B" stroke-width="2" marker-end="url(#arrowDark)"/>
  <text x="832" y="290" fill="#EF4444" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">No</text>

  <!-- Arrow left from fastest (Yes) -->
  <line x1="700" y1="205" x2="560" y2="205" stroke="#64748B" stroke-width="2" marker-end="url(#arrowDark)"/>
  <text x="630" y="198" text-anchor="middle" fill="#22C55E" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">Yes</text>

  <!-- RESULT: Eve (fast Vercel path) - center -->
  <g filter="url(#shadow)">
    <rect x="420" y="190" rx="14" ry="14" width="140" height="50" fill="#06B6D4"/>
    <text x="490" y="213" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">Choose Eve</text>
    <text x="490" y="230" text-anchor="middle" fill="#CFFAFE" font-family="system-ui, -apple-system, sans-serif" font-size="10">Vercel-native speed</text>
  </g>

  <!-- Step 3 (left no path): Production maturity needed? -->
  <g transform="translate(30, 300)">
    <polygon points="120,90 240,125 120,160 0,125" fill="#FFFFFF" stroke="#6366F1" stroke-width="2"/>
    <text x="120" y="118" text-anchor="middle" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Production</text>
    <text x="120" y="135" text-anchor="middle" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">maturity?</text>
  </g>

  <!-- Arrow down from maturity (Yes) -->
  <line x1="150" y1="460" x2="150" y2="490" stroke="#64748B" stroke-width="2" marker-end="url(#arrowDark)"/>
  <text x="162" y="480" fill="#22C55E" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">Yes</text>

  <!-- Arrow right from maturity (No) -->
  <line x1="270" y1="425" x2="420" y2="425" stroke="#64748B" stroke-width="2" marker-end="url(#arrowDark)"/>
  <text x="345" y="418" text-anchor="middle" fill="#EF4444" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">No</text>

  <!-- RESULT: Mastra (mature) -->
  <g filter="url(#shadow)">
    <rect x="60" y="490" rx="14" ry="14" width="180" height="50" fill="#4F46E5"/>
    <text x="150" y="513" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">Choose Mastra</text>
    <text x="150" y="530" text-anchor="middle" fill="#C7D2FE" font-family="system-ui, -apple-system, sans-serif" font-size="10">Portable &amp; battle-tested</text>
  </g>

  <!-- Step 3b (right no path): Budget-conscious? -->
  <g transform="translate(700, 300)">
    <polygon points="120,90 240,125 120,160 0,125" fill="#FFFFFF" stroke="#06B6D4" stroke-width="2"/>
    <text x="120" y="118" text-anchor="middle" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Budget-</text>
    <text x="120" y="135" text-anchor="middle" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">conscious?</text>
  </g>

  <!-- Arrow down from budget (Yes) -->
  <line x1="820" y1="460" x2="820" y2="490" stroke="#64748B" stroke-width="2" marker-end="url(#arrowDark)"/>
  <text x="832" y="480" fill="#22C55E" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">Yes</text>

  <!-- Arrow left from budget (No) -->
  <line x1="700" y1="425" x2="560" y2="425" stroke="#64748B" stroke-width="2" marker-end="url(#arrowDark)"/>
  <text x="630" y="418" text-anchor="middle" fill="#EF4444" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">No</text>

  <!-- RESULT: Mastra self-hosted (budget) -->
  <g filter="url(#shadow)">
    <rect x="730" y="490" rx="14" ry="14" width="180" height="50" fill="#4F46E5"/>
    <text x="820" y="513" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700">Choose Mastra</text>
    <text x="820" y="530" text-anchor="middle" fill="#C7D2FE" font-family="system-ui, -apple-system, sans-serif" font-size="10">Self-host (free, Apache 2.0)</text>
  </g>

  <!-- Center undecided: want beta features? -->
  <g transform="translate(380, 400)">
    <polygon points="100,55 200,90 100,125 0,90" fill="#FFFFFF" stroke="#F59E0B" stroke-width="2"/>
    <text x="100" y="87" text-anchor="middle" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">Want cutting-</text>
    <text x="100" y="102" text-anchor="middle" fill="#0F172A" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600">edge features?</text>
  </g>

  <!-- Arrow down (No) to Mastra -->
  <line x1="480" y1="525" x2="480" y2="560" stroke="#64748B" stroke-width="2" marker-end="url(#arrowDark)"/>
  <text x="492" y="548" fill="#EF4444" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">No</text>

  <!-- Arrow left from cutting-edge (Yes) -->
  <line x1="380" y1="455" x2="260" y2="455" stroke="#64748B" stroke-width="2" marker-end="url(#arrowDark)"/>
  <text x="320" y="448" text-anchor="middle" fill="#22C55E" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">Yes</text>

  <!-- RESULT: Eve (cutting-edge) -->
  <g filter="url(#shadow)">
    <rect x="130" y="435" rx="14" ry="14" width="140" height="45" fill="#06B6D4"/>
    <text x="200" y="455" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">Choose Eve</text>
    <text x="200" y="472" text-anchor="middle" fill="#CFFAFE" font-family="system-ui, -apple-system, sans-serif" font-size="10">Beta but innovative</text>
  </g>

  <!-- RESULT: Mastra (default safe choice) -->
  <g filter="url(#shadow)">
    <rect x="410" y="560" rx="14" ry="14" width="140" height="45" fill="#4F46E5"/>
    <text x="480" y="580" text-anchor="middle" fill="#FFFFFF" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">Choose Mastra</text>
    <text x="480" y="597" text-anchor="middle" fill="#C7D2FE" font-family="system-ui, -apple-system, sans-serif" font-size="10">Safe default choice</text>
  </g>

  <!-- Legend -->
  <g transform="translate(340, 620)">
    <rect x="0" y="-12" rx="8" ry="8" width="12" height="12" fill="#4F46E5"/>
    <text x="18" y="-2" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11">Mastra</text>
    <rect x="85" y="-12" rx="8" ry="8" width="12" height="12" fill="#06B6D4"/>
    <text x="103" y="-2" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11">Eve</text>
    <polygon points="175,-12 187,-12 181,-2" fill="#F59E0B" stroke="#F59E0B" stroke-width="1"/>
    <text x="193" y="-2" fill="#64748B" font-family="system-ui, -apple-system, sans-serif" font-size="11">Decision</text>
  </g>
</svg>