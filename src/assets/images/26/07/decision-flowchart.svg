<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" width="900" height="700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="astroGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF5D01"/>
      <stop offset="100%" stop-color="#FF8A4C"/>
    </linearGradient>
    <linearGradient id="nextGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#333333"/>
    </linearGradient>
    <linearGradient id="tanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#F87171"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="0.8" opacity="0.2"/>
    </pattern>
    <radialGradient id="blob1" cx="0.15" cy="0.2" r="0.5">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="0.85" cy="0.8" r="0.4">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="url(#bg)" rx="12"/>
  <rect width="900" height="700" fill="url(#grid)" rx="12"/>
  <rect width="900" height="700" fill="url(#blob1)"/>
  <rect width="900" height="700" fill="url(#blob2)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="22" fill="#0F172A">Which Framework Should You Choose?</text>
  <text x="450" y="62" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="13" fill="#64748B">Decision flowchart based on your project type and priorities</text>

  <!-- Start node -->
  <g transform="translate(450, 105)">
    <rect x="-90" y="-20" width="180" height="40" rx="20" fill="url(#titleGrad)" filter="url(#shadow)"/>
    <text x="0" y="6" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="14" fill="#FFFFFF">What are you building?</text>
  </g>

  <!-- Arrow down from start -->
  <line x1="450" y1="125" x2="450" y2="155" stroke="#64748B" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Decision 1: Content or App? -->
  <g transform="translate(450, 180)">
    <polygon points="0,-30 140,0 0,30 -140,0" fill="#FFFFFF" stroke="#6366F1" stroke-width="2" filter="url(#shadow)"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="13" fill="#0F172A">Content-heavy</text>
    <text x="0" y="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="13" fill="#0F172A">or App-heavy?</text>
  </g>

  <!-- LEFT branch: Content-heavy → Astro -->
  <line x1="310" y1="180" x2="180" y2="180" stroke="#64748B" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="245" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="11" fill="#6366F1">Content</text>

  <!-- Astro result node -->
  <g transform="translate(100, 180)">
    <rect x="-65" y="-32" width="130" height="64" rx="12" fill="#FFFFFF" stroke="#FF5D01" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="0" y="-8" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="22" fill="#FF5D01">Astro</text>
    <text x="0" y="10" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748B">Blogs, docs, marketing</text>
    <text x="0" y="22" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748B">portfolios, content sites</text>
  </g>

  <!-- RIGHT branch: App-heavy → Decision 2 -->
  <line x1="590" y1="180" x2="660" y2="180" stroke="#64748B" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="625" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="11" fill="#6366F1">App</text>

  <!-- Decision 2: RSC needed? -->
  <g transform="translate(720, 180)">
    <polygon points="0,-30 130,0 0,30 -130,0" fill="#FFFFFF" stroke="#6366F1" stroke-width="2" filter="url(#shadow)"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="12" fill="#0F172A">Need React</text>
    <text x="0" y="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="12" fill="#0F172A">Server Components?</text>
  </g>

  <!-- DOWN from Decision 2 → Decision 3 -->
  <line x1="720" y1="210" x2="720" y2="275" stroke="#64748B" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="732" y="248" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="11" fill="#6366F1">No</text>

  <!-- UP from Decision 2 → Next.js -->
  <line x1="850" y1="180" x2="870" y2="180" stroke="#64748B" stroke-width="0"/>
  <!-- Go right to Next.js -->
  
  <!-- RIGHT from Decision 2 → Next.js -->
  <!-- Actually let me restructure. Decision 2 splits UP (yes → Next.js) and DOWN (no → Decision 3) -->

  <!-- UP from Decision 2 → Next.js -->
  <line x1="720" y1="150" x2="720" y2="95" stroke="#64748B" stroke-width="2"/>
  <line x1="720" y1="95" x2="720" y2="82" stroke="#64748B" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="732" y="125" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="11" fill="#6366F1">Yes</text>

  <!-- Next.js result node -->
  <g transform="translate(720, 58)">
    <rect x="-65" y="-24" width="130" height="48" rx="12" fill="#FFFFFF" stroke="#000000" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="0" y="-2" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="22" fill="#000000">Next.js</text>
    <text x="0" y="16" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748B">SaaS, e-commerce, dashboards</text>
  </g>

  <!-- Decision 3: Type-safe routing priority? -->
  <g transform="translate(720, 310)">
    <polygon points="0,-30 145,0 0,30 -145,0" fill="#FFFFFF" stroke="#6366F1" stroke-width="2" filter="url(#shadow)"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="12" fill="#0F172A">Type-safe routing</text>
    <text x="0" y="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="12" fill="#0F172A">+ deploy-anywhere?</text>
  </g>

  <!-- LEFT from Decision 3 → Decision 4 -->
  <line x1="575" y1="310" x2="490" y2="310" stroke="#64748B" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="530" y="302" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="11" fill="#6366F1">No</text>

  <!-- RIGHT from Decision 3 → TanStack Start -->
  <line x1="865" y1="310" x2="870" y2="310" stroke="#64748B" stroke-width="0"/>

  <!-- DOWN from Decision 3 → TanStack Start -->
  <line x1="720" y1="340" x2="720" y2="385" stroke="#64748B" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="732" y="367" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="11" fill="#6366F1">Yes</text>

  <!-- TanStack Start result node -->
  <g transform="translate(720, 415)">
    <rect x="-72" y="-24" width="144" height="48" rx="12" fill="#FFFFFF" stroke="#EF4444" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="0" y="-2" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="18" fill="#EF4444">TanStack Start</text>
    <text x="0" y="16" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748B">Senior teams, complex state</text>
  </g>

  <!-- Decision 4: Vercel acceptable? -->
  <g transform="translate(400, 310)">
    <polygon points="0,-28 130,0 0,28 -130,0" fill="#FFFFFF" stroke="#6366F1" stroke-width="2" filter="url(#shadow)"/>
    <text x="0" y="-5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="12" fill="#0F172A">Vercel ecosystem</text>
    <text x="0" y="12" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="12" fill="#0F172A">acceptable?</text>
  </g>

  <!-- DOWN from Decision 4 → Next.js (second path) -->
  <line x1="400" y1="338" x2="400" y2="400" stroke="#64748B" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="412" y="374" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="11" fill="#6366F1">Yes</text>

  <!-- Next.js secondary result -->
  <g transform="translate(400, 430)">
    <rect x="-65" y="-24" width="130" height="48" rx="12" fill="#FFFFFF" stroke="#000000" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="0" y="-2" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="22" fill="#000000">Next.js</text>
    <text x="0" y="16" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748B">Full-stack React default</text>
  </g>

  <!-- LEFT from Decision 4 → TanStack Start (second path) -->
  <line x1="270" y1="310" x2="200" y2="310" stroke="#64748B" stroke-width="2" marker-end="url(#arrowGray)"/>
  <text x="235" y="302" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="11" fill="#6366F1">No</text>

  <!-- TanStack Start secondary result -->
  <g transform="translate(115, 310)">
    <rect x="-72" y="-24" width="144" height="48" rx="12" fill="#FFFFFF" stroke="#EF4444" stroke-width="2.5" filter="url(#shadow)"/>
    <text x="0" y="-2" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="18" fill="#EF4444">TanStack Start</text>
    <text x="0" y="16" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#64748B">Deploy anywhere, type-safe</text>
  </g>

  <!-- Summary bar at bottom -->
  <g transform="translate(450, 530)">
    <rect x="-420" y="-30" width="840" height="120" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" filter="url(#shadow)"/>
    
    <text x="0" y="-10" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="14" fill="#0F172A">Quick Reference</text>
    
    <!-- Astro -->
    <rect x="-390" y="5" width="10" height="10" rx="2" fill="#FF5D01"/>
    <text x="-374" y="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="12" fill="#0F172A">Astro</text>
    <text x="-374" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">Content-first • 0KB JS • Free hosting</text>
    <text x="-374" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">Best for: blogs, docs, marketing sites</text>
    <text x="-374" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">Backed by: Cloudflare</text>

    <!-- Next.js -->
    <rect x="-100" y="5" width="10" height="10" rx="2" fill="#000000"/>
    <text x="-84" y="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="12" fill="#0F172A">Next.js</text>
    <text x="-84" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">Full-stack React • RSC • Largest ecosystem</text>
    <text x="-84" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">Best for: SaaS, e-commerce, dashboards</text>
    <text x="-84" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">Backed by: Vercel</text>

    <!-- TanStack -->
    <rect x="190" y="5" width="10" height="10" rx="2" fill="#EF4444"/>
    <text x="206" y="14" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="12" fill="#0F172A">TanStack Start</text>
    <text x="206" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">Type-safe • Vite • Deploy anywhere</text>
    <text x="206" y="44" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">Best for: complex apps, senior teams</text>
    <text x="206" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748B">Backed by: Community</text>
  </g>
</svg>