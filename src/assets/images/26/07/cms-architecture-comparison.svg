<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2E8F0"/>
    </linearGradient>
    <linearGradient id="gitGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="apiGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0891B2"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="astroGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.2"/>
    </pattern>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#64748B" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#0F172A">
    Git-Based vs API-Based <tspan fill="url(#astroGrad)">CMS Architecture</tspan>
  </text>
  <text x="600" y="78" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#64748B" font-weight="400">How content flows to your Astro site</text>

  <!-- ==================== GIT-BASED PATH (Left) ==================== -->
  <g transform="translate(60, 100)">
    <!-- Section label -->
    <rect x="95" y="0" width="200" height="36" rx="18" fill="url(#gitGrad)" opacity="0.9"/>
    <text x="195" y="24" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" letter-spacing="1">GIT-BASED CMS</text>

    <!-- Box 1: Editor / CMS UI -->
    <g transform="translate(95, 70)">
      <rect x="0" y="0" width="200" height="70" rx="10" fill="#FFFFFF" stroke="#6366F1" stroke-width="2" filter="url(#shadow)"/>
      <text x="100" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#4F46E5" letter-spacing="1">EDITOR / CMS UI</text>
      <text x="100" y="50" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569">Pages CMS, Keystatic, etc.</text>
    </g>

    <!-- Arrow 1 -->
    <g transform="translate(195, 145)">
      <line x1="0" y1="0" x2="0" y2="40" stroke="#6366F1" stroke-width="2.5"/>
      <polygon points="-7,34 7,34 0,44" fill="#6366F1"/>
      <text x="18" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6366F1" font-weight="600">git commit</text>
    </g>

    <!-- Box 2: Git Repo -->
    <g transform="translate(95, 190)">
      <rect x="0" y="0" width="200" height="70" rx="10" fill="#FFFFFF" stroke="#6366F1" stroke-width="2" filter="url(#shadow)"/>
      <text x="100" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#4F46E5" letter-spacing="1">GIT REPOSITORY</text>
      <text x="100" y="50" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569">.md / .mdx / .yaml files</text>
    </g>

    <!-- Arrow 2 -->
    <g transform="translate(195, 265)">
      <line x1="0" y1="0" x2="0" y2="40" stroke="#6366F1" stroke-width="2.5"/>
      <polygon points="-7,34 7,34 0,44" fill="#6366F1"/>
      <text x="18" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#6366F1" font-weight="600">push / trigger</text>
    </g>

    <!-- Box 3: Astro Build -->
    <g transform="translate(95, 310)">
      <rect x="0" y="0" width="200" height="70" rx="10" fill="#FFFFFF" stroke="#6366F1" stroke-width="2" filter="url(#shadow)"/>
      <text x="100" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#4F46E5" letter-spacing="1">ASTRO BUILD</text>
      <text x="100" y="50" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569">getCollection() reads files</text>
    </g>

    <!-- Arrow 3 -->
    <g transform="translate(195, 385)">
      <line x1="0" y1="0" x2="0" y2="40" stroke="#6366F1" stroke-width="2.5"/>
      <polygon points="-7,34 7,34 0,44" fill="#6366F1"/>
    </g>

    <!-- Box 4: Static Site -->
    <g transform="translate(95, 430)">
      <rect x="0" y="0" width="200" height="70" rx="10" fill="url(#gitGrad)" opacity="0.1" stroke="#6366F1" stroke-width="2" filter="url(#shadow)"/>
      <!-- Astro star icon -->
      <polygon points="30,35 33,28 40,28 34,23 37,16 30,20 23,16 26,23 20,28 27,28" fill="#4F46E5" opacity="0.7"/>
      <text x="115" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#4F46E5" letter-spacing="1">STATIC SITE</text>
      <text x="115" y="50" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569">HTML / CSS / JS</text>
    </g>

    <!-- Cost badge -->
    <g transform="translate(330, 210)">
      <rect x="0" y="0" width="85" height="30" rx="15" fill="#10B981" opacity="0.15" stroke="#10B981" stroke-width="1.5"/>
      <text x="42" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#059669">$0–10/mo</text>
    </g>

    <!-- Simple badge -->
    <g transform="translate(330, 250)">
      <rect x="0" y="0" width="85" height="30" rx="15" fill="#6366F1" opacity="0.1" stroke="#6366F1" stroke-width="1.5"/>
      <text x="42" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#4F46E5">Simple ✓</text>
    </g>
  </g>

  <!-- Divider line -->
  <line x1="595" y1="110" x2="595" y2="550" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="8,6" opacity="0.5"/>
  <text x="600" y="565" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94A3B8" font-weight="600">VS</text>

  <!-- ==================== API-BASED PATH (Right) ==================== -->
  <g transform="translate(640, 100)">
    <!-- Section label -->
    <rect x="95" y="0" width="200" height="36" rx="18" fill="url(#apiGrad)" opacity="0.9"/>
    <text x="195" y="24" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" letter-spacing="1">API-BASED CMS</text>

    <!-- Box 1: CMS Backend -->
    <g transform="translate(95, 70)">
      <rect x="0" y="0" width="200" height="70" rx="10" fill="#FFFFFF" stroke="#06B6D4" stroke-width="2" filter="url(#shadow)"/>
      <text x="100" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#0891B2" letter-spacing="1">CMS BACKEND</text>
      <text x="100" y="50" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569">Sanity, Strapi, Storyblok…</text>
    </g>

    <!-- Arrow 1 -->
    <g transform="translate(195, 145)">
      <line x1="0" y1="0" x2="0" y2="40" stroke="#06B6D4" stroke-width="2.5"/>
      <polygon points="-7,34 7,34 0,44" fill="#06B6D4"/>
      <text x="18" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#06B6D4" font-weight="600">REST / GraphQL</text>
    </g>

    <!-- Box 2: API -->
    <g transform="translate(95, 190)">
      <rect x="0" y="0" width="200" height="70" rx="10" fill="#FFFFFF" stroke="#06B6D4" stroke-width="2" filter="url(#shadow)"/>
      <text x="100" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#0891B2" letter-spacing="1">API LAYER</text>
      <text x="100" y="50" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569">fetch() at build or SSR</text>
    </g>

    <!-- Arrow 2 -->
    <g transform="translate(195, 265)">
      <line x1="0" y1="0" x2="0" y2="40" stroke="#06B6D4" stroke-width="2.5"/>
      <polygon points="-7,34 7,34 0,44" fill="#06B6D4"/>
      <text x="18" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#06B6D4" font-weight="600">data response</text>
    </g>

    <!-- Box 3: Astro Build/SSR -->
    <g transform="translate(95, 310)">
      <rect x="0" y="0" width="200" height="70" rx="10" fill="#FFFFFF" stroke="#06B6D4" stroke-width="2" filter="url(#shadow)"/>
      <text x="100" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#0891B2" letter-spacing="1">ASTRO BUILD / SSR</text>
      <text x="100" y="50" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569">Requires adapter (Node, etc.)</text>
    </g>

    <!-- Arrow 3 -->
    <g transform="translate(195, 385)">
      <line x1="0" y1="0" x2="0" y2="40" stroke="#06B6D4" stroke-width="2.5"/>
      <polygon points="-7,34 7,34 0,44" fill="#06B6D4"/>
    </g>

    <!-- Box 4: Static Site / SSR -->
    <g transform="translate(95, 430)">
      <rect x="0" y="0" width="200" height="70" rx="10" fill="url(#apiGrad)" opacity="0.1" stroke="#06B6D4" stroke-width="2" filter="url(#shadow)"/>
      <!-- Astro star icon -->
      <polygon points="30,35 33,28 40,28 34,23 37,16 30,20 23,16 26,23 20,28 27,28" fill="#0891B2" opacity="0.7"/>
      <text x="115" y="30" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#0891B2" letter-spacing="1">SITE OUTPUT</text>
      <text x="115" y="50" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#475569">Static + Dynamic pages</text>
    </g>

    <!-- Cost badge -->
    <g transform="translate(330, 210)">
      <rect x="0" y="0" width="95" height="30" rx="15" fill="#F59E0B" opacity="0.15" stroke="#F59E0B" stroke-width="1.5"/>
      <text x="47" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#D97706">$0–55+/mo</text>
    </g>

    <!-- Complex badge -->
    <g transform="translate(330, 250)">
      <rect x="0" y="0" width="95" height="30" rx="15" fill="#EF4444" opacity="0.1" stroke="#EF4444" stroke-width="1.5"/>
      <text x="47" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#DC2626">Complex ⚠</text>
    </g>
  </g>

  <!-- Footer note -->
  <rect x="200" y="600" width="800" height="44" rx="10" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="600" y="627" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#64748B">
    Git-based CMS works natively with Astro Content Collections · API-based CMS adds a runtime dependency
  </text>
</svg>