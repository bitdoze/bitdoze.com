<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Bitdoze default social image</title>
  <desc id="desc">Default Open Graph image for Bitdoze articles and pages.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe" />
      <stop offset="50%" stop-color="#bfdbfe" />
      <stop offset="100%" stop-color="#dbeafe" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" rx="24" />
  <circle cx="1030" cy="130" r="120" fill="#ffffff" fill-opacity="0.45" />
  <circle cx="170" cy="520" r="150" fill="#ffffff" fill-opacity="0.3" />
  <rect x="120" y="130" width="960" height="370" rx="32" fill="#0f172a" fill-opacity="0.88" />
  <text x="160" y="285" fill="#f8fafc" font-family="Arial, sans-serif" font-size="92" font-weight="700">
    Bitdoze
  </text>
  <text x="160" y="365" fill="#93c5fd" font-family="Arial, sans-serif" font-size="42" font-weight="600">
    DevOps and programming guides
  </text>
</svg>
